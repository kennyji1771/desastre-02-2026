    const textoOriginal = "# OPERACIÓN DESASTRE 02-2026 – ODDI \n\n## INTRODUCCIÓN: RELACIÓN Y EVOLUCIÓN DE LOS DOCUMENTOS\n### 1.1. Propósito de la integración\n#### 1.1.1. Los cinco documentos reflejan las fases de planificación, coordinación y reporte de la Operación Desastre 02-2026.\n#### 1.1.2. El orden cronológico lógico es:\n##### 1.1.2.1. **002 Funcionamiento.docx** – Establece el marco operativo general, la estructura de comités y los procedimientos estandarizados.\n##### 1.1.2.2. **001 ROL DE LOS ODDI EN CADA ZODI AFECTADA.docx** – Define el conocimiento territorial, los recursos y enlaces específicos de cada ZODI, y las requisiciones cartográficas.\n##### 1.1.2.3. **INFORME DE OPERACIONES ODDI «DESASTRE» 02-2026 -001.docx** – Presenta los informes de cada comité (C1 a C5) con misiones, maniobras y tareas por fases.\n##### 1.1.2.4. **Reporte Final Cartelera.docx** – Consolida la información por ZODI en carteleras de reporte e incluye un análisis integrado comparativo.\n#### 1.1.3. Este documento integra todos los contenidos en una única salida jerarquizada, preservando la coherencia y facilitando la consulta.\n\n---\n\n## 2. DOCUMENTO 1: FUNCIONAMIENTO ODDI – PROCEDIMIENTOS OPERATIVOS ESTANDARIZADOS (002)\n\n### 2.1. Propósito y alcance del instructivo\n#### 2.1.1. Propósito: Establecer el procedimiento operativo estandarizado para que los ODDI activen, coordinen y gestionen sus capacidades territoriales en la Operación Desastre 02-2026.\n#### 2.1.2. Alcance: Aplica a los ODDI de las ZODI Capital, La Guaira y Miranda, así como a cualquier otra ZODI activada.\n#### 2.1.3. Fundamento legal y doctrinario\n##### 2.1.3.1. Ley del Comando para la Defensa Integral de la Nación (Art. 6-7, 15-17)\n##### 2.1.3.2. Decreto Presidencial N° 5.078 (Arts. 5, 14-20)\n##### 2.1.3.3. Ley Orgánica de Seguridad de la Nación (Arts. 24-25, 28-33)\n##### 2.1.3.4. Manual de Personal del Ejército Venezolano (Cap. II-XII)\n##### 2.1.3.5. Cuadernos de Trabajo ODDI N° 1 al 5\n##### 2.1.3.6. Curso de Operaciones de Defensa Integral (CODDI) – Módulos 0 al 6\n#### 2.1.4. Principio rector: Los ODDI son coordinadores territoriales, no ejecutores directos. Su función es conocer, registrar, enlazar y poner a disposición del Comando el mapa completo del territorio.\n\n### 2.2. Activación y estructura de mando\n#### 2.2.1. Niveles de activación\n##### 2.2.1.1. Alerta Temprana (pronóstico de evento) – Activar Comité de Riesgos (C4) para monitoreo.\n##### 2.2.1.2. Activación Total (H+0) – Activar los cinco comités, establecer Sala Situacional, iniciar levantamiento en terreno.\n##### 2.2.1.3. Respuesta Inmediata (H+0 a H+24) – Entregar productos cartográficos de afectaciones, recursos logísticos y organización del poder popular.\n##### 2.2.1.4. Manejo de Consecuencias (H+24 en adelante) – Actualizar diariamente la información y planificar mitigación.\n#### 2.2.2. Estructura de coordinación\n##### 2.2.2.1. Comandante ZODI/REDI → Estado Mayor ZODI/REDI → Coordinador General ODDI\n##### 2.2.2.2. Coordinador General ODDI articula los cinco comités:\n###### 2.2.2.2.1. C1 – Comité Patriótico (Información, Moral y Educación)\n###### 2.2.2.2.2. C2 – Comité Económico (Logística, Producción y Personal Civil)\n###### 2.2.2.2.3. C3 – Comité Social (Asuntos Civiles, Derechos y Misiones)\n###### 2.2.2.2.4. C4 – Comité de Orden Interno (Seguridad, Disciplina y Gestión de Riesgo)\n###### 2.2.2.2.5. Subcomité de Sistema de Riesgos (dentro de C4)\n###### 2.2.2.2.6. C5 – Comité de Movilización (Efectivos, Requisición y Planeamiento)\n#### 2.2.3. Responsabilidades del Coordinador General del ODDI\n##### 2.2.3.1. Convocar y presidir reuniones de coordinación intercomités.\n##### 2.2.3.2. Consolidar informes para el Estado Mayor de la ZODI.\n##### 2.2.3.3. Garantizar la entrega de información cartográfica y enlaces en los plazos establecidos.\n##### 2.2.3.4. Supervisar la actualización continua de los mapas de situación y riesgos.\n##### 2.2.3.5. Actuar como enlace principal entre el ODDI y el Comando de la ZODI.\n\n### 2.3. Funciones específicas de los comités\n#### 2.3.1. Comité Patriótico Bolivariano (C1)\n##### 2.3.1.1. Objetivo: Garantizar comunicación efectiva, moral de la tropa y población, y contrainformación.\n##### 2.3.1.2. Acciones concretas:\n###### 2.3.1.2.1. Información Pública: Emitir comunicados oficiales (radio, TV, redes), coordinar con periodistas, difundir mensajes de calma.\n###### 2.3.1.2.2. Contrainformación: Monitorear redes sociales, desmentir informaciones falsas, emitir alertas tempranas (con C4).\n###### 2.3.1.2.3. Moral y Bienestar: Coordinar con Capellán y servicios especiales (cine, deportes, bibliotecas) para mantener el ánimo en refugios.\n###### 2.3.1.2.4. Educación del personal: Organizar charlas sobre manejo de desastre, primeros auxilios y prevención.\n##### 2.3.1.3. Productos esperados: Boletines diarios, resumen de rumores desmentidos, informe de actividades de bienestar, listado de comunicadores.\n#### 2.3.2. Comité Económico, Productivo y de Servicios (C2)\n##### 2.3.2.1. Objetivo: Gestionar inventario de recursos logísticos, personal civil y servicios esenciales.\n##### 2.3.2.2. Acciones concretas:\n###### 2.3.2.2.1. Registro de Recursos Logísticos (SALTE): Levantar inventario de alimentos, medicinas, vehículos, maquinaria, combustibles, equipos de comunicación.\n###### 2.3.2.2.2. Administración de Personal Civil: Clasificar y movilizar mano de obra civil (técnicos, operarios, conductores, cocineros).\n###### 2.3.2.2.3. Servicio de abastecimiento y Finanzas: Asegurar abastecimiento en refugios, gestionar pagos y control de moneda.\n###### 2.3.2.2.4. Conservación del Potencial Humano: Implementar programa de seguridad contra accidentes y analizar factores psicológicos.\n###### 2.3.2.2.5. Articulación con el Subcomité de Riesgos (C4): Proporcionar inventarios de maquinaria, equipos y personal técnico.\n##### 2.3.2.3. Productos esperados: Inventario georreferenciado de recursos, censo de personal civil, informe de operación de cantinas y finanzas, registro de accidentes.\n#### 2.3.3. Comité Social Popular (C3)\n##### 2.3.3.1. Objetivo: Coordinar atención humanitaria, protección de derechos e integración social en zonas afectadas.\n##### 2.3.3.2. Acciones concretas:\n###### 2.3.3.2.1. Gestión de Refugiados y Desplazados: Identificar y registrar damnificados, habilitar albergues y centros de acopio, coordinar alimentación, salud y agua.\n###### 2.3.3.2.2. Protección de Derechos Humanos: Monitorear violaciones de derechos en refugios, garantizar trato digno a grupos vulnerables (niños, ancianos, indígenas).\n###### 2.3.3.2.3. Misiones Sociales: Coordinar con misiones de salud, alimentación y educación, enlazar con Cruz Roja y otras organizaciones.\n###### 2.3.3.2.4. Rehabilitación de Comunidades: Planificar periodos de descanso, recreación y recuperación moral.\n###### 2.3.3.2.5. Articulación con Subcomité de Riesgos (C4): Proporcionar información sobre condiciones de vida en refugios y necesidades de la población.\n##### 2.3.3.3. Productos esperados: Registro de damnificados y refugiados, mapa de albergues, informe de quejas y violaciones de derechos, plan de rehabilitación comunitaria.\n#### 2.3.4. Comité de Orden Interno (C4) – con énfasis en el Subcomité de Sistema de Riesgos\n##### 2.3.4.1. Objetivo: Garantizar seguridad, disciplina y gestión de riesgos, con especial atención a impactos secundarios del desastre.\n##### 2.3.4.2. Subcomité de Disciplina, Ley y Orden:\n###### 2.3.4.2.1. Mantenimiento de la disciplina: Aplicar medidas preventivas y correctivas, mantener vigilancia en refugios, gestión de extraviados.\n###### 2.3.4.2.2. Subcomité de Policía: Control de accesos y tránsito, custodia de instalaciones vitales, investigación criminal (saqueos, robos, sabotaje).\n##### 2.3.4.3. Subcomité de Seguridad contra Accidentes y Sistema de Riesgos (SUBCOMITÉ DE RIESGOS):\n###### 2.3.4.3.1. Levantamiento de Consecuencias Post-Desastre: Inspecciones de terreno para identificar daños estructurales, derrumbes, fugas de materiales peligrosos, deslizamientos, inundaciones.\n###### 2.3.4.3.2. Establecimiento de Escenarios de Riesgo: Analizar datos para proyectar escenarios de riesgo secundario (ej. colapso de depósito de combustible, aislamiento de comunidad).\n###### 2.3.4.3.3. Prevención de Impactos Negativos: Recomendar acciones de mitigación (despeje de escombros, reparación de vías, aseguramiento de depósitos, evacuación preventiva).\n###### 2.3.4.3.4. Preparación y Planificación de Respuesta: Activar protocolos de Protección Civil, coordinar con C2 el despliegue de maquinaria y personal técnico, coordinar con C3 la evacuación de comunidades.\n###### 2.3.4.3.5. Monitoreo Continuo: Mantener actualizada la información de riesgos, reportar al Estado Mayor cualquier cambio o nueva amenaza.\n##### 2.3.4.4. Productos esperados: Informe diario de incidentes, mapa de puestos de control, informe detallado de riesgos post-desastre (con escenarios y recomendaciones), plan de mitigación.\n#### 2.3.5. Comité de Movilización y Requisición (C5)\n##### 2.3.5.1. Objetivo: Gestionar efectivos, reemplazos y la requisición legal de bienes.\n##### 2.3.5.2. Acciones concretas:\n###### 2.3.5.2.1. Mantenimiento del Efectivo: Llevar la Situación Diaria de Personal (SDP) y el Cuadro de Control Detallado.\n###### 2.3.5.2.2. Requisición Legal: Aplicar LOSN (Art. 33) y Decreto 5.078 (Art. 19) para requisar vehículos, maquinaria, alimentos, medicinas y otros bienes.\n###### 2.3.5.2.3. Registro de Medios Productivos: Actualizar el inventario de medios y fuerzas productivas del territorio.\n###### 2.3.5.2.4. Articulación con Subcomité de Riesgos (C4): Proporcionar listados de personal técnico y maquinaria para tareas de mitigación; gestionar requisición de equipos adicionales.\n##### 2.3.5.3. Productos esperados: SDP, Cuadro de Control Detallado, Informe Periódico de Personal (IPP), Estudio de Personal, actas de requisición.\n\n### 2.4. Flujo de trabajo y plazos de entrega por fases\n#### 2.4.1. Fase 0 – Activación (H+0 a H+12)\n##### 2.4.1.1. Productos: Mapa Base del Territorio, Calco de Situación Inicial, Mapa de Infraestructura Crítica, Mapa de Riesgos y Vulnerabilidades (preliminar).\n##### 2.4.1.2. Comités responsables: C2, C4 (Riesgos), C5.\n#### 2.4.2. Fase 1 – Evaluación Inicial (H+12 a H+24)\n##### 2.4.2.1. Productos: Mapa de Afectaciones por Sismo, Mapa de Recursos Logísticos (SALTE), Mapa de Organización del Poder Popular, Mapa de Riesgos y Vulnerabilidades (detallado).\n##### 2.4.2.2. Comités responsables: C2, C3, C4 (Riesgos).\n#### 2.4.3. Fase 2 – Respuesta Inmediata (H+24 a H+72)\n##### 2.4.3.1. Productos: Informe de incidentes (C4), Informe de refugiados y damnificados (C3), Informe de recursos y personal disponible (C2 y C5), Informe de riesgos secundarios y plan de mitigación (C4-Riesgos).\n##### 2.4.3.2. Comités responsables: Todos.\n#### 2.4.4. Fase 3 – Manejo de Consecuencias (H+72 en adelante)\n##### 2.4.4.1. Actualización diaria de la información (todos los comités). C4-Riesgos reporta evolución de escenarios, efectividad de medidas e identificación de nuevos riesgos.\n\n### 2.5. Gestión de riesgos post-desastre (Subcomité de Riesgos – C4)\n#### 2.5.1. Metodología de levantamiento de consecuencias\n##### 2.5.1.1. Reconocimiento de Terreno (H+0 a H+12): Desplegar equipos para inspeccionar zonas críticas.\n##### 2.5.1.2. Identificación de Daños (H+0 a H+24): Levantar datos de daños estructurales, deslizamientos, derrumbes, fugas, obstrucciones; georreferenciar y fotografiar.\n##### 2.5.1.3. Evaluación de Impacto Secundario (H+12 a H+24): Analizar daños para identificar riesgos secundarios; priorizar por gravedad y probabilidad.\n##### 2.5.1.4. Proyección de Escenarios (H+24 a H+48): Utilizar información para proyectar escenarios a corto, mediano y largo plazo.\n##### 2.5.1.5. Plan de Mitigación (H+24 a H+48): Recomendar acciones de mitigación y asignar responsabilidades.\n#### 2.5.2. Productos del Subcomité de Riesgos\n##### 2.5.2.1. Mapa de Consecuencias Post-Desastre (digital, georreferenciado)\n##### 2.5.2.2. Matriz de Riesgos Secundarios (digital/impreso)\n##### 2.5.2.3. Informe de Escenarios de Riesgo (digital)\n##### 2.5.2.4. Plan de Mitigación y Contingencia (digital)\n#### 2.5.3. Articulación con otros comités para la mitigación\n##### 2.5.3.1. Colapso de vía de acceso → C2 (maquinaria) y C4-Riesgos (coordinación)\n##### 2.5.3.2. Fuga de material peligroso → C4-Riesgos (coordinación), C3 (evacuación)\n##### 2.5.3.3. Aislamiento de comunidad → C5 (logística), C2 (recursos), C3 (atención social)\n##### 2.5.3.4. Saqueo en almacenes → C4 (Policía / Militar)\n##### 2.5.3.5. Desabastecimiento de agua → C2 (recursos), C3 (distribución)\n\n### 2.6. Documentos de trabajo obligatorios\n#### 2.6.1. Diario de la Sección – Todos los comités (actualización diaria)\n#### 2.6.2. Cuaderno de Trabajo – Todos los comités (continua)\n#### 2.6.3. Mapa de Situación (calco) – C5 (diaria)\n#### 2.6.4. Situación Diaria de Personal (SDP) – C5 (diaria)\n#### 2.6.5. Cuadro de Control Detallado – C5 (continua)\n#### 2.6.6. Informe Periódico de Personal (IPP) – C5 (por fase)\n#### 2.6.7. Informe de Incidentes – C4 (diaria)\n#### 2.6.8. Informe de Refugiados y Damnificados – C3 (diaria)\n#### 2.6.9. Informe de Recursos Logísticos – C2 (diaria)\n#### 2.6.10. Informe de Riesgos y Mitigación – C4-Riesgos (diaria)\n#### 2.6.11. Estudio de Personal – C5 (por evento)\n\n### 2.7. Protocolo de comunicación y enlaces\n#### 2.7.1. Flujo de comunicación interna: Coordinador General ODDI → Comités → Subcomités; Comités ↔ Comités (coordinación cruzada); Comités → Coordinador General → Estado Mayor ZODI.\n#### 2.7.2. Enlaces externos críticos por comité:\n##### 2.7.2.1. C1: Prensa, radio, TV, corresponsales, jefes de calle.\n##### 2.7.2.2. C2: Empresas, industrias, comercios, bancos, ministerios.\n##### 2.7.2.3. C3: Consejos comunales, UBCH, CLAP, ONG, Cruz Roja, misiones sociales.\n##### 2.7.2.4. C4: Policía Nacional, Protección Civil, Bomberos, Capitanía de Puerto, Armada, J2.\n##### 2.7.2.5. C5: Comando Estratégico Operacional (CEO), J4, Sistema de Reemplazos.\n\n### 2.8. Consideraciones finales del instructivo\n#### 2.8.1. Principio de coordinación: ODDI no ejecutan directamente; coordinan, recopilan y ponen a disposición del Comando la información, recursos y enlaces.\n#### 2.8.2. La información es el centro: Todo el esfuerzo se resume en generar información confiable, georreferenciada, actualizada y accesible.\n#### 2.8.3. El Subcomité de Riesgos (C4) es el vigilante del futuro post-desastre.\n#### 2.8.4. La actualización es continua: reportar cambios significativos diariamente.\n\n### 2.9. Anexos de referencia del instructivo\n#### 2.9.1. Anexo 1: Formato SDP-ODDI\n#### 2.9.2. Anexo 2: Formato IPP-ODDI\n#### 2.9.3. Anexo 3: Formato de Mapa de Situación (calco) y leyenda estandarizada\n#### 2.9.4. Anexo 4: Formato de Estudio de Personal (adaptado)\n#### 2.9.5. Anexo 5: Tabla de códigos para informe de accidentes\n#### 2.9.6. Anexo 6: Formato de acta de requisición y compromiso de reposición\n#### 2.9.7. Anexo 7: Matriz de riesgos secundarios (formato en blanco)\n#### 2.9.8. Anexo 8: Lista de enlaces críticos por ZODI\n\n---\n\n## 3. DOCUMENTO 2: ROL DE LOS ODDI EN CADA ZODI AFECTADA (001)\n\n### 3.1. Naturaleza y función de los ODDI\n#### 3.1.1. Los ODDI son los \"ojos y los brazos coordinadores del Comando en el territorio\", pero no son ejecutores ni decisores.\n#### 3.1.2. Su valor radica en el conocimiento profundo del terreno, la capacidad de enlace con actores locales y la aptitud para poner recursos a disposición del mando superior.\n\n### 3.2. ZODI CAPITAL – DISTRITO CAPITAL\n#### 3.2.1. Conocimiento del territorio\n##### 3.2.1.1. Centro histórico, sedes gubernamentales, nodos de transporte colapsados (Av. Urdaneta, Baralt, Fuerzas Armadas).\n##### 3.2.1.2. Zonas de alta densidad (El Silencio, La Hoyada, Monte Piedad) y redes de acueducto y electricidad del Área Metropolitana.\n#### 3.2.2. Recursos que pone a disposición del Comando\n##### 3.2.2.1. Inventario de edificaciones públicas y privadas para albergues o centros de acopio.\n##### 3.2.2.2. Censo de milicianos, reservistas y personal de seguridad ciudadana por sector.\n##### 3.2.2.3. Registro de hospitales centinelas, ambulatorios, farmacias y depósitos de medicamentos.\n##### 3.2.2.4. Mapa de pozos de agua, cisternas y plantas de tratamiento.\n##### 3.2.2.5. Relación de CLAP, consejos comunales, UBCH y jefes de calle (258 contactos).\n#### 3.2.3. Enlaces que gestiona\n##### 3.2.3.1. Alcaldía de Caracas, Ministerio de Salud, MPPS, consejos comunales, UBCH, administradores de hoteles, Policía Nacional, Protección Civil.\n#### 3.2.4. Limitación\n##### 3.2.4.1. No ejecuta control de accesos, distribución de alimentos ni patrullaje. Solo proporciona información y enlaces.\n\n### 3.3. ZODI LA GUAIRA – ESTADO LA GUAIRA\n#### 3.3.1. Conocimiento del territorio\n##### 3.3.1.1. Sistema portuario, aeropuerto, Túnel Boquerón 1, vías costeras, zonas de riesgo de tsunami, empresas estratégicas, depósitos de combustible y plantas eléctricas.\n#### 3.3.2. Recursos que pone a disposición del Comando\n##### 3.3.2.1. Inventario de grúas, equipos de remoción de escombros y maquinaria pesada en puerto y zonas industriales.\n##### 3.3.2.2. Listado de personal técnico y operarios de muelles y aeropuerto.\n##### 3.3.2.3. Registro de hospitales y centros de salud para trabajadores portuarios e industriales.\n##### 3.3.2.4. Mapa de rutas alternas terrestres y marítimas.\n##### 3.3.2.5. Censo de milicianos y personal de la Armada con experiencia en logística portuaria.\n#### 3.3.3. Enlaces que gestiona\n##### 3.3.3.1. Bolipuertos, concesionario del aeropuerto, Ministerio de Transporte, empresas industriales, consejos comunales costeros, Capitanía de Puerto, Armada.\n#### 3.3.4. Limitación\n##### 3.3.4.1. No ejecuta reestablecimiento del puerto ni del túnel, ni patrullajes. Solo coordina enlaces y pone información a disposición.\n\n### 3.4. ZODI MIRANDA – ESTADO MIRANDA\n#### 3.4.1. Conocimiento del territorio\n##### 3.4.1.1. Zonas industriales, depósitos de almacenamiento, áreas de riesgo de deslizamientos, vías secundarias fracturadas, comunidades aisladas, centros de acopio de alimentos, depósitos de materiales peligrosos, plantas de generación eléctrica.\n#### 3.4.2. Recursos que pone a disposición del Comando\n##### 3.4.2.1. Inventario de empresas industriales y su capacidad de almacenamiento.\n##### 3.4.2.2. Registro de materiales peligrosos y protocolos de manejo seguro.\n##### 3.4.2.3. Censo de personal técnico, bomberos industriales y brigadas de emergencia.\n##### 3.4.2.4. Mapa de vías alternas.\n##### 3.4.2.5. Relación de CLAP, consejos comunales y UBCH en municipios afectados.\n##### 3.4.2.6. Listado de pozos de agua y fuentes de abastecimiento en zonas aisladas.\n#### 3.4.3. Enlaces que gestiona\n##### 3.4.3.1. Empresas industriales, Ministerio de Industrias, Ministerio de Ambiente, consejos comunales, UBCH, Policía Nacional, Protección Civil, empresas de transporte.\n#### 3.4.4. Limitación\n##### 3.4.4.1. No ejecuta cordón de seguridad en zonas industriales, ni despeja vías, ni distribuye suministros. Solo coordina enlaces y pone información a disposición.\n\n### 3.5. Conclusión final del rol\n#### 3.5.1. Los ODDI son coordinadores territoriales, su valor radica en el conocimiento, enlaces y disposición de recursos, sin sustituir la autoridad operativa del ZODI/REDI.\n\n### 3.6. Requisición cartográfica por ZODI – Operación «DESASTRE 02-2026»\n#### 3.6.1. Generalidades\n##### 3.6.1.1. Fundamento: ODDI responsables de conocer, mantener actualizada y poner a disposición del Comando la información geoespacial, de infraestructura, recursos y personal en su AOR.\n##### 3.6.1.2. Alcance: Cubre ZODI Capital, La Guaira y Miranda, con enfoque adaptado a sus características y tareas asignadas en la ORDOP.\n#### 3.6.2. ZODI Capital – Distrito Capital\n##### 3.6.2.1. Área de enfoque: Centro histórico de Caracas (Parroquia Catedral), ejes viales de acceso, sedes gubernamentales, hospitales centinelas, sistema de agua y electricidad.\n##### 3.6.2.2. Productos cartográficos requeridos:\n###### 3.6.2.2.1. Mapa Base del Territorio (12h): Plano del Dtto. Capital (433 km²), división parroquial, red vial, hidrografía, curvas de nivel, toponimia. Enfoque en Parroquia Catedral (0,76 km²) y sus 7 sectores (Monte Piedad, Caño Amarillo, Pagüita, Miraflores, El Silencio, Capitolio, La Hoyada).\n###### 3.6.2.2.2. Mapa de Infraestructura Crítica (24h): Georreferenciación de sedes de los Poderes Públicos, hospitales centinelas, plantas eléctricas, subestaciones, acueductos (Sistema Tuy IV), pozos de agua, estaciones del Metro, depósitos de alimentos y combustibles.\n###### 3.6.2.2.3. Mapa de Afectaciones por Sismo (24h): Edificaciones colapsadas o en riesgo, obstrucciones viales, puntos de deslizamiento en laderas, áreas de mayor densidad afectada.\n###### 3.6.2.2.4. Mapa de Recursos Logísticos (SALTE) (24h): Centros de acopio, depósitos de medicamentos, farmacias, talleres, estaciones de servicio, vehículos, maquinaria, equipos de comunicación. Incluir contacto de responsables.\n###### 3.6.2.2.5. Mapa de Organización del Poder Popular (24h): Consejos comunales, UBCH, CLAP, jefes de calle (258), bases de misiones, líderes con capacidad de convocatoria.\n###### 3.6.2.2.6. Mapa de Riesgos y Vulnerabilidades (24h): Zonas de inundación, deslizamientos, fallas geológicas, áreas de alta densidad, zonas de posible aislamiento, rutas de evacuación, puntos de reunión seguros.\n###### 3.6.2.2.7. Calco de Situación Inicial (12h): Representación gráfica al momento de la activación con puestos de control, bloqueos, refugios, hospitales de campaña, rutas de abastecimiento priorizadas.\n##### 3.6.2.3. Información adicional a levantar por el ODDI Capital:\n###### 3.6.2.3.1. Agua: Capacidad de cisternas, pozos operativos, llenaderos, plantas de tratamiento, estado del sistema de acueductos.\n###### 3.6.2.3.2. Energía eléctrica: Estado de subestaciones, plantas de respaldo, disponibilidad de generadores portátiles.\n###### 3.6.2.3.3. Personal disponible: Milicianos, reservistas, personal de seguridad ciudadana, sanitario voluntario, técnicos especializados (electricistas, plomeros, operadores de maquinaria).\n#### 3.6.3. ZODI La Guaira – Estado La Guaira\n##### 3.6.3.1. Área de enfoque: Eje costero, sistema portuario, Aeropuerto Internacional Simón Bolívar, Autopista Caracas-La Guaira (incluyendo Túnel Boquerón 1), zonas industriales, áreas de riesgo de tsunami.\n##### 3.6.3.2. Productos cartográficos requeridos:\n###### 3.6.3.2.1. Mapa Base del Territorio (12h): Plano del estado La Guaira, división municipal, red vial, hidrografía, curvas de nivel, toponimia.\n###### 3.6.3.2.2. Mapa de Infraestructura Crítica (24h): Puerto de La Guaira, Aeropuerto Internacional Simón Bolívar, Túnel Boquerón 1 (1.910 m), plantas eléctricas, subestaciones, acueductos, depósitos de combustible, zonas industriales estratégicas, hospitales centinelas.\n###### 3.6.3.2.3. Mapa de Afectaciones por Sismo (24h): Colapso del Túnel Boquerón 1, daños en puerto y aeropuerto, deslaves en vías costeras, zonas de riesgo de tsunami por subducción de la Falla de El Pilar, daños estructurales en instalaciones portuarias e industriales.\n###### 3.6.3.2.4. Mapa de Recursos Logísticos (SALTE) (24h): Depósitos de alimentos, almacenes de medicamentos, talleres mecánicos portuarios, estaciones de servicio, vehículos (grúas, camiones, embarcaciones menores), maquinaria pesada, equipos de comunicación. Incluir contacto de responsables.\n###### 3.6.3.2.5. Mapa de Rutas Alternas (24h): Vías terrestres alternas al Túnel Boquerón 1, rutas marítimas de abastecimiento y evacuación, puntos de embarque/desembarque en caso de bloqueo del puerto principal.\n###### 3.6.3.2.6. Mapa de Organización del Poder Popular (24h): Consejos comunales costeros, UBCH, CLAP, jefes de calle, pescadores organizados.\n###### 3.6.3.2.7. Mapa de Riesgos y Vulnerabilidades (24h): Zonas de inundación costera por tsunami, áreas de deslizamiento en laderas, zonas de posible aislamiento, rutas de evacuación costera, puntos de reunión seguros en altura.\n###### 3.6.3.2.8. Calco de Situación Inicial (12h): Representación gráfica con puestos de control, bloqueos, refugios, hospitales de campaña, rutas de abastecimiento marítimo y terrestre priorizadas.\n##### 3.6.3.3. Información adicional a levantar por el ODDI La Guaira:\n###### 3.6.3.3.1. Puerto: Estado de muelles, grúas, almacenes, disponibilidad de personal técnico y operadores.\n###### 3.6.3.3.2. Aeropuerto: Estado de pista, torre de control, sistemas de navegación, disponibilidad de personal y equipos de rescate.\n###### 3.6.3.3.3. Túnel Boquerón 1: Grado de colapso, posibilidad de despeje, rutas alternas documentadas.\n###### 3.6.3.3.4. Personal disponible: Milicianos, personal de la Armada, bomberos marítimos, personal sanitario, operadores de maquinaria pesada, personal técnico portuario.\n#### 3.6.4. ZODI Miranda – Estado Miranda\n##### 3.6.4.1. Área de enfoque: Zonas industriales, depósitos de almacenamiento (incluyendo materiales peligrosos), vías de acceso secundarias, comunidades aisladas por deslizamientos, áreas de alta densidad poblacional.\n##### 3.6.4.2. Productos cartográficos requeridos:\n###### 3.6.4.2.1. Mapa Base del Territorio (12h): Plano del estado Miranda, división municipal, red vial principal y secundaria, hidrografía, curvas de nivel, toponimia.\n###### 3.6.4.2.2. Mapa de Infraestructura Crítica (24h): Zonas industriales, depósitos de materiales peligrosos, plantas eléctricas, subestaciones, acueductos, hospitales centinelas, sedes gubernamentales, depósitos de alimentos y combustibles.\n###### 3.6.4.2.3. Mapa de Afectaciones por Sismo (24h): Daños en zonas industriales, fractura de vías secundarias, deslizamientos de tierra, áreas con riesgo de manejo inadecuado de materiales peligrosos, comunidades aisladas.\n###### 3.6.4.2.4. Mapa de Recursos Logísticos (SALTE) (24h): Depósitos de alimentos, almacenes de medicamentos, talleres mecánicos, estaciones de servicio, vehículos (camiones, maquinaria pesada), equipos de comunicación, bodegas comunales. Incluir contacto de responsables.\n###### 3.6.4.2.5. Mapa de Organización del Poder Popular (24h): Consejos comunales, UBCH, CLAP, jefes de calle, otros enlaces comunitarios.\n###### 3.6.4.2.6. Mapa de Riesgos y Vulnerabilidades (24h): Zonas de inundación, deslizamientos, fallas geológicas, áreas de posible aislamiento, rutas de evacuación, puntos de reunión seguros. Identificar depósitos de materiales peligrosos y su nivel de riesgo.\n###### 3.6.4.2.7. Calco de Situación Inicial (12h): Representación gráfica con puestos de control, bloqueos, refugios, hospitales de campaña, rutas de abastecimiento priorizadas.\n##### 3.6.4.3. Información adicional a levantar por el ODDI Miranda:\n###### 3.6.4.3.1. Materiales peligrosos: Inventario georreferenciado de depósitos con químicos, combustibles, explosivos, tóxicos; estado de medidas de seguridad; contacto de responsables técnicos.\n###### 3.6.4.3.2. Vías de acceso: Estado de vías secundarias, puntos de fractura, rutas alternas, priorización de vías para reparación.\n###### 3.6.4.3.3. Comunidades aisladas: Identificación de comunidades incomunicadas, censo de población y necesidades básicas (agua, alimentos, medicinas).\n###### 3.6.4.3.4. Personal disponible: Milicianos, personal de seguridad ciudadana, bomberos industriales, brigadas de emergencia, personal sanitario y técnico especializado.\n#### 3.6.5. Cronograma de entrega y actualización\n##### 3.6.5.1. Fase 0 (H+0 a H+12): Mapas base, calcos de situación inicial y mapas de infraestructura crítica.\n##### 3.6.5.2. Fase 1 (H+12 a H+24): Mapas de afectaciones, recursos logísticos (SALTE), organización del poder popular, y riesgos/vulnerabilidades.\n##### 3.6.5.3. Fase 2 (durante toda la operación): Actualización diaria de la información cartográfica, reportando cambios significativos.\n#### 3.6.6. Consideraciones finales de la requisición\n##### 3.6.6.1. ODDI son coordinadores, no ejecutores.\n##### 3.6.6.2. Información debe ser georreferenciada (UTM o grados decimales) y entregada en formato digital (shapefile, Google Earth, o mapas impresos a escala).\n##### 3.6.6.3. Cartografía dinámica: actualización continua durante la operación.\n##### 3.6.6.4. Seguridad de la información bajo responsabilidad de cada ODDI, con clasificación y cadena de custodia.\n##### 3.6.6.5. Aprobado por P1 – Jefe del Estado Mayor.\n\n---\n\n## 4. DOCUMENTO 3: INFORME DE OPERACIONES ODDI «DESASTRE» 02-2026 -001 (ANEXOS C1-C5)\n\n### 4.1. Encabezado del informe\n#### 4.1.1. ORIGINAL-3/COPIAS – REDI ESPECIAL CARACAS (7.85698, -67.50759) – 170600JUN26 – ZAMORA-DESASTRES\n#### 4.1.2. Referencias:\n##### 4.1.2.1. Constitución de la República Bolivariana de Venezuela (Gaceta Extraordinario N° 5.908)\n##### 4.1.2.2. Ley Constitucional de la FANB (Gaceta Extraordinario N° 6.508)\n##### 4.1.2.3. Ley del Comando para la Defensa Integral de la Nación\n##### 4.1.2.4. Decreto Presidencial N° 5.078 (Gaceta Oficial del 8 de enero de 2025)\n##### 4.1.2.5. Ley Orgánica de Seguridad de la Nación (Decreto N° 1.473)\n##### 4.1.2.6. Manual de Personal del Ejército Venezolano (Mayor Eduardo Chacín, mayo 2026)\n##### 4.1.2.7. Cuadernos de Trabajo para los Comités de los ODDI (Lic. Gerard Sieveres, junio 2026)\n##### 4.1.2.8. Curso de Operaciones de Defensa Integral (CODDI) – Pensum de Estudio (Lic. Gerard Sieveres, junio 2026)\n\n### 4.2. Anexo A: INFORME DEL COMITÉ PATRIÓTICO BOLIVARIANO (C1)\n#### 4.2.1. Misión\n##### 4.2.1.1. Coordinar la difusión de información oficial, contrainformación, educación patriótica y actividades de bienestar y moral para el ODDI y la población civil afectada, garantizando cohesión social y apoyo a las decisiones del Estado Mayor ZODI/REDI.\n#### 4.2.2. Maniobra\n##### 4.2.2.1. Desplegar equipos de comunicación en zonas afectadas, monitorear opinión pública, contrarrestar rumores mediante comunicados y redes sociales, coordinar con capellanes y servicios especiales (cine, deportes, bibliotecas) para mantener la moral en refugios.\n#### 4.2.3. Consideraciones propias del terreno\n##### 4.2.3.1. Alta vulnerabilidad a la desinformación y rumores.\n##### 4.2.3.2. Necesidad de mantener la moral de la tropa y la población civil.\n##### 4.2.3.3. Importancia de la coordinación con medios de comunicación locales y nacionales.\n#### 4.2.4. Tareas por fases\n##### 4.2.4.1. Fase 0 (H+0 a H+12):\n###### 4.2.4.1.1. Activar Subcomité de Información Pública y Relaciones para emisión de comunicados oficiales iniciales.\n###### 4.2.4.1.2. Establecer enlace con medios locales para difusión de mensajes de calma y orientación.\n###### 4.2.4.1.3. Activar Subcomité de Moral y Servicios de Personal para evaluar el estado de moral en unidades afectadas.\n##### 4.2.4.2. Fase 1 (H+12 a H+24):\n###### 4.2.4.2.1. Monitorear y contrarrestar activamente rumores y desinformación en redes y medios comunitarios.\n###### 4.2.4.2.2. Organizar actividades de bienestar (cine, deportes, charlas) en refugios.\n###### 4.2.4.2.3. Coordinar con el Capellán para atención espiritual de damnificados y personal de respuesta.\n##### 4.2.4.3. Fase 2 (H+24 en adelante):\n###### 4.2.4.3.1. Mantener campaña de información continua, destacando logros de la operación y acciones de ayuda humanitaria.\n###### 4.2.4.3.2. Evaluar el impacto de las actividades de bienestar en la moral de la población.\n###### 4.2.4.3.3. Actualizar mensajes según la evolución de la situación.\n#### 4.2.5. Instrucciones de coordinación\n##### 4.2.5.1. Coordinar con C3 (Social) para alinear mensajes con acciones de asistencia social.\n##### 4.2.5.2. Coordinar con C2 (Económico) para difundir información sobre disponibilidad de recursos logísticos.\n##### 4.2.5.3. Coordinar con C4 (Orden Interno) para garantizar que la información pública no interfiera con medidas de seguridad y control de acceso.\n\n### 4.3. Anexo B: INFORME DEL COMITÉ ECONÓMICO, PRODUCTIVO Y DE SERVICIOS (C2)\n#### 4.3.1. Misión\n##### 4.3.1.1. Coordinar el levantamiento y actualización del inventario de recursos logísticos (SALTE), administración de mano de obra civil disponible y gestión de servicios de cantinas y finanzas en zonas afectadas, para garantizar sostenimiento de la operación y atención a la población damnificada.\n#### 4.3.2. Maniobra\n##### 4.3.2.1. Desplegar equipos de reconocimiento para identificar y georreferenciar depósitos de alimentos, medicinas, vehículos, maquinaria, combustibles y equipos de comunicación. Clasificar y movilizar mano de obra civil voluntaria u obligatoria. Asegurar operación de cantinas fijas y móviles en refugios.\n#### 4.3.3. Consideraciones propias del terreno\n##### 4.3.3.1. Posible colapso de cadenas de suministro y distribución.\n##### 4.3.3.2. Necesidad de movilizar rápidamente mano de obra especializada.\n##### 4.3.3.3. Riesgo de saqueos y mercado negro en zonas afectadas.\n#### 4.3.4. Tareas por fases\n##### 4.3.4.1. Fase 0 (H+0 a H+12):\n###### 4.3.4.1.1. Activar Subcomité de Requisición y Registro para iniciar levantamiento del inventario de recursos logísticos (SALTE).\n###### 4.3.4.1.2. Activar Subcomité de Administración de Personal Civil para identificar y clasificar mano de obra civil disponible.\n##### 4.3.4.2. Fase 1 (H+12 a H+24):\n###### 4.3.4.2.1. Entregar Mapa de Recursos Logísticos (SALTE) al Estado Mayor.\n###### 4.3.4.2.2. Organizar y movilizar los primeros equipos de mano de obra civil para remoción de escombros y distribución de suministros.\n###### 4.3.4.2.3. Activar el Servicio de Cantinas en refugios y albergues.\n##### 4.3.4.3. Fase 2 (H+24 en adelante):\n###### 4.3.4.3.1. Actualizar diariamente el inventario de recursos logísticos y reportar cambios al Estado Mayor.\n###### 4.3.4.3.2. Gestionar reposición de suministros y rotación de mano de obra civil.\n###### 4.3.4.3.3. Implementar medidas de control para evitar mercado negro y garantizar distribución equitativa.\n#### 4.3.5. Instrucciones de coordinación\n##### 4.3.5.1. Coordinar con C5 (Movilización) para la gestión de requisición legal de bienes y movilización de recursos.\n##### 4.3.5.2. Coordinar con C3 (Social) para garantizar que la distribución de alimentos y suministros llegue a grupos vulnerables.\n##### 4.3.5.3. Coordinar con C4 (Orden Interno) para la seguridad de depósitos y protección de convoyes de suministros.\n\n### 4.4. Anexo C: INFORME DEL COMITÉ SOCIAL POPULAR (C3)\n#### 4.4.1. Misión\n##### 4.4.1.1. Coordinar la atención humanitaria a la población damnificada, protección de derechos humanos e integración social en zonas afectadas, garantizando acceso a albergues, alimentos, salud y asistencia social para grupos vulnerables.\n#### 4.4.2. Maniobra\n##### 4.4.2.1. Identificar y registrar damnificados, habilitar albergues y centros de acopio, coordinar con misiones sociales (salud, alimentación, educación) y organizaciones humanitarias (Cruz Roja) para prestación de servicios básicos. Monitorear posibles violaciones de derechos humanos en refugios.\n#### 4.4.3. Consideraciones propias del terreno\n##### 4.4.3.1. Alta concentración de población vulnerable (niños, ancianos, personas con discapacidad).\n##### 4.4.3.2. Riesgo de brotes de enfermedades en albergues por hacinamiento.\n##### 4.4.3.3. Necesidad de coordinar con comunidades organizadas (consejos comunales, UBCH).\n#### 4.4.4. Tareas por fases\n##### 4.4.4.1. Fase 0 (H+0 a H+12):\n###### 4.4.4.1.1. Activar Subcomité de Asuntos Civiles para establecer contacto con consejos comunales y autoridades locales.\n###### 4.4.4.1.2. Iniciar censo de damnificados e identificación de albergues potenciales (escuelas, iglesias, centros comunales).\n###### 4.4.4.1.3. Activar Subcomité de Misiones Sociales para coordinar respuesta de salud y alimentación.\n##### 4.4.4.2. Fase 1 (H+12 a H+24):\n###### 4.4.4.2.1. Entregar Mapa de Organización del Poder Popular y censo inicial de damnificados al Estado Mayor.\n###### 4.4.4.2.2. Habilitar los primeros albergues y centros de acopio, garantizando agua, alimentos y atención médica básica.\n###### 4.4.4.2.3. Iniciar monitoreo de derechos humanos en refugios.\n##### 4.4.4.3. Fase 2 (H+24 en adelante):\n###### 4.4.4.3.1. Actualizar diariamente el registro de damnificados y condiciones en albergues.\n###### 4.4.4.3.2. Coordinar con misiones sociales la prestación de servicios continuos (educación, salud mental, recreación).\n###### 4.4.4.3.3. Implementar plan de rehabilitación comunitaria para zonas afectadas.\n#### 4.4.5. Instrucciones de coordinación\n##### 4.4.5.1. Coordinar con C1 (Patriótico) para difusión de información sobre servicios de asistencia social.\n##### 4.4.5.2. Coordinar con C2 (Económico) para garantizar suministro de alimentos, medicinas y otros insumos a albergues.\n##### 4.4.5.3. Coordinar con C4 (Orden Interno) para garantizar seguridad en albergues y protección de damnificados.\n\n### 4.5. Anexo D: INFORME DEL COMITÉ DE ORDEN INTERNO (C4)\n#### 4.5.1. Misión\n##### 4.5.1.1. Coordinar medidas de seguridad, disciplina y gestión de riesgos en el territorio afectado, en coordinación con la PNB y organismos de protección civil, para garantizar orden público, protección de instalaciones críticas y gestión de riesgos post-desastre.\n#### 4.5.2. Maniobra\n##### 4.5.2.1. Establecer puestos de control de acceso a zonas críticas y refugios, en coordinación con la PNB. Activar Subcomité de Sistema de Riesgos para levantamiento de daños e identificación de riesgos secundarios (derrumbes, fugas, deslizamientos). Coordinar con Protección Civil y bomberos para respuesta a emergencias.\n#### 4.5.3. Consideraciones propias del terreno\n##### 4.5.3.1. Riesgo de saqueos, vandalismo y desorden público.\n##### 4.5.3.2. Presencia de materiales peligrosos en zonas industriales.\n##### 4.5.3.3. Necesidad de controlar acceso a áreas de alto riesgo.\n#### 4.5.4. Tareas por fases\n##### 4.5.4.1. Fase 0 (H+0 a H+12):\n###### 4.5.4.1.1. Activar Subcomité de Seguridad contra Accidentes y Riesgos (Sistema de Riesgos) para iniciar levantamiento de consecuencias post-desastre.\n###### 4.5.4.1.2. Activar Subcomité de Disciplina, Ley y Orden para coordinar con la PNB el establecimiento de puestos de control de acceso.\n###### 4.5.4.1.3. Activar Subcomité de Operaciones Especiales para adaptar procedimientos a características del terreno (costa, montaña, urbano).\n##### 4.5.4.2. Fase 1 (H+12 a H+24):\n###### 4.5.4.2.1. Entregar Mapa de Afectaciones por Sismo, Mapa de Riesgos y Vulnerabilidades, y Plan de Mitigación Inicial al Estado Mayor.\n###### 4.5.4.2.2. Coordinar con PNB y Protección Civil la evacuación de zonas de alto riesgo y apertura de rutas seguras.\n###### 4.5.4.2.3. Implementar plan de seguridad para refugios y centros de acopio.\n##### 4.5.4.3. Fase 2 (H+24 en adelante):\n###### 4.5.4.3.1. Actualizar diariamente el informe de incidentes de seguridad y estado de riesgos identificados.\n###### 4.5.4.3.2. Supervisar ejecución de medidas de mitigación (despeje de escombros, aseguramiento de depósitos peligrosos).\n###### 4.5.4.3.3. Reportar al Estado Mayor cualquier cambio significativo en orden público o escenarios de riesgo.\n#### 4.5.5. Instrucciones de coordinación\n##### 4.5.5.1. Coordinar con C2 (Económico) para despliegue de maquinaria y personal técnico en tareas de mitigación.\n##### 4.5.5.2. Coordinar con C3 (Social) para garantizar seguridad de damnificados y protección de grupos vulnerables.\n##### 4.5.5.3. Coordinar con C5 (Movilización) para gestión de requisición de equipos y materiales necesarios para mitigación.\n\n### 4.6. Anexo E: INFORME DEL COMITÉ DE MOVILIZACIÓN Y REQUISICIÓN (C5)\n#### 4.6.1. Misión\n##### 4.6.1.1. Coordinar el control de efectivos, flujo de reemplazos y requisición legal de bienes y servicios para sostener la operación, garantizando disponibilidad de personal y recursos necesarios para la respuesta al desastre.\n#### 4.6.2. Maniobra\n##### 4.6.2.1. Mantener actualizada la Situación Diaria de Personal (SDP) y el Cuadro de Control Detallado, gestionar flujo de reemplazos desde el interior, y aplicar procedimientos de requisición legal de vehículos, maquinaria, alimentos y otros bienes conforme a la ley.\n#### 4.6.3. Consideraciones propias del terreno\n##### 4.6.3.1. Necesidad de movilizar rápidamente personal de refuerzo (milicianos, reservistas) a zonas afectadas.\n##### 4.6.3.2. Importancia de la requisición legal de bienes para garantizar operatividad de la respuesta.\n##### 4.6.3.3. Riesgo de desabastecimiento de personal y recursos si no se gestiona adecuadamente el flujo de reemplazos.\n#### 4.6.4. Tareas por fases\n##### 4.6.4.1. Fase 0 (H+0 a H+12):\n###### 4.6.4.1.1. Activar Subcomité de Mantenimiento del Efectivo para iniciar registro de personal disponible y elaboración de la SDP.\n###### 4.6.4.1.2. Activar Subcomité de Reemplazos y Movilización para iniciar apreciación de necesidades de personal y coordinación con el sistema de reemplazos.\n###### 4.6.4.1.3. Activar Subcomité de Requisición y Registro para iniciar levantamiento del registro de medios productivos.\n##### 4.6.4.2. Fase 1 (H+12 a H+24):\n###### 4.6.4.2.1. Entregar la SDP y el Cuadro de Control Detallado al Estado Mayor.\n###### 4.6.4.2.2. Formular los primeros pedidos de reemplazos y gestionar su movilización a zonas afectadas.\n###### 4.6.4.2.3. Aplicar procedimientos de requisición legal para obtención de vehículos, maquinaria y equipos de comunicación.\n##### 4.6.4.3. Fase 2 (H+24 en adelante):\n###### 4.6.4.3.1. Actualizar diariamente la SDP y el Cuadro de Control Detallado.\n###### 4.6.4.3.2. Mantener flujo de reemplazos y gestionar rotación del personal.\n###### 4.6.4.3.3. Actualizar registro de medios productivos y gestionar nuevas requisiciones según necesidades de la operación.\n#### 4.6.5. Instrucciones de coordinación\n##### 4.6.5.1. Coordinar con C2 (Económico) para verificación de disponibilidad de recursos y gestión de requisición de bienes.\n##### 4.6.5.2. Coordinar con C4 (Orden Interno) para custodia de bienes requisados y seguridad de centros de acopio.\n##### 4.6.5.3. Coordinar con C1 (Patriótico) para difusión de información sobre procedimientos de requisición y movilización.\n#### 4.6.6. Visto Bueno: Coordinador General ODDI – REDI CAPITAL – Fecha de Emisión: 17 de junio de 2026\n\n---\n\n## 5. DOCUMENTO 4: REPORTE FINAL CARTELERA – OPERACIÓN DESASTRE 02-2026\n\n### 5.1. ZODI CAPITAL – DISTRITO CAPITAL\n#### 5.1.1. MISIÓN\n##### 5.1.1.1. Coordinar la información territorial de 433 km² del Distrito Capital, priorizando la Parroquia Catedral y sus 7 sectores (Monte Piedad, Caño Amarillo, Pagüita, Miraflores, El Silencio, Capitolio, La Hoyada), para poner a disposición del Comando ZODI el conocimiento geográfico, recursos y enlaces que permitan la ejecución del plan de respuesta ante el sismo, sin sustituir ni ejecutar competencias operativas.\n#### 5.1.2. MANIOBRA\n##### 5.1.2.1. Desplegar equipos de reconocimiento en terreno para actualización de cartografía, identificación de daños y levantamiento de consecuencias post-sismo; consolidar información en Sala Situacional del ODDI; entregar productos cartográficos e informes de enlace en plazos establecidos (Fase 0: 12h; Fase 1: 24h; Fase 2: continuo).\n#### 5.1.3. CONSIDERACIONES PROPIAS DEL TERRENO\n##### 5.1.3.1. Centro histórico de Caracas (Parroquia Catedral) con alta densidad poblacional (>50.000 hab en 0,76 km²).\n##### 5.1.3.2. Ejes viales colapsados (Av. Urdaneta, Baralt, Fuerzas Armadas).\n##### 5.1.3.3. Edificaciones coloniales y gubernamentales vulnerables (Palacio de Miraflores, Asamblea Nacional, sedes de Alcaldías).\n##### 5.1.3.4. Sistema de acueductos y electricidad del Área Metropolitana (Sistema Tuy IV) con posibles fugas o cortes.\n##### 5.1.3.5. Estaciones del Metro (Caño Amarillo, Capitolio, La Hoyada) con riesgo de inundación o colapso estructural.\n##### 5.1.3.6. Zonas de ladera (Monte Piedad, Pagüita) con alto riesgo de deslizamientos.\n#### 5.1.4. TAREAS POR FASES\n##### 5.1.4.1. Fase 0 (H+0 a H+12):\n###### 5.1.4.1.1. Entregar Mapa Base del Territorio actualizado.\n###### 5.1.4.1.2. Entregar Calco de Situación Inicial con ubicación de puestos de control, bloqueos, refugios temporales y hospitales de campaña.\n###### 5.1.4.1.3. Activar Sala Situacional del ODDI y establecer comunicación con Estado Mayor ZODI.\n###### 5.1.4.1.4. Activar los cinco comités ODDI y sus subcomités, asignando responsabilidades específicas.\n###### 5.1.4.1.5. Iniciar levantamiento de información sobre daños en infraestructura crítica.\n##### 5.1.4.2. Fase 1 (H+12 a H+24):\n###### 5.1.4.2.1. Entregar Mapa de Afectaciones por Sismo.\n###### 5.1.4.2.2. Entregar Mapa de Recursos Logísticos (SALTE).\n###### 5.1.4.2.3. Entregar Mapa de Organización del Poder Popular.\n###### 5.1.4.2.4. Entregar Mapa de Riesgos y Vulnerabilidades.\n###### 5.1.4.2.5. Activar Subcomité de Riesgos (C4) para levantamiento de consecuencias post-sismo.\n##### 5.1.4.3. Fase 2 (H+24 en adelante):\n###### 5.1.4.3.1. Actualizar diariamente la información cartográfica, reportando cambios significativos.\n###### 5.1.4.3.2. Gestionar enlaces con instituciones, empresas y organizaciones sociales para mantener actualizados inventarios y personal disponible.\n###### 5.1.4.3.3. Coordinar con Subcomité de Riesgos (C4) para identificación de riesgos secundarios y propuesta de medidas de mitigación.\n#### 5.1.5. INSTRUCCIONES DE COORDINACIÓN\n##### 5.1.5.1. C1 – Patriótico: Emitir comunicados oficiales, contrarrestar rumores, coordinar con Capellán y servicios especiales, coordinar con INCE para formación de voluntarios.\n##### 5.1.5.2. C2 – Económico: Actualizar inventario de recursos logísticos, coordinar con empresas, administrar mano de obra civil.\n##### 5.1.5.3. C3 – Social: Coordinar con consejos comunales, UBCH y CLAP para distribución de alimentos y atención a damnificados, gestionar refugiados, proteger derechos humanos.\n##### 5.1.5.4. C4 – Orden Interno: Coordinar con PNB y Protección Civil para control de accesos y seguridad de instalaciones críticas, activar Subcomité de Riesgos, coordinar con J2.\n##### 5.1.5.5. C5 – Movilización: Mantener actualizada SDP y Cuadro de Control Detallado, coordinar con CEO flujo de reemplazos, gestionar requisición legal de bienes.\n\n### 5.2. ZODI LA GUAIRA – ESTADO LA GUAIRA\n#### 5.2.1. MISIÓN\n##### 5.2.1.1. Coordinar la información territorial del estado La Guaira, con enfoque en el eje costero, sistema portuario, Aeropuerto Internacional Simón Bolívar, Túnel Boquerón 1 y zonas industriales, para poner a disposición del Comando ZODI el conocimiento geográfico, recursos y enlaces que permitan la ejecución del plan de respuesta ante el sismo y posible tsunami, sin sustituir ni ejecutar competencias operativas.\n#### 5.2.2. MANIOBRA\n##### 5.2.2.1. Desplegar equipos de reconocimiento en terreno para actualización de cartografía costera, identificación de daños en infraestructura portuaria y aeroportuaria, y levantamiento de consecuencias post-tsunami; consolidar información en Sala Situacional del ODDI; entregar productos en plazos establecidos.\n#### 5.2.3. CONSIDERACIONES PROPIAS DEL TERRENO\n##### 5.2.3.1. Eje costero con alta vulnerabilidad a tsunami por subducción de la Falla de El Pilar.\n##### 5.2.3.2. Sistema portuario (Bolipuertos) estratégico, con posible colapso de muelles y grúas.\n##### 5.2.3.3. Aeropuerto Internacional Simón Bolívar, principal puerta de entrada al país, con posible daño en pista, torre de control y sistemas de navegación.\n##### 5.2.3.4. Túnel Boquerón 1 (1.910 m) principal vía de acceso terrestre a Caracas, con posible colapso o bloqueo.\n##### 5.2.3.5. Zonas industriales con depósitos de combustible, materiales peligrosos y maquinaria pesada.\n##### 5.2.3.6. Autopista Caracas-La Guaira y vías costeras con riesgo de deslaves y obstrucciones.\n#### 5.2.4. TAREAS POR FASES\n##### 5.2.4.1. Fase 0: Entregar Mapa Base del Territorio, Calco de Situación Inicial, activar Sala Situacional y los cinco comités, iniciar levantamiento de daños en puerto, aeropuerto, túnel y vías costeras.\n##### 5.2.4.2. Fase 1: Entregar Mapa de Afectaciones por Sismo y Tsunami, Mapa de Recursos Logísticos (SALTE), Mapa de Rutas Alternas (terrestres y marítimas), Mapa de Organización del Poder Popular, Mapa de Riesgos y Vulnerabilidades; activar Subcomité de Riesgos (C4) para levantamiento de consecuencias post-tsunami.\n##### 5.2.4.3. Fase 2: Actualizar diariamente la información cartográfica, gestionar enlaces con Bolipuertos, concesionario del aeropuerto, empresas industriales, Capitanía de Puerto y Armada; coordinar con Subcomité de Riesgos (C4) para identificación de riesgos secundarios (fugas de materiales peligrosos, contaminación marina) y propuesta de mitigación.\n#### 5.2.5. INSTRUCCIONES DE COORDINACIÓN\n##### 5.2.5.1. C1: Emitir comunicados oficiales contrarrestando rumores sobre magnitud del tsunami y estado del puerto; coordinar con Capellán.\n##### 5.2.5.2. C2: Actualizar inventario de recursos logísticos en puerto y aeropuerto (grúas, equipos de remoción, vehículos, combustibles); coordinar con empresas industriales para verificación de materiales peligrosos; administrar mano de obra civil (operarios portuarios, técnicos aeronáuticos).\n##### 5.2.5.3. C3: Coordinar con consejos comunales costeros para evacuación y apertura de refugios en altura; gestionar refugiados; proteger derechos humanos de pescadores y comunidades costeras.\n##### 5.2.5.4. C4: Coordinar con PNB, Protección Civil y Armada para control de accesos a puerto y aeropuerto; activar Subcomité de Riesgos; coordinar con J2.\n##### 5.2.5.5. C5: Mantener SDP con énfasis en personal de la Armada y operarios portuarios; coordinar con CEO flujo de reemplazos; gestionar requisición de embarcaciones menores y vehículos de carga.\n\n### 5.3. ZODI MIRANDA – ESTADO MIRANDA\n#### 5.3.1. MISIÓN\n##### 5.3.1.1. Coordinar la información territorial del estado Miranda, con enfoque en zonas industriales, depósitos de materiales peligrosos, vías de acceso secundarias y comunidades aisladas, para poner a disposición del Comando ZODI el conocimiento geográfico, recursos y enlaces que permitan la ejecución del plan de respuesta ante el sismo y sus consecuencias (deslizamientos, aislamiento, riesgos industriales), sin sustituir ni ejecutar competencias operativas.\n#### 5.3.2. MANIOBRA\n##### 5.3.2.1. Desplegar equipos de reconocimiento para actualización de cartografía industrial, identificación de daños en vías secundarias y depósitos de materiales peligrosos, y levantamiento de consecuencias post-sismo (comunidades aisladas, fugas tóxicas); consolidar información en Sala Situacional; entregar productos en plazos establecidos.\n#### 5.3.3. CONSIDERACIONES PROPIAS DEL TERRENO\n##### 5.3.3.1. Zonas industriales con alta concentración de depósitos de materiales peligrosos (químicos, combustibles, explosivos).\n##### 5.3.3.2. Vías de acceso secundarias con riesgo de fractura y deslizamientos, aislando comunidades.\n##### 5.3.3.3. Alta densidad poblacional en municipios con posibles daños estructurales y deslizamientos.\n##### 5.3.3.4. Depósitos de alimentos y almacenes estratégicos en zonas industriales.\n##### 5.3.3.5. Presencia de industrias básicas (petroquímicas, metalúrgicas, de alimentos) con capacidad de producción y almacenamiento.\n#### 5.3.4. TAREAS POR FASES\n##### 5.3.4.1. Fase 0: Entregar Mapa Base del Territorio, Calco de Situación Inicial, activar Sala Situacional y los cinco comités, iniciar levantamiento de daños en zonas industriales, vías secundarias y depósitos de materiales peligrosos.\n##### 5.3.4.2. Fase 1: Entregar Mapa de Afectaciones por Sismo, Mapa de Recursos Logísticos (SALTE), Mapa de Organización del Poder Popular, Mapa de Riesgos y Vulnerabilidades (incluyendo depósitos de materiales peligrosos con su nivel de riesgo); activar Subcomité de Riesgos (C4) para levantamiento de consecuencias en zonas industriales y comunidades aisladas.\n##### 5.3.4.3. Fase 2: Actualizar diariamente la información cartográfica, gestionar enlaces con empresas industriales, ministerios (Industrias, Ambiente), consejos comunales y UBCH; coordinar con Subcomité de Riesgos (C4) para identificación de riesgos secundarios (fugas de materiales peligrosos, derrames, contaminación de fuentes de agua) y propuesta de mitigación.\n#### 5.3.5. INSTRUCCIONES DE COORDINACIÓN\n##### 5.3.5.1. C1: Emitir comunicados oficiales contrarrestando rumores sobre fugas tóxicas y estado de vías; coordinar con Capellán.\n##### 5.3.5.2. C2: Actualizar inventario de recursos logísticos en zonas industriales (vehículos, maquinaria pesada, equipos de remoción); coordinar con empresas para verificación de inventarios y seguridad de instalaciones; administrar mano de obra civil (operarios industriales, técnicos, bomberos industriales).\n##### 5.3.5.3. C3: Coordinar con consejos comunales y UBCH para distribución de alimentos y atención a comunidades aisladas; gestionar refugiados; proteger derechos humanos de comunidades indígenas y asentamientos informales.\n##### 5.3.5.4. C4: Coordinar con PNB, Protección Civil y bomberos industriales para control de accesos a zonas industriales y seguridad de depósitos de materiales peligrosos; activar Subcomité de Riesgos; coordinar con J2.\n##### 5.3.5.5. C5: Mantener SDP con énfasis en personal técnico y de emergencia; coordinar con CEO flujo de reemplazos; gestionar requisición de vehículos de carga y equipos de manejo de materiales peligrosos.\n\n### 5.4. MAPA DE MISIÓN – ANÁLISIS INTEGRADO (comparativa por ZODI)\n#### 5.4.1. Población afectada estimada\n##### 5.4.1.1. ZODI Capital: >50.000 (Parroquia Catedral)\n##### 5.4.1.2. ZODI La Guaira: >100.000 (zona costera)\n##### 5.4.1.3. ZODI Miranda: >150.000 (zonas industriales y comunidades aisladas)\n#### 5.4.2. Infraestructura crítica priorizada\n##### 5.4.2.1. ZODI Capital: Palacio de Miraflores, Asamblea Nacional, hospitales centinelas, sistema de acueductos (Tuy IV), Metro de Caracas.\n##### 5.4.2.2. ZODI La Guaira: Puerto de La Guaira, Aeropuerto Internacional Simón Bolívar, Túnel Boquerón 1, depósitos de combustible, plantas eléctricas.\n##### 5.4.2.3. ZODI Miranda: Zonas industriales, depósitos de materiales peligrosos, plantas eléctricas, subestaciones, depósitos de alimentos.\n#### 5.4.3. Riesgos secundarios identificados\n##### 5.4.3.1. ZODI Capital: Deslizamientos en laderas (Monte Piedad, Pagüita), colapso de edificaciones antiguas, inundaciones por rotura de acueductos, saqueos.\n##### 5.4.3.2. ZODI La Guaira: Tsunami, derrame de combustible en el puerto, colapso de vías costeras, contaminación marina, obstrucción del Túnel Boquerón 1.\n##### 5.4.3.3. ZODI Miranda: Fugas de materiales peligrosos, contaminación de fuentes de agua, aislamiento de comunidades, deslizamientos en vías secundarias, incendios industriales.\n#### 5.4.4. Recursos logísticos prioritarios (SALTE)\n##### 5.4.4.1. ZODI Capital: Alimentos, medicinas, vehículos de rescate, maquinaria de remoción, equipos de comunicación.\n##### 5.4.4.2. ZODI La Guaira: Grúas, embarcaciones menores, vehículos de carga, equipos de remoción de escombros, maquinaria pesada.\n##### 5.4.4.3. ZODI Miranda: Camiones, maquinaria pesada, equipos de manejo de materiales peligrosos, equipos de comunicación, bodegas comunales.\n#### 5.4.5. Organización del poder popular activada\n##### 5.4.5.1. ZODI Capital: Consejos comunales (Parroquia Catedral), UBCH, CLAP, jefes de calle (258 contactos).\n##### 5.4.5.2. ZODI La Guaira: Consejos comunales costeros, UBCH, CLAP, pescadores organizados.\n##### 5.4.5.3. ZODI Miranda: Consejos comunales, UBCH, CLAP, jefes de calle en municipios afectados.\n#### 5.4.6. Articulaciones críticas\n##### 5.4.6.1. ZODI Capital: Alcaldía de Caracas, Ministerio de Salud, MPPS, Policía Nacional, Protección Civil, Metro de Caracas.\n##### 5.4.6.2. ZODI La Guaira: Bolipuertos, concesionario del aeropuerto, Capitanía de Puerto, Armada, Ministerio de Transporte, empresas industriales.\n##### 5.4.6.3. ZODI Miranda: Ministerios de Industrias y Ambiente, empresas industriales, bomberos industriales, Policía Nacional, Protección Civil.\n#### 5.4.7. Recomendación principal\n##### 5.4.7.1. ZODI Capital: Priorizar despeje de vías en Av. Urdaneta, Baralt y Fuerzas Armadas para garantizar acceso a hospitales. Habilitar albergues en escuelas y edificios públicos de zonas altas. Activar Subcomité de Riesgos para inspección de laderas.\n##### 5.4.7.2. ZODI La Guaira: Priorizar evaluación de daños en Túnel Boquerón 1 y habilitación de rutas alternas terrestres y marítimas. Evaluar riesgo de tsunami en la costa y activar protocolos de evacuación. Inspeccionar puerto para detectar fugas de combustible.\n##### 5.4.7.3. ZODI Miranda: Priorizar inspección de depósitos de materiales peligrosos y contención de posibles fugas. Habilitar vías de acceso secundarias para llegar a comunidades aisladas. Coordinar con bomberos industriales y protección civil para prevención de incendios.\n\n---\n\n## 6. CIERRE Y RECOMENDACIONES GENERALES\n\n### 6.1. Síntesis integradora de los cuatro documentos\n#### 6.1.1. El documento de Funcionamiento (002) establece el marco procedimental y la estructura de comités.\n#### 6.1.2. El Rol de los ODDI (001) detalla el conocimiento territorial, recursos y enlaces por ZODI, así como las requisiciones cartográficas.\n#### 6.1.3. El Informe de Operaciones (con anexos C1-C5) desarrolla misiones, maniobras y tareas por fases para cada comité.\n#### 6.1.4. El Reporte Final Cartelera consolida la información por ZODI y ofrece un análisis comparativo integrado.\n\n### 6.2. Lecciones para la coordinación territorial en desastres\n#### 6.2.1. La claridad en los roles (coordinador vs. ejecutor) evita duplicidades y conflictos de mando.\n#### 6.2.2. La estructura de cinco comités (C1 a C5) permite abordar integralmente la información, logística, protección social, orden interno y movilización.\n#### 6.2.3. El Subcomité de Riesgos (dentro de C4) es fundamental para la gestión proactiva de impactos secundarios, diferenciando una respuesta reactiva de una gestión de consecuencias.\n#### 6.2.4. La cartografía georreferenciada y actualizada diariamente es el eje de la toma de decisiones del Estado Mayor.\n\n### 6.3. Recomendaciones para el usuario final\n#### 6.3.1. Este documento integrado puede utilizarse como base para la planificación de futuras operaciones de defensa integral en contextos de desastre.\n#### 6.3.2. Se recomienda mantener los formatos de reporte (SDP, IPP, mapas, matrices de riesgos) estandarizados para facilitar la comparación y el aprendizaje organizacional.\n#### 6.3.3. La actualización diaria de la información debe ser una práctica obligatoria, reportando incluso \"no cambios\" para mantener la certeza operativa.\n\n**Fin del documento integrado**";
    function parsear(texto){
        const lineas=texto.split(/\r?\n/);
        const nodos=[]; let pila=[]; let id=1;
        for(let linea of lineas){
            linea=linea.trim(); if(!linea)continue;
            let nivel=-1, etiqueta=linea;
            if(linea.startsWith("# ")){nivel=0; etiqueta=linea.slice(2).trim();}
            else if(linea.startsWith("## ")){nivel=1; etiqueta=linea.slice(3).trim();}
            else if(linea.startsWith("### ")){nivel=2; etiqueta=linea.slice(4).trim();}
            else if(linea.startsWith("#### ")){nivel=3; etiqueta=linea.slice(5).trim();}
            else if(linea.startsWith("##### ")){nivel=4; etiqueta=linea.slice(6).trim();}
            else if(linea.startsWith("- ")||linea.startsWith("* ")){nivel=pila.length?pila[pila.length-1].nivel+1:1; etiqueta=linea.slice(2).trim();}
            else{nivel=pila.length?pila[pila.length-1].nivel+1:1; etiqueta=linea;}
            while(pila.length&&pila[pila.length-1].nivel>=nivel) pila.pop();
            const padreId=pila.length?pila[pila.length-1].id:null;
            const nuevoId=id++;
            nodos.push({id:nuevoId, etiqueta, nivel, padreId});
            pila.push({id:nuevoId, nivel});
        }
        const hijosMap=new Map(); nodos.forEach(n=>hijosMap.set(n.id,[]));
        nodos.forEach(n=>{if(n.padreId) hijosMap.get(n.padreId).push(n.id);});
        const raices=nodos.filter(n=>n.padreId===null);
        return {nodos, hijosMap, raices};
    }
    function renderizar(raices, nodosMap, hijosMap){
        const contenedor=document.getElementById('mapa');
        if(!raices.length){contenedor.innerHTML='<div style="padding:20px;">No se encontró jerarquía</div>'; return;}
        const build=(idNodo)=>{
            const nodo=nodosMap.get(idNodo); if(!nodo) return null;
            const hijos=hijosMap.get(idNodo)||[];
            const card=document.createElement('div');
            card.className='card level-'+Math.min(nodo.nivel,7);
            const tituloDiv=document.createElement('div');
            tituloDiv.className='title';
            const span=document.createElement('span');
            span.textContent=nodo.etiqueta;
            tituloDiv.appendChild(span);
            let icono=null;
            if(hijos.length){
                icono=document.createElement('span');
                icono.className='icon';
                icono.textContent='▶';
                tituloDiv.appendChild(icono);
            }
            card.appendChild(tituloDiv);
            let childDiv=null;
            if(hijos.length){
                childDiv=document.createElement('div');
                childDiv.className='children collapsed';
                for(let h of hijos){
                    const sub=build(h);
                    if(sub) childDiv.appendChild(sub);
                }
                card.appendChild(childDiv);
                card.addEventListener('click',(e)=>{
                    e.stopPropagation();
                    if(childDiv.classList.contains('collapsed')){
                        childDiv.classList.remove('collapsed');
                        if(icono) icono.textContent='▼';
                    }else{
                        childDiv.classList.add('collapsed');
                        if(icono) icono.textContent='▶';
                    }
                });
            }
            return card;
        };
        const rootDiv=document.createElement('div');
        for(let r of raices){
            const rc=build(r.id);
            if(rc) rootDiv.appendChild(rc);
        }
        contenedor.innerHTML=''; contenedor.appendChild(rootDiv);
    }
    const {nodos, hijosMap, raices}=parsear(textoOriginal);
    const nodosMap=new Map(); nodos.forEach(n=>nodosMap.set(n.id,n));
    renderizar(raices, nodosMap, hijosMap);
    document.getElementById('expandirTodo').addEventListener('click',()=>{
        document.querySelectorAll('.children').forEach(c=>c.classList.remove('collapsed'));
        document.querySelectorAll('.icon').forEach(i=>i.textContent='▼');
    });
    document.getElementById('colapsarTodo').addEventListener('click',()=>{
        document.querySelectorAll('.children').forEach(c=>c.classList.add('collapsed'));
        document.querySelectorAll('.icon').forEach(i=>i.textContent='▶');
    });
</script>
