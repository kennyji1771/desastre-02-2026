sastres\n#### 6.2.1. La claridad en los roles (coordinador vs. ejecutor) evita duplicidades y conflictos de mando.\n#### 6.2.2. La estructura de cinco comités (C1 a C5) permite abordar integralmente la información, logística, protección social, orden interno y movilización.\n#### 6.2.3. El Subcomité de Riesgos (dentro de C4) es fundamental para la gestión proactiva de impactos secundarios, diferenciando una respuesta reactiva de una gestión de consecuencias.\n#### 6.2.4. La cartografía georreferenciada y actualizada diariamente es el eje de la toma de decisiones del Estado Mayor.\n\n### 6.3. Recomendaciones para el usuario final\n#### 6.3.1. Este documento integrado puede utilizarse como base para la planificación de futuras operaciones de defensa integral en contextos de desastre.\n#### 6.3.2. Se recomienda mantener los formatos de reporte (SDP, IPP, mapas, matrices de riesgos) estandarizados para facilitar la comparación y el aprendizaje organizacional.\n#### 6.3.3. La actualización diaria de la información debe ser una práctica obligatoria, reportando incluso \"no cambios\" para mantener la certeza operativa.\n\n# INSTRUCTIVO PARA LA CONFORMACIÓN Y OPERACIÓN DE LOS COMITÉS ODDI EN EL TERRENO\n\n## BASADO EN LAS ORIENTACIONES DEL MAYOR (EJ) EDUARDO CHACÍN\n\n### 1. PRINCIPIOS GENERALES DE ACTUACIÓN\n\n#### 1.1. Actuar como un solo cuerpo (ODDI)\n##### 1.1.1. Los cinco comités no deben operar de forma aislada.\n##### 1.1.2. Deben coordinarse permanentemente para construir una visión integrada del territorio.\n##### 1.1.3. Cada comité es un engranaje del mismo mecanismo.\n\n#### 1.2. El ODDI es la base de información del Estado Mayor\n##### 1.2.1. La función primordial del ODDI es ser la fuente de información veraz, actualizada y georreferenciada sobre el territorio.\n##### 1.2.2. Toda la información recabada (recursos, daños, riesgos, organización popular) debe ser consolidada y entregada al Estado Mayor de la ZODI/REDI para la toma de decisiones.\n\n#### 1.3. Enlace permanente con las órdenes del Comandante\n##### 1.3.1. El ODDI actúa como un enlace que traduce las órdenes del Comandante en requerimientos concretos de información y coordinación en el territorio.\n##### 1.3.2. No se improvisa; se sigue el hilo conductor de la misión.\n\n### 2. LEVANTAMIENTO DE INFORMACIÓN Y MAPA INTEGRADO\n\n#### 2.1. Mapa integrado (política, economía, orden público)\n##### 2.1.1. Cada comité debe contribuir a la elaboración de un Mapa de Situación Integrado que incluya las siguientes dimensiones:\n\n###### Dimensión: Política\n####### Información a incluir: Ubicación de sedes gubernamentales, consejos comunales, UBCH, jefes de calle, puntos de información pública.\n####### Responsable principal: C1 (Patriótico) y C3 (Social)\n\n###### Dimensión: Economía\n####### Información a incluir: Depósitos de alimentos, farmacias, estaciones de servicio, talleres, maquinaria disponible, vehículos, centros de acopio.\n####### Responsable principal: C2 (Económico) y C5 (Movilización)\n\n###### Dimensión: Orden Público\n####### Información a incluir: Puestos de control de la PNB, refugios, zonas de riesgo, puntos de bloqueo, instalaciones de protección civil.\n####### Responsable principal: C4 (Orden Interno)\n\n#### 2.2. Ampliación del área de actuación\n##### 2.2.1. El ODDI no debe limitarse a los límites administrativos de una parroquia.\n##### 2.2.2. Si en la parroquia afectada no hay hospitales, se debe identificar el hospital más cercano, los depósitos de agua y comida más próximos, aunque estén en otra parroquia o municipio.\n##### 2.2.3. El mapa del ODDI debe cubrir todo el territorio funcional que pueda ser utilizado para la respuesta.\n\n#### 2.3. Levantamiento de información clave (por comité)\n\n##### 2.3.1. C1 – Patriótico\n###### Información a levantar: Medios de comunicación locales, líderes de opinión, rumores activos, estado de la moral, actividades de bienestar.\n\n##### 2.3.2. C2 – Económico\n###### Información a levantar: Inventario de alimentos (incluyendo comedores, loncherías), agua (cisternas, pozos, plantas de tratamiento), maquinaria (grúas, retroexcavadoras, camiones), vehículos disponibles.\n\n##### 2.3.3. C3 – Social\n###### Información a levantar: Damnificados (número, ubicación, necesidades), refugiados, albergues, servicios de salud, grupos vulnerables (niños, ancianos, indígenas).\n\n##### 2.3.4. C4 – Orden Interno\n###### Información a levantar: Daños estructurales, derrumbes, escombros, zonas de riesgo (deslizamientos, inundaciones, fugas de materiales peligrosos), puntos de control.\n\n##### 2.3.5. C5 – Movilización\n###### Información a levantar: Personal disponible (milicianos, reservistas, personal técnico), registro de medios productivos, actas de requisición.\n\n### 3. COORDINACIÓN CON ASIMILADOS Y ENLACES\n\n#### 3.1. Apoyo a los oficiales asimilados\n##### 3.1.1. Los ODDI deben colaborar activamente con los oficiales asimilados (médicos, ingenieros, administradores, etc.) que se integren a la operación.\n\n###### Ejemplo (salud asimilada):\n####### Si un equipo de salud asimilado realiza un levantamiento epidemiológico, el ODDI debe proporcionarle mapas de acceso, información sobre refugiados, y datos de los centros de salud existentes.\n\n###### Ejemplo (ingeniería asimilada):\n####### Si un ingeniero asimilado necesita maquinaria para remover escombros, el ODDI debe indicarle dónde se encuentra la maquinaria disponible y cómo gestionar su requisición.\n\n#### 3.2. Enlace con la Policía Nacional Bolivariana (PNB)\n##### 3.2.1. Dado que estamos en el ámbito comunitario, las funciones de policía militar (PM) son ejercidas por la PNB.\n##### 3.2.2. El C4 (Orden Interno) debe coordinar con la PNB para:\n\n###### Control de accesos a zonas críticas.\n###### Custodia de depósitos y centros de acopio.\n###### Regulación del tránsito.\n###### Investigación de delitos cometidos durante la emergencia.\n\n### 4. GESTIÓN DE RECURSOS Y LOGÍSTICA (AGUA, COMIDA, ESCOMBROS)\n\n#### 4.1. Agua\n##### 4.1.1. Identificar fuentes de agua operativas (pozos, cisternas, plantas de tratamiento).\n##### 4.1.2. Si no hay agua en la parroquia, buscar en las adyacentes.\n##### 4.1.3. Mapear puntos de distribución de agua y llenaderos.\n\n#### 4.2. Comida\n##### 4.2.1. Identificar todos los depósitos de alimentos, incluyendo comedores escolares, comedores militares, cantinas, loncherías y otros establecimientos con capacidad de cocina y almacenamiento.\n##### 4.2.2. No limitarse a los grandes depósitos.\n\n#### 4.3. Escombros\n##### 4.3.1. Identificar la maquinaria disponible para la remoción de escombros (retroexcavadoras, grúas, camiones volcadores).\n##### 4.3.2. Mapear puntos de acopio temporal de escombros.\n##### 4.3.3. Establecer prioridades de despeje (vías de acceso a hospitales, centros de acopio, refugios).\n\n#### 4.4. Gestión de recursos\n##### 4.4.1. Todos los recursos identificados deben ser registrados en el Mapa de Recursos Logísticos (SALTE) y puestos a disposición del Estado Mayor.\n\n### 5. MISIÓN Y APRECIACIÓN ESPECÍFICA DEL COMITÉ\n\n#### 5.1. Misión específica\n##### 5.1.1. Cada comité debe formular su propia misión específica para el evento, en lugar de usar la misión genérica del ODDI.\n##### 5.1.2. La misión debe responder a las preguntas: ¿Qué debemos lograr? y ¿Para qué sirve nuestro comité en esta operación concreta?\n\n###### Formato sugerido para la misión del comité:\n####### *\"Coordinar la [función específica: información/recursos/atención social/seguridad/movilización] en el territorio de [ZODI/parroquia], para [propósito en el contexto del desastre], en apoyo al Estado Mayor ZODI/REDI, durante la Operación Desastre 02-2026.\"*\n\n###### Ejemplo (C2 – Económico, ZODI Capital):\n####### *\"Coordinar el levantamiento y actualización del inventario de recursos logísticos (alimentos, agua, maquinaria) en la Parroquia Catedral y áreas aledañas, para garantizar el abastecimiento a los refugios y las tareas de remoción de escombros, en apoyo al Estado Mayor ZODI Capital, durante la Operación Desastre 02-2026.\"*\n\n#### 5.2. Apreciación de la situación\n##### 5.2.1. Cada comité debe realizar su propia apreciación de la situación (siguiendo el formato del Capítulo VIII del Manual de Personal, adaptado a la defensa integral).\n##### 5.2.2. La apreciación debe incluir los siguientes elementos:\n\n###### Misión recibida (del Estado Mayor o del Coordinador General ODDI).\n###### Situación y consideraciones: Descripción de la situación en el territorio, los recursos disponibles, las limitaciones y los riesgos.\n###### Cursos de acción posibles: Opciones para cumplir la misión.\n###### Análisis de cada curso de acción: Ventajas y desventajas.\n###### Recomendación: Curso de acción propuesto.\n###### Plan de ejecución: Tareas concretas, responsables y plazos.\n##### 5.2.3. Esta apreciación servirá como el \"manual\" interno de cada comité para el desarrollo de la operación.\n\n### 6. ENTREGA DE INFORMACIÓN AL ESTADO MAYOR\n\n#### 6.1. Productos obligatorios\n##### 6.1.1. Cada comité debe entregar al Estado Mayor (a través del Coordinador General ODDI) los siguientes productos, en los plazos establecidos:\n\n###### Producto: Mapa Integrado\n####### Plazo: Fase 0 (H+0 a H+12)\n####### Contenido mínimo: Ubicación de recursos, riesgos, refugios, puntos de control, organización popular.\n\n###### Producto: Informe de situación\n####### Plazo: Diario\n####### Contenido mínimo: Resumen de la situación en el área de responsabilidad del comité.\n\n###### Producto: Actualización de recursos\n####### Plazo: Diario\n####### Contenido mínimo: Cambios en inventarios, disponibilidad de personal, nuevas necesidades.\n\n###### Producto: Informe de riesgos (C4)\n####### Plazo: Fase 1 y diario\n####### Contenido mínimo: Daños identificados, riesgos secundarios, acciones de mitigación.\n\n###### Producto: Apreciación del comité\n####### Plazo: Fase 0\n####### Contenido mínimo: Documento con la misión, situación, cursos de acción y recomendación del comité.\n\n#### 6.2. Formato de entrega\n##### 6.2.1. La información debe ser entregada en formato digital (shapefile, KML, mapas impresos) y acompañada de un informe resumen ejecutivo.\n\n### 7. CONSIDERACIONES FINALES\n\n#### 7.1. El mapa no debe ser \"tan grande\" pero debe ser completo\n##### 7.1.1. El mapa del ODDI debe ser claro, práctico y contener toda la información relevante para la operación, sin sobrecargarlo con datos innecesarios.\n\n#### 7.2. Los asimilados son aliados\n##### 7.2.1. Los oficiales asimilados (médicos, ingenieros, etc.) son parte del equipo.\n##### 7.2.2. El ODDI debe facilitarles el acceso a la información y los recursos para que cumplan su misión.\n\n#### 7.3. Resolver poco a poco, pero siempre enlazado\n##### 7.3.1. El ODDI va resolviendo las situaciones en el terreno, pero siempre reportando al Estado Mayor y siguiendo las órdenes del Comandante.\n##### 7.3.2. No se actúa por iniciativa propia sin coordinar.\n\n#### 7.4. Crear su propio manual\n##### 7.4.1. Cada comité debe construir su propio \"manual\" a partir de la misión y la apreciación que elabore.\n##### 7.4.2. Ese manual será su guía de acción durante toda la operación.\n\n# INFORME DE OPERACIONES ODDI «DESASTRE» 02-2026\n\n## DATOS DE IDENTIFICACIÓN DEL DOCUMENTO\n### ORIGINAL-3/COPIAS – REDI ESPECIAL CARACAS\n#### Coordenadas: (7.85698, -67.50759)\n#### Fecha y hora de emisión: 170600JUN26\n#### Clave de operación: ZAMORA-DESASTRES\n#### Naturaleza del documento: ORIGINAL – Informe de Operaciones ODDI\n\n---\n\n## REFERENCIAS LEGALES Y DOCTRINARIAS\n### 1. Constitución de la República Bolivariana de Venezuela (Gaceta Oficial Extraordinario N° 5.908 del 19 de febrero de 2009, Enmienda N° 1 del 15 de febrero de 2009)\n### 2. Ley Constitucional de la Fuerza Armada Nacional Bolivariana (Gaceta Oficial Extraordinario N° 6.508 del 30 de enero de 2020)\n### 3. Ley del Comando para la Defensa Integral de la Nación\n### 4. Decreto Presidencial N° 5.078 (activación de los ODDI, Gaceta Oficial del 8 de enero de 2025)\n### 5. Ley Orgánica de Seguridad de la Nación (Decreto N° 1.473, Gaceta Oficial Extraordinario N° 6.156 del 19 de noviembre de 2014)\n### 6. Manual de Personal del Ejército Venezolano (Mayor Eduardo Chacín, Caracas, mayo de 2026)\n### 7. Cuadernos de Trabajo para los Comités de los ODDI (Lic. Gerard Sieveres, Caracas, junio de 2026)\n### 8. Curso de Operaciones de Defensa Integral (CODDI) – Pensum de Estudio (Lic. Gerard Sieveres, Caracas, junio de 2026)\n\n---\n\n## ANEXO A: INFORME DEL COMITÉ PATRIÓTICO BOLIVARIANO (C1)\n\n### 1. MISIÓN\n#### Coordinar la difusión de información oficial, la contrainformación, la educación patriótica y las actividades de bienestar y moral para el ODDI y la población civil afectada, en el marco de la Operación Desastre 02-2026, garantizando la cohesión social y el apoyo a las decisiones del Estado Mayor ZODI/REDI.\n\n### 2. MANIOBRA\n#### Desplegar equipos de comunicación en las zonas afectadas para monitorear el estado de la opinión pública, contrarrestar rumores y desinformación mediante comunicados oficiales y redes sociales, y coordinar con los capellanes y los servicios especiales (cine, deportes, bibliotecas) para mantener la moral en los refugios y albergues.\n\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Alta vulnerabilidad a la desinformación y los rumores en las zonas de desastre.\n#### 3.2. Necesidad de mantener la moral de la tropa y la población civil ante la adversidad.\n#### 3.3. Importancia de la coordinación con los medios de comunicación locales y nacionales para difundir mensajes oficiales.\n\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Información Pública y Relaciones para la emisión de comunicados oficiales iniciales.\n##### 4.1.2. Establecer enlace con los medios de comunicación locales para la difusión de mensajes de calma y orientación.\n##### 4.1.3. Activar el Subcomité de Moral y Servicios de Personal para evaluar el estado de la moral en las unidades afectadas.\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Monitorear y contrarrestar activamente los rumores y la desinformación en redes sociales y medios comunitarios.\n##### 4.2.2. Organizar actividades de bienestar (cine, deportes, charlas) en los refugios y albergues.\n##### 4.2.3. Coordinar con el Capellán para la atención espiritual de damnificados y personal de respuesta.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Mantener una campaña de información continua, destacando los logros de la operación y las acciones de ayuda humanitaria.\n##### 4.3.2. Evaluar el impacto de las actividades de bienestar en la moral de la población.\n##### 4.3.3. Actualizar los mensajes según la evolución de la situación.\n\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C3 (Comité Social Popular) para alinear los mensajes de información pública con las acciones de asistencia social y protección de derechos.\n#### 5.2. Coordinar con el C2 (Comité Económico) para difundir información sobre la disponibilidad de recursos logísticos y puntos de distribución.\n#### 5.3. Coordinar con el C4 (Comité de Orden Interno) para garantizar que la información pública no interfiera con las medidas de seguridad y control de acceso.\n\n---\n\n## ANEXO B: INFORME DEL COMITÉ ECONÓMICO, PRODUCTIVO Y DE SERVICIOS (C2)\n\n### 1. MISIÓN\n#### Coordinar el levantamiento y actualización del inventario de recursos logísticos (SALTE), la administración de la mano de obra civil disponible y la gestión de los servicios de cantinas y finanzas en las zonas afectadas, para garantizar el sostenimiento de la operación y la atención a la población damnificada.\n\n### 2. MANIOBRA\n#### Desplegar equipos de reconocimiento para identificar y georreferenciar depósitos de alimentos, medicinas, vehículos, maquinaria pesada, combustibles y equipos de comunicación. Clasificar y movilizar mano de obra civil voluntaria u obligatoria (técnicos, operarios, conductores). Asegurar la operación de cantinas fijas y móviles en los refugios.\n\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Posible colapso de las cadenas de suministro y distribución de alimentos y medicinas.\n#### 3.2. Necesidad de movilizar rápidamente mano de obra especializada (operarios de maquinaria pesada, técnicos).\n#### 3.3. Riesgo de saqueos y mercado negro en las zonas afectadas.\n\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Requisición y Registro para iniciar el levantamiento del inventario de recursos logísticos (SALTE) en el área de responsabilidad.\n##### 4.1.2. Activar el Subcomité de Administración de Personal Civil para identificar y clasificar la mano de obra civil disponible.\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Entregar el Mapa de Recursos Logísticos (SALTE) al Estado Mayor, con la localización de depósitos, vehículos y maquinaria.\n##### 4.2.2. Organizar y movilizar los primeros equipos de mano de obra civil para tareas de remoción de escombros y distribución de suministros.\n##### 4.2.3. Activar el Servicio de Cantinas en los refugios y albergues.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Actualizar diariamente el inventario de recursos logísticos y reportar cambios al Estado Mayor.\n##### 4.3.2. Gestionar la reposición de suministros y la rotación de la mano de obra civil.\n##### 4.3.3. Implementar medidas de control para evitar el mercado negro y garantizar la distribución equitativa.\n\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C5 (Comité de Movilización) para la gestión de la requisición legal de bienes y la movilización de recursos.\n#### 5.2. Coordinar con el C3 (Comité Social Popular) para garantizar que la distribución de alimentos y suministros llegue a los grupos más vulnerables.\n#### 5.3. Coordinar con el C4 (Comité de Orden Interno) para la seguridad de los depósitos y la protección de los convoyes de suministros.\n\n---\n\n## ANEXO C: INFORME DEL COMITÉ SOCIAL POPULAR (C3)\n\n### 1. MISIÓN\n#### Coordinar la atención humanitaria a la población damnificada, la protección de los derechos humanos y la integración social en las zonas afectadas, garantizando el acceso a albergues, alimentos, salud y asistencia social para los grupos más vulnerables.\n\n### 2. MANIOBRA\n#### Identificar y registrar a los damnificados, habilitar albergues y centros de acopio, y coordinar con las misiones sociales (salud, alimentación, educación) y las organizaciones humanitarias (Cruz Roja) para la prestación de servicios básicos. Monitorear posibles violaciones de derechos humanos en los refugios.\n\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Alta concentración de población vulnerable (niños, ancianos, personas con discapacidad) en las zonas afectadas.\n#### 3.2. Riesgo de brotes de enfermedades en los albergues debido al hacinamiento y la falta de servicios sanitarios.\n#### 3.3. Necesidad de coordinar con las comunidades organizadas (consejos comunales, UBCH) para la identificación de damnificados y la distribución de ayuda.\n\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Asuntos Civiles para establecer contacto con los consejos comunales y las autoridades locales.\n##### 4.1.2. Iniciar el censo de damnificados y la identificación de albergues potenciales (escuelas, iglesias, centros comunales).\n##### 4.1.3. Activar el Subcomité de Misiones Sociales para coordinar la respuesta de salud y alimentación.\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Entregar el Mapa de Organización del Poder Popular y el censo inicial de damnificados al Estado Mayor.\n##### 4.2.2. Habilitar los primeros albergues y centros de acopio, garantizando agua, alimentos y atención médica básica.\n##### 4.2.3. Iniciar el monitoreo de derechos humanos en los refugios.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Actualizar diariamente el registro de damnificados y las condiciones en los albergues.\n##### 4.3.2. Coordinar con las misiones sociales la prestación de servicios continuos (educación, salud mental, recreación).\n##### 4.3.3. Implementar un plan de rehabilitación comunitaria para las zonas afectadas.\n\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C1 (Comité Patriótico) para la difusión de información sobre los servicios de asistencia social y los puntos de atención.\n#### 5.2. Coordinar con el C2 (Comité Económico) para garantizar el suministro de alimentos, medicinas y otros insumos a los albergues.\n#### 5.3. Coordinar con el C4 (Comité de Orden Interno) para garantizar la seguridad en los albergues y la protección de los damnificados.\n\n---\n\n## ANEXO D: INFORME DEL COMITÉ DE ORDEN INTERNO (C4)\n\n### 1. MISIÓN\n#### Coordinar las medidas de seguridad, disciplina y gestión de riesgos en el territorio afectado, en coordinación con la Policía Nacional Bolivariana (PNB) y los organismos de protección civil, para garantizar el orden público, la protección de instalaciones críticas y la gestión de riesgos post-desastre.\n\n### 2. MANIOBRA\n#### Establecer puestos de control de acceso a las zonas críticas y refugios, en coordinación con la PNB. Activar el Subcomité de Sistema de Riesgos para el levantamiento de daños y la identificación de riesgos secundarios (derrumbes, fugas de materiales peligrosos, deslizamientos). Coordinar con Protección Civil y los bomberos para la respuesta a emergencias.\n\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Riesgo de saqueos, vandalismo y desorden público en las zonas afectadas.\n#### 3.2. Presencia de materiales peligrosos en zonas industriales que requieren manejo especial.\n#### 3.3. Necesidad de controlar el acceso a las áreas de alto riesgo para evitar víctimas adicionales.\n\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Seguridad contra Accidentes y Riesgos (Sistema de Riesgos) para iniciar el levantamiento de consecuencias post-desastre.\n##### 4.1.2. Activar el Subcomité de Disciplina, Ley y Orden para coordinar con la PNB el establecimiento de puestos de control de acceso.\n##### 4.1.3. Activar el Subcomité de Operaciones Especiales para adaptar los procedimientos a las características del terreno (costa, montaña, urbano).\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Entregar el Mapa de Afectaciones por Sismo, el Mapa de Riesgos y Vulnerabilidades, y el Plan de Mitigación Inicial al Estado Mayor.\n##### 4.2.2. Coordinar con la PNB y Protección Civil la evacuación de zonas de alto riesgo y la apertura de rutas seguras.\n##### 4.2.3. Implementar el plan de seguridad para los refugios y centros de acopio.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Actualizar diariamente el informe de incidentes de seguridad y el estado de los riesgos identificados.\n##### 4.3.2. Supervisar la ejecución de las medidas de mitigación (despeje de escombros, aseguramiento de depósitos peligrosos).\n##### 4.3.3. Reportar al Estado Mayor cualquier cambio significativo en la situación de orden público o en los escenarios de riesgo.\n\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C2 (Comité Económico) para el despliegue de maquinaria y personal técnico en las tareas de mitigación de riesgos.\n#### 5.2. Coordinar con el C3 (Comité Social Popular) para garantizar la seguridad de los damnificados y la protección de los grupos vulnerables.\n#### 5.3. Coordinar con el C5 (Comité de Movilización) para la gestión de la requisición de equipos y materiales necesarios para la mitigación.\n\n---\n\n## ANEXO E: INFORME DEL COMITÉ DE MOVILIZACIÓN Y REQUISICIÓN (C5)\n\n### 1. MISIÓN\n#### Coordinar el control de efectivos, el flujo de reemplazos y la requisición legal de bienes y servicios para sostener la operación, garantizando la disponibilidad de personal y recursos necesarios para la respuesta al desastre.\n\n### 2. MANIOBRA\n#### Mantener actualizada la Situación Diaria de Personal (SDP) y el Cuadro de Control Detallado, gestionar el flujo de reemplazos desde la zona del interior, y aplicar los procedimientos de requisición legal de vehículos, maquinaria, alimentos y otros bienes conforme a la ley.\n\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Necesidad de movilizar rápidamente personal de refuerzo (milicianos, reservistas) a las zonas afectadas.\n#### 3.2. Importancia de la requisición legal de bienes para garantizar la operatividad de la respuesta.\n#### 3.3. Riesgo de desabastecimiento de personal y recursos si no se gestiona adecuadamente el flujo de reemplazos.\n\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Mantenimiento del Efectivo para iniciar el registro de personal disponible y la elaboración de la Situación Diaria de Personal (SDP).\n##### 4.1.2. Activar el Subcomité de Reemplazos y Movilización para iniciar la apreciación de necesidades de personal y la coordinación con el sistema de reemplazos.\n##### 4.1.3. Activar el Subcomité de Requisición y Registro para iniciar el levantamiento del registro de medios productivos.\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Entregar la SDP y el Cuadro de Control Detallado al Estado Mayor.\n##### 4.2.2. Formular los primeros pedidos de reemplazos y gestionar su movilización a las zonas afectadas.\n##### 4.2.3. Aplicar los procedimientos de requisición legal para la obtención de vehículos, maquinaria y equipos de comunicación.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Actualizar diariamente la SDP y el Cuadro de Control Detallado.\n##### 4.3.2. Mantener el flujo de reemplazos y gestionar la rotación del personal.\n##### 4.3.3. Actualizar el registro de medios productivos y gestionar nuevas requisiciones según las necesidades de la operación.\n\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C2 (Comité Económico) para la verificación de la disponibilidad de recursos y la gestión de la requisición de bienes.\n#### 5.2. Coordinar con el C4 (Comité de Orden Interno) para la custodia de los bienes requisados y la seguridad de los centros de acopio.\n#### 5.3. Coordinar con el C1 (Comité Patriótico) para la difusión de información sobre los procedimientos de requisición y movilización.\n\n\n## CIERRE Y APROBACIÓN\n### Visto Bueno: Coordinador General ODDI\n### REDI CAPITAL\n### Fecha de Emisión: 17 de junio de 2026\n\n**Fin del documento**\n\n# MANUAL DE SÍMBOLOS Y ABREVIATURAS MILITARES DE LA FUERZA ARMADA NACIONAL BOLIVARIANA\n\n## CARTA DE PROMULGACIÓN\n### 1. PROPÓSITO\n#### Establecer la doctrina de símbolos y abreviaturas militares para uso de la FANB en cartas, calcos, órdenes y documentos tácticos.\n### 2. VIGENCIA\n#### Entra en vigencia a partir del 10 de octubre de 2013, con un lapso de aplicación de tres años para su primera revisión.\n### 3. DISTRIBUCIÓN\n#### Según lista de distribución, cumpliendo normas de clasificación (RESERVADO).\n### 4. INSTRUCCIONES ESPECIALES\n#### Las observaciones deben enviarse a los órganos de doctrina de los Componentes y REDI, quienes las remitirán al CEOFANB.\n#### Este manual tiene carácter operativo y académico; los centros de la UMBV adecuarán sus diseños curriculares según el documento.\n#### Deroga el MC-50-1 del Ejército, la Directiva E-DI-21-29, manuales de la Armada, Aviación, Guardia Nacional y otros anteriores.\n\n---\n\n## CAPÍTULO I – GENERALIDADES Y DEFINICIONES\n\n### SECCIÓN A – CLASIFICACIÓN DE LOS SÍMBOLOS MILITARES\n#### Los símbolos militares se agrupan en cuatro categorías principales:\n\n##### 1. Símbolos Básicos\n###### Son los fundamentales que representan una unidad de arma o servicio, una instalación administrativa, un puesto de comando o un puesto de observación.\n###### Ejemplos: rectángulo (unidad), círculo (instalación), triángulo (puesto de observación), bandera (puesto de comando).\n\n##### 2. Símbolos de Identificación\n###### Sirven para identificar el arma (Artillería, Caballería, Infantería, Comunicaciones, etc.), el tipo de unidad (Blindada, Aerotransportada, Anfibia) y el servicio (Intendencia, Armamento, Transporte, etc.).\n\n##### 3. Símbolos de Magnitud de Escalón\n###### Indican la categoría orgánica del elemento: Batallón, Grupo, Regimiento, ZODI, REDI, etc.\n\n##### 4. Símbolos de Actividades Militares\n###### Representan operaciones en el campo de batalla, zonas ocupadas, límites, armamento, fortificaciones y demás actividades tácticas.\n\n### SECCIÓN B – EMPLEO DE COLORES\n#### 1. Las fuerzas enemigas y sus acciones se representan en color **AZUL**.\n#### 2. Las fuerzas amigas se representan en color **ROJO**.\n#### 3. Las actividades y acciones de las fuerzas amigas se representan en color **NEGRO**, excepto las de ingeniería (campos minados, demoliciones, obstáculos) que serán en **VERDE**.\n#### 4. Las áreas que deben ser abatidas por fuego propio se representan en **NEGRO**, y las áreas contaminadas con gases en **AMARILLO**.\n\n### SECCIÓN C – TRAZOS\n#### 1. Cuando no se disponga de colores, se emplea trazo **doble** para el enemigo y **simple** para lo amigo.\n#### 2. El trazo continuo indica existencia o presencia en el momento.\n#### 3. El trazo punteado indica emplazamiento previsto o preparado para ser ocupado.\n#### 4. Excepción: cañones o morteros se grafican dejando en blanco el interior del símbolo.\n\n### SECCIÓN D – DIMENSIÓN\n#### El tamaño de los símbolos varía con la escala de la carta:\n##### 1/25.000 – tamaño mayor\n##### 1/50.000 – tamaño medio\n##### 1/100.000 – tamaño pequeño\n##### 1/250.000 – tamaño mínimo\n\n### SECCIÓN E – ORIENTACIÓN\n#### El símbolo debe trazarse siempre paralelo a los ejes de coordenadas de la carta; el símbolo de magnitud de escalón va en la parte superior.\n\n### SECCIÓN F – SÍMBOLOS BÁSICOS\n#### 01 – Rectángulo: unidad de un arma o servicio (base horizontal = en línea; base vertical = en columnas)\n#### 02 – Círculo: instalación administrativa\n#### 03 – Triángulo: puesto de observación\n#### 04 – Bandera: puesto de comando\n#### 05 – Varias banderas en una misma asta: varios puestos de comando en una misma ubicación\n\n---\n\n## CAPÍTULO II – SÍMBOLOS DE IDENTIFICACIÓN\n\n### SECCIÓN A – UNIDADES DE ARMAS\n#### 01 – Infantería (rectángulo con una cruz diagonal)\n#### 02 – Caballería (rectángulo con diagonal y una barra horizontal)\n#### 03 – Blindadas o Mecanizadas (rectángulo con un óvalo interior)\n#### 04 – Ingeniería (rectángulo con un castillo estilizado)\n#### 05 – Artillería (círculo con un punto central)\n#### 06 – Artillería Antiaérea (círculo con una cruz)\n#### 08 – Artillería de Costa (círculo con una base horizontal)\n#### 09 – Comunicaciones (rectángulo con rayos)\n#### 10 – Aviación de Ala Fija (rectángulo con un ala)\n#### 11 – Aviación de Ala Rotatoria (rectángulo con un rotor)\n#### 12 – Francotirador (rectángulo con una mira)\n#### 13 – Inteligencia (rectángulo con una \"I\" estilizada)\n#### 14 – Antitanque (rectángulo con una flecha quebrada)\n\n### SECCIÓN B – UNIDADES DE SERVICIOS\n#### 01 – Intendencia (rectángulo con una llave)\n#### 02 – Armamento (rectángulo con un cañón estilizado)\n#### 03 – Sanidad (rectángulo con una cruz roja)\n#### 04 – Ingeniería (igual que en Armas)\n#### 05 – Transporte (rectángulo con una rueda)\n#### 06 – Veterinaria (rectángulo con una cruz y una \"V\")\n#### 08 – Policía Militar (rectángulo con \"PM\")\n#### 09 – Comunicaciones (rayos)\n#### 10 – Policía Naval (similar a PM pero con ancla)\n#### 11 – Policía Aérea (similar a PM con alas)\n#### 12 – Químico (rectángulo con gota)\n#### 13 – Remonta (rectángulo con herradura)\n\n### SECCIÓN C – ABASTECIMIENTOS (CLASES)\n#### 01 – Clase I (Subsistencias)\n#### 02 – Clase II (Equipos individuales)\n#### 03 – Clase III (Combustibles y lubricantes)\n#### 04 – Clase 3-A (Combustible de aviación)\n#### 05 – Clase IV (Materiales de construcción)\n#### 06 – Clase V (Municiones)\n#### 07 – Clase VI (Artículos de uso personal)\n#### 08 – Clase VII (Material mayor)\n#### 09 – Clase VIII (Material médico)\n#### 10 – Clase IX (Repuestos)\n#### 11 – Clase X (Material no clasificado)\n#### 12 – Clases múltiples (varios símbolos combinados)\n#### 13 – Todas las Clases (símbolo genérico)\n\n### SECCIÓN D – UNIDADES BLINDADAS\n#### Se coloca el símbolo de blindado (óvalo) dentro del símbolo del arma o servicio correspondiente. Ejemplos:\n##### Infantería Mecanizada\n##### Caballería Mecanizada\n##### Artillería Autopropulsada\n##### Ingeniería Mecanizada\n\n### SECCIÓN E – UNIDADES MISILÍSTICAS DE DEFENSA AÉREA\n#### CMDA-CA – Complejo Misilístico de Defensa de Área de Corto Alcance\n#### CMDA-PA – Complejo Misilístico de Defensa de Área de Pequeño Alcance\n#### CMDA-MA – Complejo Misilístico de Defensa de Área de Mediano Alcance\n#### CMDA-LA – Complejo Misilístico de Defensa de Área de Largo Alcance\n#### GTMDA – Grupo Técnico Misilístico de Defensa Aérea\n#### GTMDAM – Grupo Técnico Misilístico de Defensa Aérea Mixto\n#### FTL – Flujo Técnico Logístico\n\n### SECCIÓN F – UNIDADES AEROTRANSPORTADAS\n#### Se coloca el símbolo de aerotransportado (flecha hacia arriba) dentro del símbolo del arma o servicio. Ejemplos:\n##### Unidad Aerotransportada\n##### Artillería de Campaña Aerotransportada\n##### Reconocimiento Aerotransportado\n##### Infantería Aerotransportada\n##### Ingeniería Aerotransportada\n##### Unidad Paracaidista\n\n### SECCIÓN G – UNIDADES ANFIBIAS\n#### Se coloca el símbolo de anfibio (ola) dentro del símbolo del arma o servicio. Ejemplos:\n##### Unidad Anfibia\n##### Artillería de Campaña Anfibia\n##### Reconocimiento Anfibio\n##### Infantería de Marina\n##### Ingeniería Anfibia\n##### Tanques Anfibios\n\n---\n\n## CAPÍTULO III – SÍMBOLOS DE MAGNITUD DE ESCALÓN\n\n### Lista de símbolos de magnitud (de mayor a menor):\n#### 01 – REDI (Región de Defensa Integral) – cuatro aspas\n#### 02 – ZODI (Zona Operativa de Defensa Integral) – tres aspas\n#### 03 – ADI (Área de Defensa Integral) – dos aspas\n#### 04 – Parroquia – un aspa\n#### 05 – Medio Grupo o Equipo – dos puntos\n#### 06 – Grupo de Combate, Equipo de Ametralladora, Escuadra o Patrulla – un punto\n#### 08 – Sección, Pelotón o Pieza – una barra vertical\n#### 09 – Compañía, Batería o Escuadrilla – dos barras verticales\n#### 10 – Batallón, Grupo de Artillería, Grupo de Caballería, Escuadrón Aéreo – tres barras verticales (cruzadas)\n#### 11 – Regimiento, Agrupamiento de Artillería – tres barras verticales (simples)\n#### 12 – Brigada – una \"X\"\n#### 13 – División – dos \"XX\"\n#### 14 – Cuerpo de Ejército – tres \"XXX\"\n#### 15 – Ejército en Operaciones y Fuerza Aérea Táctica – cuatro \"XXXX\"\n#### 16 – Distrito de Sección de Zona de Comunicaciones – un círculo\n#### 17 – Sección de Zona de Comunicaciones – dos círculos\n#### 18 – Zona de Comunicaciones – cuatro círculos\n\n---\n\n## CAPÍTULO IV – SÍMBOLOS DE ACTIVIDADES MILITARES\n\n### SECCIÓN A – ACTIVIDADES AÉREAS\n#### 01 – Aeródromo militar con facilidades completas\n#### 02 – Aeródromo militar con facilidades de recarga\n#### 03 – Aeropuerto civil con facilidades completas\n#### 04 – Aeródromo civil con facilidades de recarga\n#### 05 – Aeropuerto civil-militar con facilidades completas\n#### 06 – Aeródromo civil-militar con facilidades de recarga\n#### 07 – Base aérea militar\n#### 08 – Pista de aterrizaje sin facilidades\n#### 09 – Campo de aterrizaje de trabajo\n#### 10 – Campo de aterrizaje auxiliar\n#### 11 – Campo de aterrizaje avanzado\n#### 20 – Aviación de radiolocalización (puesto de mando aéreo)\n#### 21 – Avión retransmisor (con abreviatura en la base: C, OPs, etc.)\n#### 22 – Corredor aéreo determinado (altura y dirección)\n#### 23 – Línea de intercepción (LI), LSC, LD, etc.\n#### 24 – Combate aéreo (con cantidad, tipos, hora, fecha, altura)\n#### 25 – Lugar donde cayó piloto catapultado\n#### 26 – Área de rescate de piloto\n#### 27 – Punto de toma de agua para extinción de helicópteros\n#### 28 – Posición técnica de ro de un Grupo de Ametralladoras\n#### 20 – Ametralladora pesada calibre 12.7 y superior\n#### 21 – Mortero\n#### 22 – Mortero de 60mm\n#### 23 – Emplazamiento de mortero 81mm\n#### 24 – Mortero de 4,2 pulgadas (químico)\n#### 25 – Emplazamiento de Mortero simulado\n#### 26 – Emplazamiento de Mortero Dudoso\n#### 27 – Mortero destruido\n#### 28 – Fusil antitanque (con abreviatura y calibre)\n#### 29 – Ametralladora antitanque calibre 12,7\n#### 30 – Tubo Lanza Cohete\n#### 31 – Cañón antitanque\n#### 32 – Cañón antitanque de 37mm\n#### 33 – Cañón antitanque de 75mm\n#### 34 – Cañón antitanque en posición con dirección principal y secundaria\n#### 35 – Emplazamiento de cañón antitanque Simulado\n#### 36 – Emplazamiento de cañón antitanque dudoso\n#### 37 – Cañón Antitanque destruido\n#### 38 – Tanque aislado\n#### 39 – Tanque ligero\n#### 40 – Tanque mediano\n#### 41 – Tanque pesado\n#### 42 – Tanque en emplazamiento semi cubierto\n#### 43 – Cañón Antiaéreo de 23 mm\n#### 44 – Vehículo de Comprobación y Control de los Misiles Portátiles\n\n### SECCIÓN D – VEHÍCULOS\n#### 1. Tipos de carrocería:\n##### 01 – Carga general\n##### 02 – Personal\n##### 03 – Especial de Combate (Jeeps, Camiones, etc.)\n##### 04 – Blindado\n#### 2. Clases de tracción:\n##### 01 – Ruedas\n##### 02 – Oruga\n##### 03 – Ferrovía\n##### 04 – Trineo\n##### 05 – Esquíes\n##### 06 – Animal\n#### 3. Diversas clases de vehículos y trenes:\n##### 01 – Tren de Abastecimiento a Rueda\n##### 02 – Tren de abastecimiento a lomo\n##### 03 – Tren de abastecimiento ferroviario\n##### 04 – Tren de combate motorizado\n##### 05 – Tren de Combate Blindado a oruga\n##### 06 – Tren de Subsistencias motorizado\n##### 07 – Camión anfibio\n##### 08 – Camión taller\n##### 09 – Locomotora\n##### 10 – Vagón Ferroviario\n##### 11 – Cañón sobre vía férrea\n##### 12 – Lugar de instalación de barreminas a tanques\n##### 13 – Recuperadores de Tanques medianos\n\n### SECCIÓN E – FORTIFICACIONES\n#### 1. Emplazamientos y fosos individuales:\n##### 01 – Emplazamiento y foso individual\n##### 02 – Para 1 hombre\n##### 03 – Para 2 hombres\n##### 04 – Con arma emplazada (símbolo interior)\n#### 2. Abrigos:\n##### 01 – Abrigo a excavación abierta (ocupado/desocupado)\n##### 02 – Abrigo en galería de mina\n##### 03 – Abrigo en galería de mina para 12 hombres\n##### 04 – Abrigo en galería de mina para 12 hombres a prueba de gas\n##### 05 – Abrigo a excavación abierta para 8 hombres\n##### 06 – Abrigo en galería de mina para 25 hombres a prueba de gas\n#### 3. Trincheras:\n##### 01 – Trincheras\n##### 02 – Elementos de Trinchera\n##### 03 – Abrigos en trincheras\n#### 4. Zanjas de Comunicación:\n##### 01 – Zanja de Comunicación\n##### 02 – Abrigos en zanja de comunicación\n#### 5. Fuertes o Fortín en General:\n##### 01 – Fuerte o Fortín general\n#### 6. Casamatas:\n##### 01 – De Troncos\n##### 02 – De concreto\n\n### SECCIÓN F – OBSTÁCULOS\n#### Todos los obstáculos amigos o enemigos se dibujan en color verde, salvo los químicos (amarillo). Si no hay colores, se usan trazos negros.\n##### 1. Químicos:\n###### Mina Química\n###### Área que debe ser evitada (con agente, fecha y hora)\n###### Área gaseada con gas no persistente (con agente, fecha y hora)\n##### 2. Gases y Humo:\n###### Área cubierta por humo (fecha y hora)\n###### Área radioactiva (intensidad y características)\n###### Generador de humo\n##### 3. Alambradas:\n###### Alambrada normal (con profundidad en metros)\n###### Alambrada baja\n###### Alambrada alta\n###### Cerco de alambre de púas\n###### Concertina Simple\n###### Concertina múltiple (doble, triple, etc.)\n##### 4. Inundaciones\n##### 5. Obstrucciones (generales y específicas)\n###### Obstáculo fijo (con número de filas y cantidad)\n###### Barrera antitanque\n###### Con alambradas y minas\n##### 6. Minas y Campos Minados:\n###### Mina Anti Tanque\n###### Fila de minas antitanque\n###### Mina antitanque activa\n###### Mina antitanque doble\n###### Mina antitanque doble activa\n###### Mina antipersonal\n###### Fila de minas antipersonal\n###### Mina tipo lazo de alambre\n###### Trampa caza-bobos\n###### Doble trampa antitanque y caza-bobos\n###### Banda de minas (con cantidad y límites)\n###### Límites de un campo minado\n###### Campo minado sin cerco / cercado / con minas AP y AT\n###### Campo minado simulado\n##### 7. Pasajes:\n###### A través de una fila de minas AP\n###### A través de una banda de minas AT\n###### A través de un campo minado cercado\n##### 8. Obstáculos Varios:\n###### Talas\n###### Foso\n###### Campos de piedras\n###### Campos de pilotes\n###### Bandas de obstáculos (designadas por letras)\n\n### SECCIÓN G – SÍMBOLOS DE CAMINOS Y PUENTES\n#### 1. Caminos:\n##### Tipos de superficies: Pavimentada (concreto, asfalto), Mejorada (grava, macadam, suelo estabilizado), De tierra (no mejorado)\n##### Clases de pavimento: pc (concreto), as (asfalto), pa (adoquín), Sa (superficie asfáltica), m (macadam), g (grava), se (suelo estabilizado), t (tierra), ac (arcilla), ar (arena), l (limo)\n##### Expresión de un camino: Ejemplo: \"Apc An6 8.5 Km Bueno 281200ABR94\" (tipo, ancho, longitud, condición, fecha)\n##### Ancho de vías: 1 (una vía 3.3m), 1 1/2 (una vía con sitios de pasaje), 2 (dos vías), 3 (tres vías)\n#### 2. Puentes:\n##### Tipos: vc (viga o losa de concreto), ac (arco de concreto), aa (arco de albañilería), va (vigas de acero), vca (vigas compuestas de acero), vaa (vigas armadas de acero), vm (vigas de madera), vcm (vigas compuestas de madera), vam (vigas armadas de madera), cm (caballetes de madera)\n##### Expresión de un puente: Ejemplo: \"Vaa An6 L2tl5 Alt 3.6 Elºº50T Excelente 0208:45SEP14\" (tipo, ancho, longitud, altura, espacio libre, capacidad, condición, fecha)\n##### Puentes militares: E (equipajes), F (apoyos flotantes), P (pilotes), C (caballetes), S (colgantes), Pasarela, Oroya\n##### Vados: para vehículos y ganado\n##### Pasajes de cursos de agua: playa de embarque, playa de desembarque, puestos de protección\n\n### SECCIÓN H – COMUNICACIONES\n#### 01 – Puesto de Comando en Movimiento\n#### 02 – Eje de Comunicaciones\n#### 03 – Centro de Comunicaciones\n#### 04 – Centro de Comunicaciones Avanzado\n#### 05 – Centro de Mensajes\n#### 06 – Puesto o Estación de Radio emisor Receptor tipo \"A\"\n#### 07 – Puesto o Estación de Radio Receptor tipo \"Z\"\n#### 08 – Puesto o Estación de Radiogoniometría tipo L\n#### 09 – Puesto o Estación de Radio tipo \"P\" (Director de Red)\n#### 10 – Puesto o Estación de Radio tipo \"S\" instalado en Vehículo\n#### 11 – Puesto o Estación de Radio simulado\n#### 12 – Puesto o Estación de Radio dudoso\n#### 13 – Puesto de señales tipo \"C\" (destello o heliógrafo)\n#### 14 – Estación de Televisión\n#### 15 – Central o Tablero Telefónico Militar instalado en PC\n#### 16 – Central o Tablero Telefónico Militar no instalado en PC\n#### 17 – Central o Tablero Telefónico Militar de \"n\" direcciones instalado\n#### 18 – Central o Tablero Telefónico Militar de \"n\" direcciones no instalado\n#### 19 – Central de Teletipo\n#### 20 – Central Telegráfica\n#### 21 – Terminal de Conductores alámbricos o estación de Prueba\n#### 22 – Central Telefónica\n#### 23 – Puesto Telegráfico Militar\n#### 24 – Puesto Telegráfico Militar\n#### 25 – Puesto Telefónico Civil\n#### 26 – Puesto Telegráfico Civil\n#### 27 – Puesto de Teletipo\n#### 28 – Línea Alámbrica Militar de \"n\" circuitos\n#### 29 – Línea Telefónica Permanente Civil o Militar de \"n\" circuitos\n#### 30 – Línea Telegráfica Permanente Civil o Militar de \"n\" circuitos\n#### 31 – Puesto de Comando de la FANB (PC, PC Log., etc.)\n#### 32 – Puesto de Comando de REDI (con número)\n#### 33 – Puesto de Comando de ZODI (con número)\n#### 34 – Puesto de Comando de ADI (con número)\n#### 35 – Puesto de Dirección del Comité Regional de DDI (CRDDI)\n#### 36 – Puesto de Dirección del Comité Estadal de DDI (CEDDI)\n#### 37 – Punto de Dirección del Comité Parroquial de DDI (CPDDI)\n#### 38 – Punto de Dirección del Comité Comunal de DDI (CCDDI)\n#### 39 – Punto de Dirección de empresa u otras entidades\n\n### SECCIÓN I – LÍMITES, LÍNEAS Y ZONAS\n#### 01 – Límites de responsabilidad de la unidad (con magnitud)\n#### 02 – Distrito de Zona de Comunicaciones (círculo)\n#### 03 – Sección de Zona de Comunicaciones (dos círculos)\n#### 04 – Zona de Comunicaciones (tres círculos)\n#### 05 – Teatro de Operaciones (cuatro círculos)\n#### 06 – Línea límite de reconocimiento de aviación\n#### 07 – Límite de radio de acción de aviación de combate\n#### 08 – Línea de bombardeo de aviación\n#### 09 – Límite adelante de trabajos de Ingeniería\n#### 10 – Límite delante de trabajos de Ingeniería (con escalón)\n#### 11 – Línea del frente de contacto (rojo/azul, simple/doble)\n#### 12 – Patrullas\n#### 13 – Línea del frente de contacto con patrullas\n#### 14 – Línea de vigilancia de las avanzadas (LVA)\n#### 15 – Línea de resistencia de las avanzadas (LRA)\n#### 16 – Línea principal de resistencia (LPR)\n#### 17 – Línea de Seguridad (LS)\n#### 18 – Línea de detención (LD)\n#### 19 – Línea de partida (LP)\n#### 20 – Línea de Fase (LF)\n#### 21 – Base de fuegos (BF)\n#### 22 – Punto de enlace de dos unidades\n#### 23 – Línea de extraviados (E)\n#### 24 – Objetivo Táctico (Obj)\n#### 25 – Objetivo táctico final (ICE Obj)\n#### 26 – Objetivo táctico intermedio (Obj. 1)\n#### 27 – Dirección de ataque (flecha)\n#### 28 – Dirección de ataque con objetivo (fecha no indica itinerario)\n#### 29 – Zona ocupada por una unidad\n#### 30 – Zona que debe ser ocupada por una unidad\n#### 31 – Zona de vivac\n#### 32 – Zona de emplazamiento de ganado\n#### 33 – Zona de emplazamiento de vehículos\n#### 34 – Zona ocupada por Grupo de combate (con magnitud)\n#### 35 – Zona ocupada por Compañía (con magnitud)\n#### 36 – Zona ocupada por Batallón (con magnitud)\n#### 37 – Zona prevista para ocuparse por una compañía\n#### 38 – Zona que debe ser cubierta por el tiro de Artillería o morteros\n#### 39 – Posición de at etamente enterrados / semi cubiertos / revestidos / en construcción\n#### 03 – Cementerio\n#### 04 – Punto de reunión de civiles (refugiados o evacuados)\n#### 05 – Punto de reunión de prisioneros de guerra\n#### 06 – Punto de recolección de muertos\n#### 07 – Punto de recolección de extraviados\n#### 08 – Hospital o Puesto de socorro\n#### 09 – Instalación Disciplinaria\n#### 10 – Consejo de Guerra (cac)\n#### 11 – Instalación de reposo (IR)\n#### 12 – Zona de descanso (ZD)\n#### 13 – Centro de Salida (CS)\n#### 14 – Excavación / Centro Experimental, Laboratorio\n#### 15 – Estación Principal de energía eléctrica\n#### 16 – Sub-estación de Energía Eléctrica\n#### 17 – Oleoductos\n#### 18 – Unidades epidemiológicas\n\n### SECCIÓN L – ACTIVIDADES SUBVERSIVAS\n#### 01 – Asalto de Bandoleros\n#### 02 – Aeronaves no identificadas\n#### 03 – Presencia bandoleros no confirmada\n#### 04 – Presencia bandoleros confirmada\n#### 05 – Posible campamento de bandoleros\n#### 06 – Campamento abandonado\n#### 07 – Campamento abandonado en combate\n#### 08 – Posible Centro de Entrenamiento\n#### 09 – Centro de Entrenamiento de Bandoleros\n#### 10 – Probable concha de bandoleros\n#### 11 – Concha de Bandoleros\n#### 12 – Emboscada (por tropas propias o bandoleros)\n#### 13 – Posible emboscada de Bandoleros\n#### 14 – Encuentros\n#### 15 – Probable sitio de desembarco de bandoleros\n#### 16 – Sitio de desembarco de bandoleros\n#### 17 – Probable Emisora Clandestina\n#### 18 – Emisora Clandestina\n#### 19 – Hostigamiento de bandoleros\n#### 20 – Probable sitio de abastecimiento\n#### 21 – Sitio de abastecimiento\n#### 22 – Lugar frecuentado por bandoleros\n#### 23 – Nave no identificada\n#### 24 – Población controlada por bandoleros\n#### 25 – Población no controlada por los Bandoleros\n#### 26 – Posible ruta seguida por bandoleros\n#### 27 – Ruta seguida por bandoleros\n#### 28 – Probable ruta de correaje\n#### 29 – Ruta de correaje\n#### 30 – Sabotaje efectuado por Bandoleros\n#### 31 – Sitio de aterrizaje de Aeronave No Identificada\n#### 32 – Sitio donde los Bandoleros efectuaron Asesinato\n#### 33 – Sitio donde los Bandoleros han cobrado impuesto\n#### 34 – Sitio donde los Bandoleros han efectuado Secuestro\n\n### SECCIÓN M – ACTIVIDADES DE NARCOTRÁFICO\n#### 01 – Laboratorio\n#### 02 – Plantación de coca\n#### 03 – Plantación de Marihuana\n#### 04 – Decomiso de coca\n#### 05 – Decomiso de Marihuana\n#### 06 – Decomiso de Acetona\n#### 07 – Decomiso de Éter\n#### 08 – Captura de Narcotraficantes\n#### 09 – Lugar de Embarque\n#### 10 – Lugar de Desembarque\n#### 11 – Sitio de Distribución\n#### 12 – Encuentro Armado\n#### 13 – Rutas seguidas por Narcotraficantes\n#### 14 – Posible depósito de Estupefacientes\n#### 15 – Depósito de Estupefacientes Capturado\n#### 16 – Lugar para lavado de dinero\n#### 17 – Captura de lugar para lavado de dinero\n\n### SECCIÓN N – IDENTIFICACIÓN DE BLANCOS DE DEFENSA ANTIAÉREA\n#### 01 – Hostil\n#### 02 – Desconocido\n#### 03 – Simulado\n#### 04 – Amigo\n#### 05 – Interceptor\n#### 06 – PAC (Patrulla Aérea de Combate)\n#### 07 – RAB (Regresando a Base)\n#### 08 – Especial\n\n---\n\n## CAPÍTULO V – COMBINACIÓN DE SÍMBOLOS\n\n### SECCIÓN A – DEFINICIÓN\n#### Se presentan las reglas y ejemplos para combinar símbolos básicos, de identificación, de magnitud y de actividades, así como el empleo de abreviaturas y la designación del orden de batalla.\n\n### SECCIÓN B – REGLAS BÁSICAS\n#### 1. La ubicación del símbolo indica la zona ocupada por el elemento representado.\n#### 2. Cuando se conoce el arma o servicio, se dibuja el símbolo de identificación correspondiente.\n#### 3. Unidad reforzada: se coloca el signo \"+\" encerrado en paréntesis al costado derecho.\n#### 4. Unidad incompleta: se coloca el signo \"-\" encerrado en paréntesis al costado derecho.\n#### 5. Cuando se conoce arma y magnitud, se coloca el signo de magnitud en la parte superior.\n#### 6. Excepción: en los Puestos de Socorro, el signo de magnitud va en el brazo horizontal izquierdo.\n#### 7. Si se desconoce la clase de unidad, magnitud o número, se coloca un signo de interrogación.\n#### 8. Para unidades en marcha, los símbolos se colocan siguiendo la dirección y el signo de magnitud indica el sentido.\n\n### SECCIÓN C – DESIGNACIÓN DE ORDEN DE BATALLA\n#### 1. Ejército de Operaciones: número en letras dentro del símbolo (Ej. PRIMER).\n#### 2. Cuerpo de Ejército: números romanos (Ej. I, IV).\n#### 3. Divisiones, Regimientos, Batallones, Grupos: números arábigos al costado derecho (Ej. 1ra División de Infantería, Batallón Nº 39).\n#### 4. Destacamentos Mixtos: letras (Ej. Agrupamiento Z, R).\n#### 5. Agrupamientos Tácticos y de Combate: números arábigos al costado derecho.\n#### 6. Unidades subordinadas a Batallón (compañías, baterías, escuadrones): letras mayúsculas o números al costado izquierdo (Ej. Compañía A, Primera Batería).\n#### 7. Secciones, Pelotones, Equipos: números arábigos al costado izquierdo (Ej. Primer Pelotón).\n#### 8. Puestos de Observación y Comando: el número o letra de la unidad que lo instala, en el mismo costado que la unidad.\n#### 9. Instalaciones Administrativas Divisionarias: números arábigos al costado izquierdo.\n#### 10. Instalaciones de Escalón Ejército o Zona de Comunicaciones: grupos de números según el servicio (Ingeniería 200-209, Intendencia 210-219, etc.).\n\n### SECCIÓN D – COMBINACIÓN DE SÍMBOLOS Y ABREVIATURAS\n#### Se utiliza un diagrama de ubicación de la información alrededor del símbolo básico:\n##### - Parte superior: magnitud de escalón\n##### - Costado izquierdo: subunidad (pelotón, sección, etc.)\n##### - Costado derecho: unidad superior (número o letra)\n##### - Parte inferior: abreviatura de función o servicio\n#### Ejemplos de combinación se muestran en el Capítulo VI.\n\n---\n\n## CAPÍTULO VI – EJEMPLOS ILUSTRATIVOS\n\n### SECCIÓN A – DEFINICIÓN\n#### Se presentan ejemplos concretos de combinación de símbolos para diversas armas y servicios.\n\n### SECCIÓN B – ARTILLERÍA\n#### (Lista de 24 ejemplos que muestran PC de CACE, Grupos de Artillería de Campaña, Baterías, Secciones, Puestos de Observación, Puntos de Distribución, Puestos de Socorro, etc.)\n\n### SECCIÓN C – AVIACIÓN\n#### (Ejemplos de Fuerza Aérea Táctica, Grupos de Aviación, Escuadrones de Bombardeo y Caza, Escuadrillas, Patrullas, etc.)\n\n### SECCIÓN D – CABALLERÍA\n#### (Ejemplos de Divisiones de Caballería, Brigadas, Grupos de Caballería, Escuadrones, Pelotones Antitanque y Antiaéreos, Trenes, etc.)\n\n### SECCIÓN E – ANTITANQUE\n#### (Ejemplos de unidades antitanque de diversos calibres y escalones)\n\n### SECCIÓN F – BLINDADOS\n#### (Ejemplos de Divisiones Blindadas, Brigadas, Batallones de Tanques, Compañías de Comunicaciones, Agrupamientos de Combate, etc.)\n\n### SECCIÓN G – INFANTERÍA\n#### (Ejemplos de Batallones de Infantería, Brigadas de Cazadores, Batallones Aerotransportados, de Selva, Compañías, Pelotones, Secciones de Ametralladoras, Morteros, etc.)\n\n### SECCIÓN H – INGENIERÍA\n#### (Ejemplos de Batallones de Ingeniería, Compañías, Puestos de Socorro, Puntos de Recolección de Muertos, etc.)\n\n### SECCIÓN I – COMUNICACIONES\n#### (Ejemplos de Regimientos, Escuadrones, Batallones de Comunicaciones, Compañías de Multicanales, etc.)\n\n### SECCIÓN J – INSTALACIONES Y UNIDADES DE SERVICIO\n#### (Ejemplos de Depósitos de Clases, Compañías de Abastecimiento de Agua, Panadería, Registro de Sepulturas, Material de Guerra, Remonta, Sanidad, Transporte, Veterinaria, Instalaciones Administrativas como Cementerios, Depósitos de Reemplazos, Puntos de Reunión de Prisioneros y Extraviados, etc.)\n\n---\n\n## CAPÍTULO VII – SIMBOLOGÍA DE LA ARMADA BOLIVARIANA\n\n### SECCIÓN A – DEFINICIÓN\n#### Los símbolos de la Armada Bolivariana se usan en cartas náuticas, croquis, calcos, fotografías aéreas y cuadros orgánicos.\n\n### SECCIÓN B – SÍMBOLOS DE IDENTIFICACIÓN (FLOTA)\n#### 01 – Flota (Atlántica, Oriental, Centro, Occidente)\n#### 02 – Escuadra\n#### 03 – Escuadrón de Buques\n#### 04 – Buque\n#### 05 – Fragata Misilística\n#### 06 – Buques Anfibios\n#### 07 – Buques de apoyo y servicio\n#### 08 – Submarinos oceánicos\n#### 09 – Submarinos Tácticos\n#### 10 – Submarinos Costeros\n#### 11 – Buque Fluvial\n#### 12 – Buque de Guarda Costa\n#### 13 – Patrullero de Combate\n#### 14 – Unidad Naval Estratégica\n#### 15 – Unidad Naval Preservada\n#### 16 – Unidad Naval de Cuadro\n#### 17 – Buque con cubierta de vuelo con facilidades completas\n#### 18 – Buque con cubierta de vuelo sin facilidades\n#### 19 – Buque con defensa antiaérea\n#### 20 – Buque con defensa antisubmarina\n#### 21 – Buque con guerra electrónica activa y pasiva\n#### 22 – Buque con guerra electrónica pasiva\n#### 23 – Buque de Barrido de Minas\n#### 24 – Buque en visita y registro\n#### 25 – Buque en relevo de Isla\n#### 26 – Buque realizando Control de Tráfico\n#### 27 – Escuadrón de Fragatas Misilísticas\n#### 28 – Fragata Misilística (con número)\n#### 29 – Guardacostas\n#### 30 – Escuadrón de Buques Guardacostas\n#### 31 – Buque Guardacostas\n#### 32 – Escuadrón de Combate Fluvial\n#### 33 – Transporte de Combate Fluvial\n#### 34 – Patrullero de Combate Fluvial / Escuadrillas de Lanchas Rápidas\n#### 35 – Grupo de combate fluvial\n#### 36 – Elemento de Combate Fluvial\n#### 37 – Fuerza Tarea\n#### 38 – Grupo de Tarea, Unidad de Tarea, Elemento de Tarea, Fuerza de Tarea (con nomenclatura)\n\n#### Símbolos de límites, zonas y áreas navales:\n##### – Zona Contigua\n##### – Mar Territorial\n##### – Área de Fondeo\n##### – Área de Varada\n##### – Área de Responsabilidad Búsqueda y salvamento (SAR)\n##### – Zona de Influencia Caribeña, Oceánica, Marítima Jurisdiccional\n##### – Área apta para desembarco Helitransportado\n##### – Área de Patrullaje Marítimo\n##### – Área Restringida\n\n### SECCIÓN C – SÍMBOLOS DE ACTIVIDADES NAVALES\n#### Exploración Naval, Alerta Temprana, Defensa Naval, Obstaculización de Canales Principales, Apoyo Logístico, Asegurar Embarque/Desembarque, Aseguramento de Instalación de Minas, Ayuda Humanitaria, Lucha en el Mar, Minado Naval, Infiltrar Grupos de Fuerzas Especiales, Exploración y Misiones Especiales, Búsqueda y Salvamento, Seguridad Marítima, Tráfico Marítimo, Tráfico de Pesca, Visita y Registro, Relevo de Isla, Contra Piratería, Control de Derrame de Combustible, Ejercicio Naval, Actividad de Remolque, Anti Drogas, Embarcación de desembarco, Vehículo de desembarco a rueda/oruga, Embarcación de guerra.\n\n### SECCIÓN D – SÍMBOLOS DE LA AVIACIÓN NAVAL\n#### Escuadrón de Patrullaje (S43), Escuadrón de Transporte (BE-90), Escuadrón de Adiestramiento (Cessna 206, Bell 206A, Bell 212, Bell 412 o MI-17V-5), Apoyo táctico.\n#### Condiciones de alerta para helicópteros:\n##### – ALERTA 5: aeronave en cubierta de vuelo, tripulación sentada, tiempo de reacción 5 minutos.\n##### – ALERTA 15: tripulación despierta, tiempo de reacción 15 minutos.\n##### – ALERTA 30: tripulación en descanso, tiempo de reacción 30 minutos.\n##### – ALERTA 60: condición normal de navegación.\n##### – ALERTA EN PUERTO: tiempo estimado 2 horas.\n\n### SECCIÓN E – SÍMBOLOS DE LA INFANTERÍA DE MARINA\n#### Puesto de comando de una brigada de infantería de marina, Batallón de infantería de marina, Batería de artillería, Pelotón de comunicaciones, Punto de suministros clase V, Compañía de vehículos anfibios.\n\n### SECCIÓN F – SÍMBOLOS PARA LA NAVEGACIÓN E HIDROLOGÍA\n#### Líneas de costa (levantada, aproximada, escarpada, loma costera, arenosa, rocosa, dunas)\n#### Relieve (curvas de nivel, puntos acotados)\n#### Cuencas (ríos, lagos, salinas)\n#### Vegetación (bosque, árboles aislados, palmeras, manglares, etc.)\n#### Puertos artificiales (dique, muralla, rompeolas, muro de contención)\n#### Instalaciones de puerto (malecón, muelles, pontón, desembarco, escala, duque de alba, rampa, dique seco, dique flotante, dársena, etc.)\n#### Sondeos y alturas secas (profundidades, alturas sobre datum)\n#### Servicios (estaciones de radio, faros, boyas, balizas)\n#### Señalización marítima (cardinal norte, sur, este, oeste; boyas de peligro aislado, aguas seguras, especiales)\n#### Tipo de fondo (arena, fango, arcilla, limo, piedras, grava, coral, conchas, etc.)\n#### Canales de navegación (direcciones establecidas, líneas de separación, zonas de tráfico, áreas restringidas)\n#### Zonas de fondeo (fondeadero, área de fondeo general, numerada, para tanqueros, por cuarentena, etc.)\n#### Zonas restringidas (prohibido fondear, pescar, reserva natural, área de vaciado de explosivos)\n#### Zonas militares (área de práctica de artillería, área militar restringida, área de práctica con minas, línea de tránsito submarino, campo de minas)\n#### Profundidades en áreas canalizadas (área dragada, canal, área barrida, área no hidrografiada)\n#### Área intermareal (arena y fango, rocosa, arrecifes de coral)\n#### Naufragios (descubierto, cubierto, sumergido, con mástil visible)\n#### Obstrucciones (profundidad desconocida/conocida, trampas de pesca, fondo de conchas)\n#### Plataformas costa afuera (con/sin luz, límite de seguridad)\n#### Cable submarino (cable, área de cable, cable de poder)\n#### Derrotas (enfilación de paso, seguridad, derrota recomendada, de sentido único, con calado permitido)\n#### Puntos de referencia (vértice de triangulación, pilar de observación, punto de posición determinada, referencia de nivelación)\n\n---\n\n## CAPÍTULO VIII – SIMBOLOGÍA DE LA GUARDIA NACIONAL BOLIVARIANA\n\n### SECCIÓN A – DEFINICIÓN\n#### Los símbolos de la GNB se usan en planos, croquis, calcos, fotografías aéreas y cuadros orgánicos.\n\n### SECCIÓN B – SÍMBOLOS DE IDENTIFICACIÓN\n#### Se identifica mediante un rectángulo con una diagonal de izquierda a derecha. Para instalaciones administrativas, se traza una diagonal a 45° en el círculo.\n\n### SECCIÓN C – SÍMBOLOS DE MAGNITUD\n#### Los símbolos de magnitud son los mismos que los del manual general. Se indican ubicaciones actuales y proyectadas (línea quebrada). Se incluyen grupos de fecha-hora.\n\n### SECCIÓN D – SÍMBOLOS DE ACTIVIDADES DE LA GNB\n#### Se dibujan símbolos específicos dentro del rectángulo con la diagonal. Ejemplos:\n##### – Segunda Compañía del Destacamento N° 81 en actividades de Defensa Civil.\n##### – Unidad en actividades de Inteligencia Estratégica, etc.\n\n### SECCIÓN E – DESIGNACIÓN Y COMBINACIÓN DE UNIDADES\n#### Designación: al costado derecho del símbolo (ej. Destacamento Móvil N° 433, Comando de Zona N° 43). Para unidades específicas (pelotón o menores) se coloca la designación a la izquierda, separando escalones con diagonal (ej. 1/2/4).\n\n---\n\n## CAPÍTULO IX – SÍMBOLOS DE LA MILICIA BOLIVARIANA\n\n### SECCIÓN A – UNIDADES\n#### Se identifican con el mismo sistema de símbolos básicos del manual general, pero con la abreviatura MT (Milicia Territorial) y el tipo de empleo (General, Local, Territorial) en la parte inferior.\n#### Unidades: Batallón, Compañía, Patrulla, Escuadra, Equipo de Milicia Territorial.\n\n### SECCIÓN B – PUESTO DE COMANDO\n#### Símbolo de bandera con la abreviatura MT y el tipo de empleo.\n\n### SECCIÓN C – PUESTO DE OBSERVACIÓN\n#### Símbolo de triángulo con MT y tipo de empleo.\n\n### SECCIÓN D – UNIDADES ESPECIALES\n#### Parque Popular de Armas Menores, Cuerpo Combatiente (con nombre: Pescalba, Cantv, Pdvsa, etc.), Formación Especial (Terrestre, Marítima, Fluvial).\n\n### SECCIÓN E – REGLAS GENERALES\n#### Para designar un Batallón de Milicia se usa \"MT\" en el interior y la inicial del empleo en la parte inferior. Para un Cuerpo Combatiente se usa \"Cpo. Comb.\" y el nombre en la parte inferior. Para Formación Especial se usa \"F Esp.\" y el nombre.\n\n---\n\n## CAPÍTULO X – SIMBOLOGÍA DE LAS TAREAS TÁCTICAS DE LA MISIÓN (SIMBOLOGÍA DE INTELIGENCIA MILITAR)\n\n### SECCIÓN A – GENERALIDADES\n#### Se presenta una simbología actualizada para el estudio del enemigo y la apreciación de la amenaza, basada en el nuevo enfoque de inteligencia militar. Los colores, trazos y orientaciones siguen las técnicas de símbolos militares pero adaptados al estudio del enemigo.\n\n### SECCIÓN B – ACCIONES DEL ENEMIGO (AZUL)\n#### 01 – Curso de acción (CA)\n#### 02 – Grupo Seal\n#### 03 – Helicóptero de Ataque\n#### 04 – Avión de Combate\n#### 05 – Desembarco (LCAC)\n#### 06 – Cohete Crucero\n#### 07 – Desembarco Helitransportado\n#### 08 – Helicóptero de transporte\n#### 09 – Helicóptero de combate\n#### 10 – Crucero coheteril\n#### 11 – Destructor\n#### 12 – Buque anfibio (LHD, LPD, LHA)\n#### 13 – Barcaza de colchón de aire (LCAC)\n#### 14 – Patrullaje avión no tripulado (UAV)\n#### 15 – Zona de Aviones de combate\n#### 16 – Grupo de ataque de defensa coheteril (GASDCC)\n#### 17 – Apoyo de fuego\n#### 18 – Área de buque anfibio\n#### 19 – LPD-LCD (buque anfibio)\n#### 20 – Probable dirección de acercamiento de aviación de combate\n#### 21 – Batallón de obús\n#### 22 – Dirección de acercamiento\n#### 23 – Grupo de ataque submarino\n#### 24 – Grupo de ataque portaviones (GAP)\n#### 25 – Desembarco de LAV\n#### 26 – Buque dique de desembarco\n#### 27 – Barcaza de desembarco colchón de aire (LCAC)\n#### 28 – Fuerzas de operaciones especiales (FOE-SEAL)\n#### 29 – Fuerzas de operaciones especiales (FOE-SEAL) &lt; tr &gt;\n#### 30 – Espacio de Desplazamiento de Helicóptero de Ataque\n#### 31 – Unidad de Desembarco\n#### 32 – Espacio de Desplazamiento\n#### 33 – Actuación de un GEA (45-70 KM)\n#### 34 – Actuación de apoyo de Fuego Naval\n#### 35 – Tanque\n#### 36 – Mortero 81 mm\n#### 37 – Mortero 60 mm\n#### 38 – Ametralladora\n#### 39 – Órbita helicóptero de exploración\n#### 40 – Puesto de Comando de Batallón\n#### 41 – Puesto de Comando de Pelotón\n#### 42 – Patrulla de Exploración\n#### 43 – Defensa Anti Aérea\n\n### SECCIÓN C – SÍMBOLOS DE EXPLORACIÓN (ROJO)\n#### 01 – Área de especial atención (AEA)\n#### 02 – Región de especial Atención (REA 1,2,3)\n#### 03 – Puesto de observación principal del Comando Superior (POP)\n#### 04 – Puesto de observación (PO) 1,2,3\n#### 05 – Patrulla de exploración (PAE) 1,2,3\n#### 06 – Estación de exploración radio electrónica (EERE)\n#### 07 – Sistema de radio Localización\n\n### SECCIÓN D – SÍMBOLOS DE INTELIGENCIA MILITAR (Extensa lista)\n#### Se incluyen símbolos para:\n##### – Puestos de observación (química, ingeniería, técnica)\n##### – Grupos de exploración de profundidad (GEP)\n##### – Patrullas de exploración (Pe, Pec, Peo, Pei, Peq)\n##### – Regiones de desembarco de paracaídas\n##### – Grupos de exploración especial (GEE)\n##### – Exploradores independientes\n##### – Puntos de reunión y encuentro\n##### – Lugares de infiltración\n##### – Búsqueda por grupos de exploración\n##### – Destacamentos de exploración DEFOE\n##### – Áreas y regiones de atención especial\n##### – Región de lanzamiento de fuerzas especiales\n##### – Escondites (con armamento, comunicaciones, víveres, municiones)\n##### – Asalto, incursión, dirección del golpe principal (DGP)\n##### – Región de desembarco aéreo\n##### – Puesto de observación artillera\n##### – Sector principal de exploración\n##### – Observador aéreo, avión sin piloto (ASP), avión torpedero, avión de exploración táctica y operativa\n##### – Exploración radio técnica, radiogoniometría, comunicaciones por satélite\n##### – Estaciones de exploración radioelectrónica (fijas y móviles)\n##### – Pelotones, compañías, batallones, brigadas de exploración radioelectrónica\n##### – Aviones y helicópteros de exploración radioelectrónica\n##### – Buques de exploración radioelectrónica\n##### – Profundidades de exploración (OC, OUC)\n##### – Centro de dirección de aviso\n##### – Puesto de información químico, escuadra de exploración radiactiva y química\n##### – Red de exploradores\n##### – Región enmascarada con fumígenos\n##### – Región de explosión nuclear (con potencia, tipo, hora, fecha)\n##### – Puesto de observación ingeniera, patrulla de exploración ingeniera, grupo de exploración ingeniera de profundidad y subacuática\n##### – Grupo de reconocimiento y desactivación de minas, bombas y proyectiles\n\n---\n\n## CAPÍTULO XI (en el PDF se enumera como CAPÍTULO XII) – ABREVIATURAS MILITARES\n\n### SECCIÓN A – GENERALIDADES\n#### Contiene las abreviaturas reglamentarias y las reglas para su uso en documentos de campaña (planes, órdenes, informes, calcos, croquis, cartas).\n\n### SECCIÓN B – CLASIFICACIÓN\n#### 1. Simples: letras correspondientes a una palabra (ej. Alc. por alcance, Cia. por Compañía).\n#### 2. Compuestas: reunión de dos o más abreviaturas simples (ej. Alc. Ver. por Alcance vertical) o siglas (ej. BI por Batallón de Infantería).\n#### 3. Comunes: pesos y medidas (ej. Km., Ton.).\n\n### SECCIÓN C – REGLAS PARA EMPLEAR ABREVIATURAS\n#### 1. Claridad: solo usar abreviaturas que se entiendan claramente.\n#### 2. Mayúsculas: en abreviaturas simples al inicio de período; en compuestas siempre mayúscula.\n#### 3. Puntuación: no llevan puntuación.\n#### 4. Número y tiempo: sustantivos en singular; plural duplicando la abreviatura (BBII para Batallones de Infantería). Usar siempre la misma abreviatura para un mismo juicio.\n#### 5. Fecha y Hora: día/mes/año (18Oct03), hora en 4 cifras (0530), grupo fecha-hora en 6 cifras (181730Oct82).\n\n### SECCIÓN D – ABREVIATURAS SÍMILES (Listado alfabético extenso)\n#### Se incluye un diccionario de abreviaturas militares de la A a la Z, con más de 600 entradas, que cubre:\n##### – Grados y escalones (Alférez, Capitán, Coronel, General, Teniente, etc.)\n##### – Unidades y subunidades (Batallón, Brigada, Compañía, Destacamento, Escuadrón, Grupo, Pelotón, Regimiento, Sección, etc.)\n##### – Servicios y funciones (Abastecimiento, Armamento, Inteligencia, Intendencia, Logística, Sanidad, Transporte, Veterinaria, etc.)\n##### – Términos tácticos y operativos (Ataque, Defensa, Emboscada, Exploración, Ofensiva, Operaciones, Reconocimiento, etc.)\n##### – Instalaciones (Cementerio, Depósito, Hospital, Puesto de Comando, Puesto de Observación, etc.)\n##### – Materiales y clases (Combustible, Municiones, Raciones, etc.)\n##### – Términos geográficos y de navegación (Aeródromo, Puerto, Río, Vado, etc.)\n##### – Organizaciones (ODDI, ZODI, REDI, ADI, etc.)\n#### El listado es muy completo y se utiliza para la redacción de órdenes y documentos militares.\n\n\n## CIERRE DEL MANUAL\n### El manual concluye con la lista de abreviaturas y la indicación de que cualquier información adicional se complementa con el formato (6WH): ¿Qué sucedió? ¿Cuándo? ¿Dónde? ¿Por qué? ¿Cómo? ¿A quién?\n\n**Fin del documento estructurado**\n\n\n\n\n\n\n\n\n\n\n\n";
    function parsear(texto){
        const lineas=texto.split(/\r?\n/);
        const nodos=[]; let pila=[]; let id=1;
        for(let linea of lineas){
            linea=linea.trim(); if(!linea)continue;
            let nivel=-1, etiqueta=linea;
            if(linea.startsWith("# ")){nivel=0; etiqueta=linea.slice(2).trim();}
            else if(linea.startsWith("## ")){nivel=1; etiqueta=linea.slice(3).trim();}
            else if(linea.startsWith("### ")){nivel=2; etiqueta=linea.slice(4).trim();}
            else if(linea.startsWith("#### ")){nivel=3; etiqueta=linea.slice(5).trim();}
            else if(linea.startsWith("##### ")){nivel=4; etiqueta=linea.slice(6).trim();}
            else if(linea.startsWith("- ")||linea.startsWith("* ")){nivel=pila.length?pila[pila.length-1].nivel+1:1; etiqueta=linea.slice(2).trim();}
            else{nivel=pila.length?pila[pila.length-1].nivel+1:1; etiqueta=linea;}
            while(pila.length&&pila[pila.length-1].nivel>=nivel) pila.pop();
            const padreId=pila.length?pila[pila.length-1].id:null;
            const nuevoId=id++;
            nodos.push({id:nuevoId, etiqueta, nivel, padreId});
            pila.push({id:nuevoId, nivel});
        }
        const hijosMap=new Map(); nodos.forEach(n=>hijosMap.set(n.id,[]));
        nodos.forEach(n=>{if(n.padreId) hijosMap.get(n.padreId).push(n.id);});
        const raices=nodos.filter(n=>n.padreId===null);
        return {nodos, hijosMap, raices};
    }
    function renderizar(raices, nodosMap, hijosMap){
        const contenedor=document.getElementById('mapa');
        if(!raices.length){contenedor.innerHTML='<div style="padding:20px;">No se encontró jerarquía</div>'; return;}
        const build=(idNodo)=>{
            const nodo=nodosMap.get(idNodo); if(!nodo) return null;
            const hijos=hijosMap.get(idNodo)||[];
            const card=document.createElement('div');
            card.className='card level-'+Math.min(nodo.nivel,7);
            const tituloDiv=document.createElement('div');
            tituloDiv.className='title';
            const span=document.createElement('span');
            span.textContent=nodo.etiqueta;
            tituloDiv.appendChild(span);
            let icono=null;
            if(hijos.length){
                icono=document.createElement('span');
                icono.className='icon';
                icono.textContent='▶';
                tituloDiv.appendChild(icono);
            }
            card.appendChild(tituloDiv);
            let childDiv=null;
            if(hijos.length){
                childDiv=document.createElement('div');
                childDiv.className='children collapsed';
                for(let h of hijos){
                    const sub=build(h);
                    if(sub) childDiv.appendChild(sub);
                }
                card.appendChild(childDiv);
                card.addEventListener('click',(e)=>{
                    e.stopPropagation();
                    if(childDiv.classList.contains('collapsed')){
                        childDiv.classList.remove('collapsed');
                        if(icono) icono.textContent='▼';
                    }else{
                        childDiv.classList.add('collapsed');
                        if(icono) icono.textContent='▶';
                    }
                });
            }
            return card;
        };
        const rootDiv=document.createElement('div');
        for(let r of raices){
            const rc=build(r.id);
            if(rc) rootDiv.appendChild(rc);
        }
        contenedor.innerHTML=''; contenedor.appendChild(rootDiv);
    }
    const {nodos, hijosMap, raices}=parsear(textoOriginal);
    const nodosMap=new Map(); nodos.forEach(n=>nodosMap.set(n.id,n));
    renderizar(raices, nodosMap, hijosMap);
    document.getElementById('expandirTodo').addEventListener('click',()=>{
        document.querySelectorAll('.children').forEach(c=>c.classList.remove('collapsed'));
        document.querySelectorAll('.icon').forEach(i=>i.textContent='▼');
    });
    document.getElementById('colapsarTodo').addEventListener('click',()=>{
        document.querySelectorAll('.children').forEach(c=>c.classList.add('collapsed'));
        document.querySelectorAll('.icon').forEach(i=>i.textContent='▶');
    });
</script>
