Comandante\n##### 1.3.1. El ODDI actúa como un enlace que traduce las órdenes del Comandante en requerimientos concretos de información y coordinación en el territorio.\n##### 1.3.2. No se improvisa; se sigue el hilo conductor de la misión.\n\n### 2. LEVANTAMIENTO DE INFORMACIÓN Y MAPA INTEGRADO\n#### 2.1. Mapa integrado (política, economía, orden público)\n##### 2.1.1. Cada comité debe contribuir a la elaboración de un Mapa de Situación Integrado que incluya las siguientes dimensiones:\n###### Dimensión: Política\n####### Información a incluir: Ubicación de sedes gubernamentales, consejos comunales, UBCH, jefes de calle, puntos de información pública.\n####### Responsable principal: C1 (Patriótico) y C3 (Social)\n###### Dimensión: Economía\n####### Información a incluir: Depósitos de alimentos, farmacias, estaciones de servicio, talleres, maquinaria disponible, vehículos, centros de acopio.\n####### Responsable principal: C2 (Económico) y C5 (Movilización)\n###### Dimensión: Orden Público\n####### Información a incluir: Puestos de control de la PNB, refugios, zonas de riesgo, puntos de bloqueo, instalaciones de protección civil.\n####### Responsable principal: C4 (Orden Interno)\n#### 2.2. Ampliación del área de actuación\n##### 2.2.1. El ODDI no debe limitarse a los límites administrativos de una parroquia.\n##### 2.2.2. Si en la parroquia afectada no hay hospitales, se debe identificar el hospital más cercano, los depósitos de agua y comida más próximos, aunque estén en otra parroquia o municipio.\n##### 2.2.3. El mapa del ODDI debe cubrir todo el territorio funcional que pueda ser utilizado para la respuesta.\n#### 2.3. Levantamiento de información clave (por comité)\n##### 2.3.1. C1 – Patriótico\n###### Información a levantar: Medios de comunicación locales, líderes de opinión, rumores activos, estado de la moral, actividades de bienestar.\n##### 2.3.2. C2 – Económico\n###### Información a levantar: Inventario de alimentos (incluyendo comedores, loncherías), agua (cisternas, pozos, plantas de tratamiento), maquinaria (grúas, retroexcavadoras, camiones), vehículos disponibles.\n##### 2.3.3. C3 – Social\n###### Información a levantar: Damnificados (número, ubicación, necesidades), refugiados, albergues, servicios de salud, grupos vulnerables (niños, ancianos, indígenas).\n##### 2.3.4. C4 – Orden Interno\n###### Información a levantar: Daños estructurales, derrumbes, escombros, zonas de riesgo (deslizamientos, inundaciones, fugas de materiales peligrosos), puntos de control.\n##### 2.3.5. C5 – Movilización\n###### Información a levantar: Personal disponible (milicianos, reservistas, personal técnico), registro de medios productivos, actas de requisición.\n\n### 3. COORDINACIÓN CON ASIMILADOS Y ENLACES\n#### 3.1. Apoyo a los oficiales asimilados\n##### 3.1.1. Los ODDI deben colaborar activamente con los oficiales asimilados (médicos, ingenieros, administradores, etc.) que se integren a la operación.\n###### Ejemplo (salud asimilada):\n####### Si un equipo de salud asimilado realiza un levantamiento epidemiológico, el ODDI debe proporcionarle mapas de acceso, información sobre refugiados, y datos de los centros de salud existentes.\n###### Ejemplo (ingeniería asimilada):\n####### Si un ingeniero asimilado necesita maquinaria para remover escombros, el ODDI debe indicarle dónde se encuentra la maquinaria disponible y cómo gestionar su requisición.\n#### 3.2. Enlace con la Policía Nacional Bolivariana (PNB)\n##### 3.2.1. Dado que estamos en el ámbito comunitario, las funciones de policía militar (PM) son ejercidas por la PNB.\n##### 3.2.2. El C4 (Orden Interno) debe coordinar con la PNB para:\n###### Control de accesos a zonas críticas.\n###### Custodia de depósitos y centros de acopio.\n###### Regulación del tránsito.\n###### Investigación de delitos cometidos durante la emergencia.\n\n### 4. GESTIÓN DE RECURSOS Y LOGÍSTICA (AGUA, COMIDA, ESCOMBROS)\n#### 4.1. Agua\n##### 4.1.1. Identificar fuentes de agua operativas (pozos, cisternas, plantas de tratamiento).\n##### 4.1.2. Si no hay agua en la parroquia, buscar en las adyacentes.\n##### 4.1.3. Mapear puntos de distribución de agua y llenaderos.\n#### 4.2. Comida\n##### 4.2.1. Identificar todos los depósitos de alimentos, incluyendo comedores escolares, comedores militares, cantinas, loncherías y otros establecimientos con capacidad de cocina y almacenamiento.\n##### 4.2.2. No limitarse a los grandes depósitos.\n#### 4.3. Escombros\n##### 4.3.1. Identificar la maquinaria disponible para la remoción de escombros (retroexcavadoras, grúas, camiones volcadores).\n##### 4.3.2. Mapear puntos de acopio temporal de escombros.\n##### 4.3.3. Establecer prioridades de despeje (vías de acceso a hospitales, centros de acopio, refugios).\n#### 4.4. Gestión de recursos\n##### 4.4.1. Todos los recursos identificados deben ser registrados en el Mapa de Recursos Logísticos (SALTE) y puestos a disposición del Estado Mayor.\n\n### 5. MISIÓN Y APRECIACIÓN ESPECÍFICA DEL COMITÉ\n#### 5.1. Misión específica\n##### 5.1.1. Cada comité debe formular su propia misión específica para el evento, en lugar de usar la misión genérica del ODDI.\n##### 5.1.2. La misión debe responder a las preguntas: ¿Qué debemos lograr? y ¿Para qué sirve nuestro comité en esta operación concreta?\n###### Formato sugerido para la misión del comité:\n####### *\"Coordinar la [función específica: información/recursos/atención social/seguridad/movilización] en el territorio de [ZODI/parroquia], para [propósito en el contexto del desastre], en apoyo al Estado Mayor ZODI/REDI, durante la Operación Desastre 02-2026.\"*\n###### Ejemplo (C2 – Económico, ZODI Capital):\n####### *\"Coordinar el levantamiento y actualización del inventario de recursos logísticos (alimentos, agua, maquinaria) en la Parroquia Catedral y áreas aledañas, para garantizar el abastecimiento a los refugios y las tareas de remoción de escombros, en apoyo al Estado Mayor ZODI Capital, durante la Operación Desastre 02-2026.\"*\n#### 5.2. Apreciación de la situación\n##### 5.2.1. Cada comité debe realizar su propia apreciación de la situación (siguiendo el formato del Capítulo VIII del Manual de Personal, adaptado a la defensa integral).\n##### 5.2.2. La apreciación debe incluir los siguientes elementos:\n###### Misión recibida (del Estado Mayor o del Coordinador General ODDI).\n###### Situación y consideraciones: Descripción de la situación en el territorio, los recursos disponibles, las limitaciones y los riesgos.\n###### Cursos de acción posibles: Opciones para cumplir la misión.\n###### Análisis de cada curso de acción: Ventajas y desventajas.\n###### Recomendación: Curso de acción propuesto.\n###### Plan de ejecución: Tareas concretas, responsables y plazos.\n##### 5.2.3. Esta apreciación servirá como el \"manual\" interno de cada comité para el desarrollo de la operación.\n\n### 6. ENTREGA DE INFORMACIÓN AL ESTADO MAYOR\n#### 6.1. Productos obligatorios\n##### 6.1.1. Cada comité debe entregar al Estado Mayor (a través del Coordinador General ODDI) los siguientes productos, en los plazos establecidos:\n###### Producto: Mapa Integrado\n####### Plazo: Fase 0 (H+0 a H+12)\n####### Contenido mínimo: Ubicación de recursos, riesgos, refugios, puntos de control, organización popular.\n###### Producto: Informe de situación\n####### Plazo: Diario\n####### Contenido mínimo: Resumen de la situación en el área de responsabilidad del comité.\n###### Producto: Actualización de recursos\n####### Plazo: Diario\n####### Contenido mínimo: Cambios en inventarios, disponibilidad de personal, nuevas necesidades.\n###### Producto: Informe de riesgos (C4)\n####### Plazo: Fase 1 y diario\n####### Contenido mínimo: Daños identificados, riesgos secundarios, acciones de mitigación.\n###### Producto: Apreciación del comité\n####### Plazo: Fase 0\n####### Contenido mínimo: Documento con la misión, situación, cursos de acción y recomendación del comité.\n#### 6.2. Formato de entrega\n##### 6.2.1. La información debe ser entregada en formato digital (shapefile, KML, mapas impresos) y acompañada de un informe resumen ejecutivo.\n\n### 7. CONSIDERACIONES FINALES\n#### 7.1. El mapa no debe ser \"tan grande\" pero debe ser completo\n##### 7.1.1. El mapa del ODDI debe ser claro, práctico y contener toda la información relevante para la operación, sin sobrecargarlo con datos innecesarios.\n#### 7.2. Los asimilados son aliados\n##### 7.2.1. Los oficiales asimilados (médicos, ingenieros, etc.) son parte del equipo.\n##### 7.2.2. El ODDI debe facilitarles el acceso a la información y los recursos para que cumplan su misión.\n#### 7.3. Resolver poco a poco, pero siempre enlazado\n##### 7.3.1. El ODDI va resolviendo las situaciones en el terreno, pero siempre reportando al Estado Mayor y siguiendo las órdenes del Comandante.\n##### 7.3.2. No se actúa por iniciativa propia sin coordinar.\n#### 7.4. Crear su propio manual\n##### 7.4.1. Cada comité debe construir su propio \"manual\" a partir de la misión y la apreciación que elabore.\n##### 7.4.2. Ese manual será su guía de acción durante toda la operación.\n\n---\n\n# INFORME DE OPERACIONES ODDI «DESASTRE» 02-2026\n\n## DATOS DE IDENTIFICACIÓN DEL DOCUMENTO\n### ORIGINAL-3/COPIAS – REDI ESPECIAL CARACAS\n#### Coordenadas: (7.85698, -67.50759)\n#### Fecha y hora de emisión: 170600JUN26\n#### Clave de operación: ZAMORA-DESASTRES\n#### Naturaleza del documento: ORIGINAL – Informe de Operaciones ODDI\n\n---\n\n## REFERENCIAS LEGALES Y DOCTRINARIAS\n### 1. Constitución de la República Bolivariana de Venezuela (Gaceta Oficial Extraordinario N° 5.908 del 19 de febrero de 2009, Enmienda N° 1 del 15 de febrero de 2009)\n### 2. Ley Constitucional de la Fuerza Armada Nacional Bolivariana (Gaceta Oficial Extraordinario N° 6.508 del 30 de enero de 2020)\n### 3. Ley del Comando para la Defensa Integral de la Nación\n### 4. Decreto Presidencial N° 5.078 (activación de los ODDI, Gaceta Oficial del 8 de enero de 2025)\n### 5. Ley Orgánica de Seguridad de la Nación (Decreto N° 1.473, Gaceta Oficial Extraordinario N° 6.156 del 19 de noviembre de 2014)\n### 6. Manual de Personal del Ejército Venezolano (Mayor Eduardo Chacín, Caracas, mayo de 2026)\n### 7. Cuadernos de Trabajo para los Comités de los ODDI (Lic. Gerard Sieveres, Caracas, junio de 2026)\n### 8. Curso de Operaciones de Defensa Integral (CODDI) – Pensum de Estudio (Lic. Gerard Sieveres, Caracas, junio de 2026)\n\n---\n\n## ANEXO A: INFORME DEL COMITÉ PATRIÓTICO BOLIVARIANO (C1)\n### 1. MISIÓN\n#### Coordinar la difusión de información oficial, la contrainformación, la educación patriótica y las actividades de bienestar y moral para el ODDI y la población civil afectada, en el marco de la Operación Desastre 02-2026, garantizando la cohesión social y el apoyo a las decisiones del Estado Mayor ZODI/REDI.\n### 2. MANIOBRA\n#### Desplegar equipos de comunicación en las zonas afectadas para monitorear el estado de la opinión pública, contrarrestar rumores y desinformación mediante comunicados oficiales y redes sociales, y coordinar con los capellanes y los servicios especiales (cine, deportes, bibliotecas) para mantener la moral en los refugios y albergues.\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Alta vulnerabilidad a la desinformación y los rumores en las zonas de desastre.\n#### 3.2. Necesidad de mantener la moral de la tropa y la población civil ante la adversidad.\n#### 3.3. Importancia de la coordinación con los medios de comunicación locales y nacionales para difundir mensajes oficiales.\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Información Pública y Relaciones para la emisión de comunicados oficiales iniciales.\n##### 4.1.2. Establecer enlace con los medios de comunicación locales para la difusión de mensajes de calma y orientación.\n##### 4.1.3. Activar el Subcomité de Moral y Servicios de Personal para evaluar el estado de la moral en las unidades afectadas.\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Monitorear y contrarrestar activamente los rumores y la desinformación en redes sociales y medios comunitarios.\n##### 4.2.2. Organizar actividades de bienestar (cine, deportes, charlas) en los refugios y albergues.\n##### 4.2.3. Coordinar con el Capellán para la atención espiritual de damnificados y personal de respuesta.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Mantener una campaña de información continua, destacando los logros de la operación y las acciones de ayuda humanitaria.\n##### 4.3.2. Evaluar el impacto de las actividades de bienestar en la moral de la población.\n##### 4.3.3. Actualizar los mensajes según la evolución de la situación.\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C3 (Comité Social Popular) para alinear los mensajes de información pública con las acciones de asistencia social y protección de derechos.\n#### 5.2. Coordinar con el C2 (Comité Económico) para difundir información sobre la disponibilidad de recursos logísticos y puntos de distribución.\n#### 5.3. Coordinar con el C4 (Comité de Orden Interno) para garantizar que la información pública no interfiera con las medidas de seguridad y control de acceso.\n\n---\n\n## ANEXO B: INFORME DEL COMITÉ ECONÓMICO, PRODUCTIVO Y DE SERVICIOS (C2)\n### 1. MISIÓN\n#### Coordinar el levantamiento y actualización del inventario de recursos logísticos (SALTE), la administración de la mano de obra civil disponible y la gestión de los servicios de cantinas y finanzas en las zonas afectadas, para garantizar el sostenimiento de la operación y la atención a la población damnificada.\n### 2. MANIOBRA\n#### Desplegar equipos de reconocimiento para identificar y georreferenciar depósitos de alimentos, medicinas, vehículos, maquinaria pesada, combustibles y equipos de comunicación. Clasificar y movilizar mano de obra civil voluntaria u obligatoria (técnicos, operarios, conductores). Asegurar la operación de cantinas fijas y móviles en los refugios.\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Posible colapso de las cadenas de suministro y distribución de alimentos y medicinas.\n#### 3.2. Necesidad de movilizar rápidamente mano de obra especializada (operarios de maquinaria pesada, técnicos).\n#### 3.3. Riesgo de saqueos y mercado negro en las zonas afectadas.\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Requisición y Registro para iniciar el levantamiento del inventario de recursos logísticos (SALTE) en el área de responsabilidad.\n##### 4.1.2. Activar el Subcomité de Administración de Personal Civil para identificar y clasificar la mano de obra civil disponible.\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Entregar el Mapa de Recursos Logísticos (SALTE) al Estado Mayor, con la localización de depósitos, vehículos y maquinaria.\n##### 4.2.2. Organizar y movilizar los primeros equipos de mano de obra civil para tareas de remoción de escombros y distribución de suministros.\n##### 4.2.3. Activar el Servicio de Cantinas en los refugios y albergues.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Actualizar diariamente el inventario de recursos logísticos y reportar cambios al Estado Mayor.\n##### 4.3.2. Gestionar la reposición de suministros y la rotación de la mano de obra civil.\n##### 4.3.3. Implementar medidas de control para evitar el mercado negro y garantizar la distribución equitativa.\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C5 (Comité de Movilización) para la gestión de la requisición legal de bienes y la movilización de recursos.\n#### 5.2. Coordinar con el C3 (Comité Social Popular) para garantizar que la distribución de alimentos y suministros llegue a los grupos más vulnerables.\n#### 5.3. Coordinar con el C4 (Comité de Orden Interno) para la seguridad de los depósitos y la protección de los convoyes de suministros.\n\n---\n\n## ANEXO C: INFORME DEL COMITÉ SOCIAL POPULAR (C3)\n### 1. MISIÓN\n#### Coordinar la atención humanitaria a la población damnificada, la protección de los derechos humanos y la integración social en las zonas afectadas, garantizando el acceso a albergues, alimentos, salud y asistencia social para los grupos más vulnerables.\n### 2. MANIOBRA\n#### Identificar y registrar a los damnificados, habilitar albergues y centros de acopio, y coordinar con las misiones sociales (salud, alimentación, educación) y las organizaciones humanitarias (Cruz Roja) para la prestación de servicios básicos. Monitorear posibles violaciones de derechos humanos en los refugios.\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Alta concentración de población vulnerable (niños, ancianos, personas con discapacidad) en las zonas afectadas.\n#### 3.2. Riesgo de brotes de enfermedades en los albergues debido al hacinamiento y la falta de servicios sanitarios.\n#### 3.3. Necesidad de coordinar con las comunidades organizadas (consejos comunales, UBCH) para la identificación de damnificados y la distribución de ayuda.\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Asuntos Civiles para establecer contacto con los consejos comunales y las autoridades locales.\n##### 4.1.2. Iniciar el censo de damnificados y la identificación de albergues potenciales (escuelas, iglesias, centros comunales).\n##### 4.1.3. Activar el Subcomité de Misiones Sociales para coordinar la respuesta de salud y alimentación.\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Entregar el Mapa de Organización del Poder Popular y el censo inicial de damnificados al Estado Mayor.\n##### 4.2.2. Habilitar los primeros albergues y centros de acopio, garantizando agua, alimentos y atención médica básica.\n##### 4.2.3. Iniciar el monitoreo de derechos humanos en los refugios.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Actualizar diariamente el registro de damnificados y las condiciones en los albergues.\n##### 4.3.2. Coordinar con las misiones sociales la prestación de servicios continuos (educación, salud mental, recreación).\n##### 4.3.3. Implementar un plan de rehabilitación comunitaria para las zonas afectadas.\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C1 (Comité Patriótico) para la difusión de información sobre los servicios de asistencia social y los puntos de atención.\n#### 5.2. Coordinar con el C2 (Comité Económico) para garantizar el suministro de alimentos, medicinas y otros insumos a los albergues.\n#### 5.3. Coordinar con el C4 (Comité de Orden Interno) para garantizar la seguridad en los albergues y la protección de los damnificados.\n\n---\n\n## ANEXO D: INFORME DEL COMITÉ DE ORDEN INTERNO (C4)\n### 1. MISIÓN\n#### Coordinar las medidas de seguridad, disciplina y gestión de riesgos en el territorio afectado, en coordinación con la Policía Nacional Bolivariana (PNB) y los organismos de protección civil, para garantizar el orden público, la protección de instalaciones críticas y la gestión de riesgos post-desastre.\n### 2. MANIOBRA\n#### Establecer puestos de control de acceso a las zonas críticas y refugios, en coordinación con la PNB. Activar el Subcomité de Sistema de Riesgos para el levantamiento de daños y la identificación de riesgos secundarios (derrumbes, fugas de materiales peligrosos, deslizamientos). Coordinar con Protección Civil y los bomberos para la respuesta a emergencias.\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Riesgo de saqueos, vandalismo y desorden público en las zonas afectadas.\n#### 3.2. Presencia de materiales peligrosos en zonas industriales que requieren manejo especial.\n#### 3.3. Necesidad de controlar el acceso a las áreas de alto riesgo para evitar víctimas adicionales.\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Seguridad contra Accidentes y Riesgos (Sistema de Riesgos) para iniciar el levantamiento de consecuencias post-desastre.\n##### 4.1.2. Activar el Subcomité de Disciplina, Ley y Orden para coordinar con la PNB el establecimiento de puestos de control de acceso.\n##### 4.1.3. Activar el Subcomité de Operaciones Especiales para adaptar los procedimientos a las características del terreno (costa, montaña, urbano).\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Entregar el Mapa de Afectaciones por Sismo, el Mapa de Riesgos y Vulnerabilidades, y el Plan de Mitigación Inicial al Estado Mayor.\n##### 4.2.2. Coordinar con la PNB y Protección Civil la evacuación de zonas de alto riesgo y la apertura de rutas seguras.\n##### 4.2.3. Implementar el plan de seguridad para los refugios y centros de acopio.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Actualizar diariamente el informe de incidentes de seguridad y el estado de los riesgos identificados.\n##### 4.3.2. Supervisar la ejecución de las medidas de mitigación (despeje de escombros, aseguramiento de depósitos peligrosos).\n##### 4.3.3. Reportar al Estado Mayor cualquier cambio significativo en la situación de orden público o en los escenarios de riesgo.\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C2 (Comité Económico) para el despliegue de maquinaria y personal técnico en las tareas de mitigación de riesgos.\n#### 5.2. Coordinar con el C3 (Comité Social Popular) para garantizar la seguridad de los damnificados y la protección de los grupos vulnerables.\n#### 5.3. Coordinar con el C5 (Comité de Movilización) para la gestión de la requisición de equipos y materiales necesarios para la mitigación.\n\n---\n\n## ANEXO E: INFORME DEL COMITÉ DE MOVILIZACIÓN Y REQUISICIÓN (C5)\n### 1. MISIÓN\n#### Coordinar el control de efectivos, el flujo de reemplazos y la requisición legal de bienes y servicios para sostener la operación, garantizando la disponibilidad de personal y recursos necesarios para la respuesta al desastre.\n### 2. MANIOBRA\n#### Mantener actualizada la Situación Diaria de Personal (SDP) y el Cuadro de Control Detallado, gestionar el flujo de reemplazos desde la zona del interior, y aplicar los procedimientos de requisición legal de vehículos, maquinaria, alimentos y otros bienes conforme a la ley.\n### 3. CONSIDERACIONES PROPIAS DEL TERRENO\n#### 3.1. Necesidad de movilizar rápidamente personal de refuerzo (milicianos, reservistas) a las zonas afectadas.\n#### 3.2. Importancia de la requisición legal de bienes para garantizar la operatividad de la respuesta.\n#### 3.3. Riesgo de desabastecimiento de personal y recursos si no se gestiona adecuadamente el flujo de reemplazos.\n### 4. TAREAS POR FASES\n#### 4.1. Fase 0 (H+0 a H+12)\n##### 4.1.1. Activar el Subcomité de Mantenimiento del Efectivo para iniciar el registro de personal disponible y la elaboración de la Situación Diaria de Personal (SDP).\n##### 4.1.2. Activar el Subcomité de Reemplazos y Movilización para iniciar la apreciación de necesidades de personal y la coordinación con el sistema de reemplazos.\n##### 4.1.3. Activar el Subcomité de Requisición y Registro para iniciar el levantamiento del registro de medios productivos.\n#### 4.2. Fase 1 (H+12 a H+24)\n##### 4.2.1. Entregar la SDP y el Cuadro de Control Detallado al Estado Mayor.\n##### 4.2.2. Formular los primeros pedidos de reemplazos y gestionar su movilización a las zonas afectadas.\n##### 4.2.3. Aplicar los procedimientos de requisición legal para la obtención de vehículos, maquinaria y equipos de comunicación.\n#### 4.3. Fase 2 (H+24 en adelante)\n##### 4.3.1. Actualizar diariamente la SDP y el Cuadro de Control Detallado.\n##### 4.3.2. Mantener el flujo de reemplazos y gestionar la rotación del personal.\n##### 4.3.3. Actualizar el registro de medios productivos y gestionar nuevas requisiciones según las necesidades de la operación.\n### 5. INSTRUCCIONES DE COORDINACIÓN\n#### 5.1. Coordinar con el C2 (Comité Económico) para la verificación de la disponibilidad de recursos y la gestión de la requisición de bienes.\n#### 5.2. Coordinar con el C4 (Comité de Orden Interno) para la custodia de los bienes requisados y la seguridad de los centros de acopio.\n#### 5.3. Coordinar con el C1 (Comité Patriótico) para la difusión de información sobre los procedimientos de requisición y movilización.\n\n---\n\n## CIERRE Y APROBACIÓN\n### Visto Bueno: Coordinador General ODDI\n### REDI CAPITAL\n### Fecha de Emisión: 17 de junio de 2026\n\n**Fin del documento**\n\n# INSTRUCTIVO PARA LA VOCERÍA EN LA SALA SITUACIONAL ODDI\n\n## PRESENTACIÓN DE RESULTADOS Y SITUACIÓN TERRITORIAL ANTE EL ESTADO MAYOR\n\n---\n\n## 1. CONTEXTUALIZACIÓN: LA SALA SITUACIONAL ODDI Y LA IMPORTANCIA DE LA VOCERÍA\n\n### 1.1. Definición y propósito de la Sala Situacional ODDI\n#### 1.1.1. La Sala Situacional es el centro neurálgico de inteligencia y coordinación territorial del ODDI.\n##### 1.1.1.1. En ella convergen, se procesan y se consolidan todos los flujos de información provenientes de los cinco comités (C1 a C5) y de los enlaces externos.\n##### 1.1.1.2. Su función es transformar datos dispersos en conocimiento accionable para la toma de decisiones del Comando.\n#### 1.1.2. La vocería es el puente entre la Sala y el Estado Mayor.\n##### 1.1.2.1. No es una mera exposición de datos, sino un acto de transmisión de inteligencia procesada que permite al Comando visualizar el territorio, comprender la dinámica de la crisis y ordenar acciones concretas.\n##### 1.1.2.2. Una vocería efectiva puede ser la diferencia entre una decisión acertada y una oportunidad perdida para salvar vidas o asegurar recursos críticos.\n\n### 1.2. Principios rectores de la vocería\n#### 1.2.1. La vocería no es improvisación; es la transmisión de información verificada, georreferenciada y procesada.\n#### 1.2.2. El vocero es la voz de la Sala, no la voz de su opinión personal.\n#### 1.2.3. La información presentada debe ser clara, concreta, cuantitativa y orientada a la acción.\n\n---\n\n## 2. PROPÓSITO Y ALCANCE DEL INSTRUCTIVO\n\n### 2.1. Propósito\n#### 2.1.1. Establecer un procedimiento estandarizado y sencillo para que el Responsable, el Secretario o el Organizador de la Sala Situacional ODDI puedan presentar de manera clara, concreta y sin divagaciones la situación general o específica del territorio, los recursos disponibles, las novedades operacionales y las recomendaciones estratégicas ante el Estado Mayor o el Comando de la ZODI/REDI.\n\n### 2.2. Alcance\n#### 2.2.1. Aplica a todas las Salas Situacionales ODDI, en cualquier nivel (nacional, regional, estadal, municipal, comunal, parroquial), en el marco de la operación \"Desastre 02-2026\" y futuros ejercicios de defensa integral.\n\n### 2.3. Principio rector\n#### 2.3.1. La vocería no es una exposición improvisada. Es la transmisión de información procesada, verificada y georreferenciada que permite al Comando tomar decisiones tácticas y estratégicas. El vocero es la voz de la Sala, no la voz de su opinión personal.\n\n---\n\n## 3. ESTRUCTURA DE LA SALA SITUACIONAL ODDI\n\n### 3.1. Roles y responsabilidades\n#### 3.1.1. Responsable\n##### 3.1.1.1. Dirige la Sala, toma decisiones de priorización de información, aprueba los informes finales y es el enlace directo con el Comandante de la ZODI/REDI.\n##### 3.1.1.2. Es la autoridad máxima dentro de la Sala y garantiza la calidad y oportunidad de la información que se entrega.\n#### 3.1.2. Secretario\n##### 3.1.2.1. Registra y archiva toda la información entrante y saliente.\n##### 3.1.2.2. Lleva el Diario de la Sala, prepara los resúmenes ejecutivos y coordina el flujo de documentos.\n##### 3.1.2.3. Asegura que la información esté disponible para la vocería en el momento requerido.\n#### 3.1.3. Organizador\n##### 3.1.3.1. Coordina los turnos de los comités, verifica la actualización de los mapas y calcos.\n##### 3.1.3.2. Asegura que los productos cartográficos estén listos para la presentación y gestiona la logística de la Sala.\n##### 3.1.3.3. Es el responsable de que el vocero cuente con todos los elementos físicos y digitales necesarios para su exposición.\n\n### 3.2. Nota sobre la vocería\n#### 3.2.1. Cualquiera de los tres roles (Responsable, Secretario u Organizador) puede asumir la vocería, según designación o disponibilidad.\n#### 3.2.2. El instructivo aplica indistintamente a quien le corresponda dar parte.\n\n---\n\n## 4. PREPARACIÓN PREVIA A LA VOCERÍA (ANTES DE HABLAR)\n\n### 4.1. Revisión de la información consolidada\n#### 4.1.1. El vocero debe revisar la información consolidada de los cinco comités (C1 a C5) en las últimas 24 horas (o desde el último informe).\n##### 4.1.1.1. Esto incluye reportes de incidencias, actualizaciones de inventarios, cambios en el terreno y novedades de personal.\n#### 4.1.2. Debe verificar que los productos cartográficos (mapas, calcos) estén actualizados y a escala.\n##### 4.1.2.1. La cartografía es la herramienta principal de la vocería; un mapa desactualizado puede llevar a decisiones erróneas.\n\n### 4.2. Documentos clave que debe tener a mano\n#### 4.2.1. Situación Diaria de Personal (SDP) – actualizada al último corte.\n#### 4.2.2. Informe Periódico de Personal (IPP) del período correspondiente.\n#### 4.2.3. Mapa de Situación (calco) con la simbología estandarizada.\n#### 4.2.4. Resumen de incidentes críticos (C4) y novedades de riesgo (Subcomité de Riesgos).\n#### 4.2.5. Inventario de recursos logísticos (SALTE) actualizado (C2).\n\n### 4.3. Definición del tiempo de exposición\n#### 4.3.1. Normalmente, la vocería debe durar entre 5 y 10 minutos, salvo que se solicite un informe extendido.\n#### 4.3.2. El vocero debe ser capaz de sintetizar la información en un \"mensaje de 2 minutos\" (el elevator pitch) que el Comandante pueda recordar si el tiempo se reduce.\n\n### 4.4. Ensayo del mensaje clave\n#### 4.4.1. Antes de la vocería, el vocero debe preguntarse: si solo tengo 2 minutos, ¿qué debe saber sí o sí el Comandante?\n#### 4.4.2. Esta pregunta ayuda a priorizar la información más relevante y a estructurar el discurso en función de las necesidades del mando.\n\n---\n\n## 5. ESTRUCTURA DE LA PRESENTACIÓN (EL GUIÓN DE VOCERÍA)\n\n### 5.1. Apertura (15 segundos)\n#### 5.1.1. Saludo institucional: \"Señor Comandante, señores miembros del Estado Mayor.\"\n#### 5.1.2. Identificación: \"Soy [Nombre y apellido], [Responsable/Secretario/Organizador] de la Sala Situacional ODDI de [ZODI/Región].\"\n#### 5.1.3. Propósito: \"Procedo a dar parte de la situación territorial y operacional al corte de las [Hora] horas del día [Fecha].\"\n\n### 5.2. Situación General (1-2 minutos)\n#### 5.2.1. Resumen ejecutivo: en dos o tres frases, describir el estado general de la operación.\n##### 5.2.1.1. Ejemplo: \"La situación en la ZODI Capital se mantiene crítica pero estable. Tenemos 60.000 afectados, 23.000 heridos y 3.100 fallecidos reportados. Las réplicas continúan, pero las rutas principales han sido despejadas en un 70%.\"\n#### 5.2.2. Indicadores clave: mencionar los números más relevantes (afectados, albergados, heridos, fallecidos, toneladas de comida distribuidas, etc.).\n#### 5.2.3. Estado de los comités: \"Los cinco comités están activos y reportando. C1 ha contrarrestado 12 rumores; C2 ha requisado 15 vehículos pesados; C3 ha habilitado 8 albergues; C4 mantiene 12 puestos de control; C5 ha movilizado 300 efectivos de reemplazo.\"\n\n### 5.3. Novedades y Cambios Significativos (2-3 minutos)\n#### 5.3.1. Qué ha cambiado desde el último informe:\n##### 5.3.1.1. Nuevos derrumbes o despejes de vías.\n##### 5.3.1.2. Apertura o cierre de refugios.\n##### 5.3.1.3. Variación en inventarios de alimentos, agua o medicinas.\n##### 5.3.1.4. Incidentes de orden público (saqueos, disturbios) o de riesgo (fugas, deslizamientos).\n##### 5.3.1.5. Cambios en el flujo de reemplazos o en la disponibilidad de personal.\n#### 5.3.2. Usar el mapa: señalar en el calco o en la pantalla la ubicación exacta de las novedades.\n##### 5.3.2.1. Ejemplo: \"Aquí, en el sector Monte Piedad, se reportó un nuevo deslizamiento a las 14:00 horas. Está siendo atendido por el Subcomité de Riesgos.\"\n\n### 5.4. Riesgos y Escenarios (1-2 minutos)\n#### 5.4.1. Riesgos activos (C4 / Subcomité de Riesgos):\n##### 5.4.1.1. Réplicas sísmicas, deslizamientos, inundaciones, fugas de materiales peligrosos.\n##### 5.4.1.2. Alteración del orden público, saqueos.\n##### 5.4.1.3. Brotes epidemiológicos en refugios.\n#### 5.4.2. Escenarios proyectados: \"Si no se interviene en el sector X, se estima un riesgo de aislamiento de Y comunidades en las próximas 24 horas.\"\n#### 5.4.3. Medidas de mitigación en curso: \"Se ha enviado maquinaria para despeje y se ha coordinado con C3 la evacuación preventiva.\"\n\n### 5.5. Recursos y Necesidades (1-2 minutos)\n#### 5.5.1. Recursos disponibles: resumir el inventario SALTE (alimentos, agua, medicinas, combustible, maquinaria).\n#### 5.5.2. Necesidades urgentes: qué falta o qué se requiere con prioridad.\n##### 5.5.2.1. Ejemplo: \"Se requiere urgente el envío de 500 litros de combustible y 3 kits de trauma para el hospital de campaña en La Guaira.\"\n#### 5.5.3. Requisiciones pendientes: \"El C5 tiene en curso la requisición de 2 grúas de la empresa X, pero se requiere la autorización del Comando para ejecutarla.\"\n\n### 5.6. Coordinaciones y Enlaces (1 minuto)\n#### 5.6.1. Estado de los enlaces con otros comités y con instituciones:\n##### 5.6.1.1. \"Coordinación con el GDC: se han habilitado 3 escuelas como albergues.\"\n##### 5.6.1.2. \"Coordinación con el Ministerio de Salud: se ha solicitado el envío de 10 médicos asimilados.\"\n##### 5.6.1.3. \"Coordinación con la PNB: se han establecido 5 puestos de control adicionales en la Autopista Caracas-La Guaira.\"\n\n### 5.7. Recomendaciones y Petición de Decisiones (30 segundos)\n#### 5.7.1. Recomendaciones concretas al Comandante:\n##### 5.7.1.1. \"Se recomienda priorizar el despeje de la vía hacia el Hospital de Los Magallanes.\"\n##### 5.7.1.2. \"Se sugiere autorizar la requisición de los vehículos de la empresa privada 'Transportes Sucre'.\"\n#### 5.7.2. Petición de decisiones: si se requiere una orden superior, exponerla con claridad.\n##### 5.7.2.1. Ejemplo: \"Solicito al Comandante autorización para evacuar preventivamente las comunidades del sector Pagüita, debido al alto riesgo de deslizamiento.\"\n\n### 5.8. Cierre (15 segundos)\n#### 5.8.1. Resumen final: una frase que sintetice el mensaje central.\n##### 5.8.1.1. Ejemplo: \"En resumen, la situación está controlada en las áreas urbanas, pero la zona costera de La Guaira requiere atención inmediata.\"\n#### 5.8.2. Disponibilidad: \"Quedamos a disposición del Comando para ampliar cualquier información o presentar los mapas detallados.\"\n#### 5.8.3. Cierre formal: \"Nada más que reportar. Señor Comandante.\"\n\n---\n\n## 6. REGLAS DE ORO PARA UNA VOCERÍA EFECTIVA\n\n### 6.1. No improvisar\n#### 6.1.1. Seguir el guión punto por punto.\n#### 6.1.2. Si no se tiene información sobre un tema, decirlo honestamente: \"No tengo confirmación de ese dato, lo verificaré y lo reportaré en el próximo parte.\"\n\n### 6.2. Usar el mapa\n#### 6.2.1. La información sin georreferencia no es operacional.\n#### 6.2.2. Señalar siempre la ubicación exacta de los hechos y recursos.\n\n### 6.3. Ser cuantitativo\n#### 6.3.1. Evitar adjetivos vagos.\n#### 6.3.2. No decir \"mucha gente\", sino \"aproximadamente 5.000 personas\".\n\n### 6.4. Priorizar\n#### 6.4.1. Si el tiempo es corto, enfocarse en lo que el Comandante necesita saber para tomar decisiones inmediatas.\n#### 6.4.2. La regla del 80/20: el 80% del valor de la vocería está en el 20% de la información más crítica.\n\n### 6.5. Mantener la calma\n#### 6.5.1. La vocería refleja el control de la Sala.\n#### 6.5.2. Hablar con firmeza, claridad, sin prisas pero sin pausas excesivas.\n\n### 6.6. Verificar antes de reportar\n#### 6.6.1. Los rumores y datos no confirmados no se presentan.\n#### 6.6.2. Si se menciona algo no verificado, calificarlo: \"Aún no confirmado, pero se está investigando.\"\n\n### 6.7. Cerrar con claridad\n#### 6.7.1. Terminar siempre con un resumen ejecutivo y la disposición a ampliar información.\n\n---\n\n## 7. EJEMPLO DE VOCERÍA EN 5 MINUTOS (GUIÓN COMPLETO)\n\n### 7.1. Texto guía\n#### \"Señor Comandante, señores miembros del Estado Mayor. Soy el responsable de la Sala Situacional ODDI de la ZODI Capital. Procedo a dar parte de la situación general al corte de las 18:00 horas del día de hoy.\n\nLa situación se mantiene crítica pero estable. Tenemos 60.000 afectados, 23.000 heridos y 3.100 fallecidos reportados. Los cinco comités están activos y reportando sin novedad.\n\nNovedades significativas: a las 14:00 horas se reportó un nuevo deslizamiento en el sector Monte Piedad, que ha bloqueado parcialmente la vía de acceso al Hospital de Los Magallanes. El C4 ha establecido un puesto de control y el Subcomité de Riesgos está evaluando el terreno. En el sector Puerto, se ha despejado la vía principal y se ha restablecido el tránsito vehicular.\n\nRiesgos activos: se mantiene la alerta por réplicas sísmicas. En el sector Pagüita se ha identificado un riesgo alto de deslizamiento; se recomienda evacuación preventiva.\n\nRecursos: disponemos de 3 días de alimentos en los depósitos principales y 1.5 millones de litros de agua diarios. Sin embargo, se requiere urgentemente el envío de 3 kits de trauma y 500 litros de combustible para el hospital de campaña de La Guaira.\n\nCoordinaciones: se ha coordinado con el GDC la habilitación de 3 escuelas como albergues adicionales. Se ha solicitado al Ministerio de Salud el envío de 10 médicos asimilados.\n\nRecomendación: solicito autorización para evacuar preventivamente el sector Pagüita y para la requisición de 2 grúas de la empresa 'Transportes Sucre', necesarias para el despeje de la vía hacia el Hospital.\n\nEn resumen, la situación está controlada en el área urbana, pero la zona costera y el sector Monte Piedad requieren atención inmediata. Quedamos a disposición del Comando para ampliar información. Nada más que reportar. Señor Comandante.\"\n\n### 7.2. Análisis del ejemplo\n#### 7.2.1. Sigue todos los pasos del guión: apertura, situación general, novedades, riesgos, recursos, coordinaciones, recomendaciones y cierre.\n#### 7.2.2. Es cuantitativo, concreto y orientado a la acción.\n#### 7.2.3. Incluye una solicitud concreta de decisión, lo que facilita la respuesta del Comandante.\n#### 7.2.4. El cierre resume el mensaje central y deja abierta la puerta para ampliaciones.\n\n---\n\n## 8. ANEXOS DE APOYO PARA EL VOCERO\n\n### 8.1. Tarjeta de Referencia Rápida\n#### 8.1.1. Resumen de una página con el guión de vocería (los 8 puntos).\n#### 8.1.2. Debe ser de fácil acceso durante la presentación.\n\n### 8.2. Plantilla de Informe Diario\n#### 8.2.1. Formato para que el Secretario prepare el resumen ejecutivo antes de la vocería.\n#### 8.2.2. Incluye espacios para datos de afectación, recursos, novedades, riesgos y coordinaciones.\n\n### 8.3. Lista de Verificación Pre-Vocería\n#### 8.3.1. Para asegurarse de que no falta ningún dato antes de comenzar:\n##### 8.3.1.1. Efectivos actualizados.\n##### 8.3.1.2. Recursos disponibles.\n##### 8.3.1.3. Riesgos identificados.\n##### 8.3.1.4. Novedades del período.\n##### 8.3.1.5. Coordinaciones en curso.\n##### 8.3.1.6. Mapas y calcos listos.\n\n### 8.4. Simbología Militar de Uso en Sala\n#### 8.4.1. Hoja de referencia con los símbolos más usados (PC, PRPG, ID, SALTE, etc.).\n#### 8.4.2. Permite al vocero identificar rápidamente los elementos en el mapa sin dudas.\n\n---\n\n## 9. REFLEXIÓN FINAL: LA VOCERÍA COMO ARTE Y CIENCIA DE LA COMUNICACIÓN EN CRISIS\n\n### 9.1. La vocería no es un mero trámite administrativo; es un acto de liderazgo informativo.\n#### 9.1.1. El vocero es el responsable de traducir la complejidad del territorio en inteligencia comprensible para el mando.\n#### 9.1.2. Una vocería clara y convincente genera confianza en el Comando y cohesión en el Estado Mayor.\n### 9.2. La preparación es la clave del éxito.\n#### 9.2.1. Un vocero bien preparado transmite seguridad, control y profesionalismo.\n#### 9.2.2. La improvisación, en cambio, proyecta desorden y debilita la credibilidad de la Sala.\n### 9.3. El impacto de la vocería trasciende el momento de la presentación.\n#### 9.3.1. Las decisiones tomadas a partir de la información presentada salvan vidas, aseguran recursos y orientan el esfuerzo de toda la operación.\n#### 9.3.2. Por eso, cada vocero debe asumir su rol con la seriedad y el compromiso que la misión exige.\n\n---\n\n## APROBACIÓN Y CIERRE\n### Visto Bueno: Responsable de la Sala Situacional ODDI\n### Fecha de Emisión: 19 de junio de 2026\n\n**Fin del Instructivo**";
    function parsear(texto){
        const lineas=texto.split(/\r?\n/);
        const nodos=[]; let pila=[]; let id=1;
        for(let linea of lineas){
            linea=linea.trim(); if(!linea)continue;
            let nivel=-1, etiqueta=linea;
            if(linea.startsWith("# ")){nivel=0; etiqueta=linea.slice(2).trim();}
            else if(linea.startsWith("## ")){nivel=1; etiqueta=linea.slice(3).trim();}
            else if(linea.startsWith("### ")){nivel=2; etiqueta=linea.slice(4).trim();}
            else if(linea.startsWith("#### ")){nivel=3; etiqueta=linea.slice(5).trim();}
            else if(linea.startsWith("##### ")){nivel=4; etiqueta=linea.slice(6).trim();}
            else if(linea.startsWith("- ")||linea.startsWith("* ")){nivel=pila.length?pila[pila.length-1].nivel+1:1; etiqueta=linea.slice(2).trim();}
            else{nivel=pila.length?pila[pila.length-1].nivel+1:1; etiqueta=linea;}
            while(pila.length&&pila[pila.length-1].nivel>=nivel) pila.pop();
            const padreId=pila.length?pila[pila.length-1].id:null;
            const nuevoId=id++;
            nodos.push({id:nuevoId, etiqueta, nivel, padreId});
            pila.push({id:nuevoId, nivel});
        }
        const hijosMap=new Map(); nodos.forEach(n=>hijosMap.set(n.id,[]));
        nodos.forEach(n=>{if(n.padreId) hijosMap.get(n.padreId).push(n.id);});
        const raices=nodos.filter(n=>n.padreId===null);
        return {nodos, hijosMap, raices};
    }
    function renderizar(raices, nodosMap, hijosMap){
        const contenedor=document.getElementById('mapa');
        if(!raices.length){contenedor.innerHTML='<div style="padding:20px;">No se encontró jerarquía</div>'; return;}
        const build=(idNodo)=>{
            const nodo=nodosMap.get(idNodo); if(!nodo) return null;
            const hijos=hijosMap.get(idNodo)||[];
            const card=document.createElement('div');
            card.className='card level-'+Math.min(nodo.nivel,7);
            const tituloDiv=document.createElement('div');
            tituloDiv.className='title';
            const span=document.createElement('span');
            span.textContent=nodo.etiqueta;
            tituloDiv.appendChild(span);
            let icono=null;
            if(hijos.length){
                icono=document.createElement('span');
                icono.className='icon';
                icono.textContent='▶';
                tituloDiv.appendChild(icono);
            }
            card.appendChild(tituloDiv);
            let childDiv=null;
            if(hijos.length){
                childDiv=document.createElement('div');
                childDiv.className='children collapsed';
                for(let h of hijos){
                    const sub=build(h);
                    if(sub) childDiv.appendChild(sub);
                }
                card.appendChild(childDiv);
                card.addEventListener('click',(e)=>{
                    e.stopPropagation();
                    if(childDiv.classList.contains('collapsed')){
                        childDiv.classList.remove('collapsed');
                        if(icono) icono.textContent='▼';
                    }else{
                        childDiv.classList.add('collapsed');
                        if(icono) icono.textContent='▶';
                    }
                });
            }
            return card;
        };
        const rootDiv=document.createElement('div');
        for(let r of raices){
            const rc=build(r.id);
            if(rc) rootDiv.appendChild(rc);
        }
        contenedor.innerHTML=''; contenedor.appendChild(rootDiv);
    }
    const {nodos, hijosMap, raices}=parsear(textoOriginal);
    const nodosMap=new Map(); nodos.forEach(n=>nodosMap.set(n.id,n));
    renderizar(raices, nodosMap, hijosMap);
    document.getElementById('expandirTodo').addEventListener('click',()=>{
        document.querySelectorAll('.children').forEach(c=>c.classList.remove('collapsed'));
        document.querySelectorAll('.icon').forEach(i=>i.textContent='▼');
    });
    document.getElementById('colapsarTodo').addEventListener('click',()=>{
        document.querySelectorAll('.children').forEach(c=>c.classList.add('collapsed'));
        document.querySelectorAll('.icon').forEach(i=>i.textContent='▶');
    });
</script>
