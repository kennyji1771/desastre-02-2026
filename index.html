    const textoOriginal = "# ROL DE LOS ODDI EN CADA ZODI AFECTADA – OPERACIÓN \"DESASTRE 02-2026\"\n\n## 1. FUNDAMENTO Y NATURALEZA DE LOS ÓRGANOS DE DIRECCIÓN DE DEFENSA INTEGRAL (ODDI)\n\n### 1.1. Definición y propósito estratégico\n#### 1.1.1. Los ODDI como \"ojos y brazos coordinadores\" del Comando en el territorio\n##### 1.1.1.1. Su valor radica en el conocimiento profundo del terreno, la capacidad de enlace con actores locales y la aptitud para poner recursos a disposición del mando superior.\n##### 1.1.1.2. No son ejecutores ni decisores; no sustituyen ni compiten con la autoridad operativa del ZODI o la REDI.\n#### 1.1.2. Fundamento doctrinal\n##### 1.1.2.1. Por su carácter territorial y coordinador, son responsables de conocer, mantener actualizada y poner a disposición del Comando toda la información geoespacial, de infraestructura, de recursos y de personal disponible en su Área de Responsabilidad (AOR).\n\n### 1.2. Limitaciones estructurales generales\n#### 1.2.1. Los ODDI no ejecutan el control de accesos, no distribuyen alimentos, no patrullan ni restablecen infraestructura.\n#### 1.2.2. Su función se limita a proporcionar información y enlaces para que el Comando ordene a las unidades tácticas (ingeniería, logística, seguridad) la ejecución de las tareas.\n\n## 2. ROL DESCRIPTIVO DE LOS ODDI (CONOCIMIENTO, RECURSOS Y ENLACES POR ZODI)\n\n### 2.1. ZODI CAPITAL – DISTRITO CAPITAL\n#### 2.1.1. Conocimiento del territorio\n##### 2.1.1.1. Centro histórico de Caracas (Parroquia Catedral y zonas aledañas)\n##### 2.1.1.2. Ubicación de sedes gubernamentales (Palacio de Miraflores, Asamblea Nacional, Alcaldía)\n##### 2.1.1.3. Nodos de transporte colapsados (Av. Urdaneta, Av. Baralt, Av. Fuerzas Armadas)\n##### 2.1.1.4. Zonas de alta densidad poblacional (El Silencio, La Hoyada, Monte Piedad)\n##### 2.1.1.5. Redes de acueducto y electricidad del Área Metropolitana\n#### 2.1.2. Recursos que pone a disposición del Comando\n##### 2.1.2.1. Inventario de edificaciones públicas y privadas utilizables como albergues o centros de acopio.\n##### 2.1.2.2. Censo actualizado de milicianos, reservistas y personal de seguridad ciudadana por sector.\n##### 2.1.2.3. Registro de hospitales centinelas, ambulatorios, farmacias y depósitos de medicamentos.\n##### 2.1.2.4. Mapa de pozos de agua, cisternas y plantas de tratamiento en el área.\n##### 2.1.2.5. Relación de CLAP, consejos comunales, UBCH y jefes de calle (258 contactos identificados).\n#### 2.1.3. Enlaces que gestiona\n##### 2.1.3.1. Con la Alcaldía de Caracas para el uso de instalaciones municipales.\n##### 2.1.3.2. Con el Ministerio de Salud y el MPPS para la coordinación sanitaria.\n##### 2.1.3.3. Con los consejos comunales y UBCH para la movilización de voluntarios y difusión de mensajes.\n##### 2.1.3.4. Con los administradores de hoteles y edificios privados para su posible habilitación.\n##### 2.1.3.5. Con la Policía Nacional y Protección Civil para el intercambio de información sobre el terreno.\n#### 2.1.4. Limitación funcional\n##### 2.1.4.1. No ejecuta el control de accesos, ni distribuye alimentos, ni patrulla. Solo proporciona al Comando la información y los enlaces necesarios.\n\n### 2.2. ZODI LA GUAIRA – ESTADO LA GUAIRA\n#### 2.2.1. Conocimiento del territorio\n##### 2.2.1.1. Sistema portuario, Aeropuerto Internacional Simón Bolívar y Túnel Boquerón 1.\n##### 2.2.1.2. Vías de acceso costeras y zonas de riesgo de tsunami (Falla de El Pilar).\n##### 2.2.1.3. Asentamientos industriales del eje estratégico; depósitos de combustible y plantas eléctricas.\n#### 2.2.2. Recursos que pone a disposición del Comando\n##### 2.2.2.1. Inventario de grúas, equipos de remoción de escombros y maquinaria pesada disponible en el puerto y zonas industriales.\n##### 2.2.2.2. Listado de personal técnico y operarios de los muelles y el aeropuerto.\n##### 2.2.2.3. Registro de hospitales y centros de salud para trabajadores portuarios e industriales.\n##### 2.2.2.4. Mapa de rutas alternas terrestres y marítimas para eludir el colapso del túnel.\n##### 2.2.2.5. Censo de milicianos y personal de la Armada con experiencia en logística portuaria.\n#### 2.2.3. Enlaces que gestiona\n##### 2.2.3.1. Con la autoridad portuaria (Bolipuertos) y el concesionario del aeropuerto.\n##### 2.2.3.2. Con el Ministerio de Transporte y Obras Públicas para la reparación de vías.\n##### 2.2.3.3. Con las empresas industriales y de almacenamiento para la verificación de materiales peligrosos.\n##### 2.2.3.4. Con los consejos comunales costeros para la organización de evacuaciones.\n##### 2.2.3.5. Con la Capitanía de Puerto y la Armada para el tráfico marítimo.\n#### 2.2.4. Limitación funcional\n##### 2.2.4.1. No ejecuta el reestablecimiento del puerto ni del túnel, ni realiza patrullajes en los Cuadrantes de Paz. Solo coordina los enlaces y pone a disposición la información.\n\n### 2.3. ZODI MIRANDA – ESTADO MIRANDA\n#### 2.3.1. Conocimiento del territorio\n##### 2.3.1.1. Zonas industriales, depósitos de almacenamiento y áreas de riesgo de deslizamientos.\n##### 2.3.1.2. Vías de acceso secundarias fracturadas y comunidades aisladas.\n##### 2.3.1.3. Centros de acopio de alimentos, depósitos de materiales peligrosos y plantas de generación eléctrica.\n#### 2.3.2. Recursos que pone a disposición del Comando\n##### 2.3.2.1. Inventario de empresas industriales y su capacidad de almacenamiento.\n##### 2.3.2.2. Registro de materiales peligrosos y protocolos de manejo seguro.\n##### 2.3.2.3. Censo de personal técnico, bomberos industriales y brigadas de emergencia.\n##### 2.3.2.4. Mapa de vías alternas para eludir los puntos de fractura.\n##### 2.3.2.5. Relación de CLAP, consejos comunales y UBCH en los municipios más afectados.\n##### 2.3.2.6. Listado de pozos de agua y fuentes de abastecimiento en zonas aisladas.\n#### 2.3.3. Enlaces que gestiona\n##### 2.3.3.1. Con las empresas industriales y de almacenamiento para el control de inventarios y la seguridad de sus instalaciones.\n##### 2.3.3.2. Con el Ministerio de Industrias y el Ministerio de Ambiente para la gestión de residuos peligrosos.\n##### 2.3.3.3. Con los consejos comunales y UBCH para la distribución de alimentos en las zonas aisladas.\n##### 2.3.3.4. Con la Policía Nacional y Protección Civil para la evacuación de comunidades en riesgo.\n##### 2.3.3.5. Con las empresas de transporte público y privado para la movilización de damnificados.\n#### 2.3.4. Limitación funcional\n##### 2.3.4.1. No ejecuta el cordón de seguridad en las zonas industriales, ni despeja vías, ni distribuye suministros. Solo coordina los enlaces y pone la información a disposición del Comando.\n\n## 3. REQUISICIONES CARTOGRÁFICAS (PRODUCTOS POR ZODI)\n\n### 3.1. Generalidades y alcance de la requisición\n#### 3.1.1. Fundamento: Los ODDI, por su carácter territorial y coordinador, son los responsables de conocer, mantener actualizada y poner a disposición del Comando toda la información geoespacial, de infraestructura, de recursos y de personal disponible en su AOR.\n#### 3.1.2. Alcance: Cubre las tres ZODI más afectadas por el evento sísmico (Capital, La Guaira y Miranda), con enfoques adaptados a sus características particulares y a las tareas asignadas en la ORDOP.\n\n### 3.2. ZODI CAPITAL – DISTRITO CAPITAL\n#### 3.2.1. Área de enfoque\n##### 3.2.1.1. Centro histórico de Caracas (Parroquia Catedral y zonas aledañas de alta densidad).\n##### 3.2.1.2. Ejes viales de acceso (Av. Urdaneta, Av. Baralt, Av. Fuerzas Armadas).\n##### 3.2.1.3. Sedes gubernamentales, hospitales centinelas, sistema de agua y electricidad del Área Metropolitana.\n#### 3.2.2. Productos cartográficos requeridos\n##### 3.2.2.1. Mapa Base del Territorio\n###### 3.2.2.1.1. Plano del Distrito Capital (433 km²) con división parroquial, red vial principal y secundaria, hidrografía, curvas de nivel y toponimia actualizada.\n###### 3.2.2.1.2. Enfoque en la Parroquia Catedral (0,76 km²) y sus 7 sectores: Monte Piedad, Caño Amarillo, Pagüita, Miraflores, El Silencio, Capitolio y La Hoyada.\n###### 3.2.2.1.3. Plazo de entrega: 12 horas.\n##### 3.2.2.2. Mapa de Infraestructura Crítica\n###### 3.2.2.2.1. Georreferenciación de sedes de los Poderes Públicos (Palacio de Miraflores, Asamblea Nacional, Alcaldías), hospitales centrales, plantas eléctricas, subestaciones, acueductos (Sistema Tuy IV), pozos de agua, estaciones del Metro (Caño Amarillo, Capitolio, La Hoyada), depósitos de alimentos y combustibles.\n###### 3.2.2.2.2. Plazo de entrega: 24 horas.\n##### 3.2.2.3. Mapa de Afectaciones por Sismo\n###### 3.2.2.3.1. Identificación de edificaciones colapsadas o en riesgo, obstrucciones viales en Av. Urdaneta, Av. Baralt y Av. Fuerzas Armadas, puntos de deslizamiento en zonas de ladera (Monte Piedad, Pagüita), y áreas de mayor densidad poblacional afectada.\n###### 3.2.2.3.2. Plazo de entrega: 24 horas.\n##### 3.2.2.4. Mapa de Recursos Logísticos (SALTE)\n###### 3.2.2.4.1. Localización de centros de acopio de alimentos, depósitos de medicamentos, farmacias, talleres mecánicos, estaciones de servicio, vehículos disponibles, maquinaria pesada y equipos de comunicación.\n###### 3.2.2.4.2. Incluir contacto de responsables.\n###### 3.2.2.4.3. Plazo de entrega: 24 horas.\n##### 3.2.2.5. Mapa de Organización del Poder Popular\n###### 3.2.2.5.1. Ubicación de consejos comunales, UBCH, CLAP, jefes de calle (258 contactos), bases de misiones y otros enlaces comunitarios.\n###### 3.2.2.5.2. Identificar líderes con capacidad de convocatoria.\n###### 3.2.2.5.3. Plazo de entrega: 24 horas.\n##### 3.2.2.6. Mapa de Riesgos y Vulnerabilidades\n###### 3.2.2.6.1. Zonas de inundación, deslizamientos, fallas geológicas, áreas de alta densidad poblacional, zonas de posible aislamiento, rutas de evacuación y puntos de reunión seguros.\n###### 3.2.2.6.2. Plazo de entrega: 24 horas.\n##### 3.2.2.7. Calco de Situación Inicial\n###### 3.2.2.7.1. Representación gráfica de la situación al momento de la activación, con ubicación de puestos de control de la ZODI, puntos de bloqueo, refugios temporales, hospitales de campaña y rutas de abastecimiento priorizadas.\n###### 3.2.2.7.2. Plazo de entrega: 12 horas.\n##### 3.2.2.8. Información adicional a levantar (ODDI Capital)\n###### 3.2.2.8.1. Agua: Capacidad de cisternas y pozos operativos; ubicación de llenaderos y plantas de tratamiento; estado del sistema de acueductos.\n###### 3.2.2.8.2. Energía eléctrica: Estado de subestaciones y plantas de respaldo; disponibilidad de generadores portátiles.\n###### 3.2.2.8.3. Personal disponible: Milicianos, reservistas, personal de seguridad ciudadana, personal sanitario voluntario, y personal técnico especializado (electricistas, plomeros, operadores de maquinaria).\n\n### 3.3. ZODI LA GUAIRA – ESTADO LA GUAIRA\n#### 3.3.1. Área de enfoque\n##### 3.3.1.1. Eje costero, sistema portuario, Aeropuerto Internacional Simón Bolívar.\n##### 3.3.1.2. Autopista Caracas-La Guaira (incluyendo Túnel Boquerón 1, 1.910 m de longitud).\n##### 3.3.1.3. Zonas industriales y áreas de riesgo de tsunami.\n#### 3.3.2. Productos cartográficos requeridos\n##### 3.3.2.1. Mapa Base del Territorio\n###### 3.3.2.1.1. Plano del estado La Guaira con división municipal, red vial (Autopista Caracas-La Guaira, vías secundarias y costeras), hidrografía, curvas de nivel y toponimia actualizada.\n###### 3.3.2.1.2. Plazo de entrega: 12 horas.\n##### 3.3.2.2. Mapa de Infraestructura Crítica\n###### 3.3.2.2.1. Georreferenciación de: Puerto de La Guaira, Aeropuerto Internacional Simón Bolívar, Túnel Boquerón 1, plantas eléctricas, subestaciones, acueductos, depósitos de combustible, zonas industriales estratégicas y hospitales centinelas.\n###### 3.3.2.2.2. Plazo de entrega: 24 horas.\n##### 3.3.2.3. Mapa de Afectaciones por Sismo\n###### 3.3.2.3.1. Identificación de colapso del Túnel Boquerón 1, daños en el puerto y aeropuerto, deslaves en vías de acceso costeras, zonas de riesgo de tsunami por subducción de la Falla de El Pilar, y áreas con daños estructurales en instalaciones portuarias e industriales.\n###### 3.3.2.3.2. Plazo de entrega: 24 horas.\n##### 3.3.2.4. Mapa de Recursos Logísticos (SALTE)\n###### 3.3.2.4.1. Localización de depósitos de alimentos, almacenes de medicamentos, talleres mecánicos portuarios, estaciones de servicio, vehículos disponibles (grúas, camiones, embarcaciones menores), maquinaria pesada y equipos de comunicación. Incluir contacto de responsables.\n###### 3.3.2.4.2. Plazo de entrega: 24 horas.\n##### 3.3.2.5. Mapa de Rutas Alternas\n###### 3.3.2.5.1. Identificación de vías terrestres alternas al Túnel Boquerón 1, rutas marítimas de abastecimiento y evacuación, y puntos de embarque/desembarque de suministros en caso de bloqueo del puerto principal.\n###### 3.3.2.5.2. Plazo de entrega: 24 horas.\n##### 3.3.2.6. Mapa de Organización del Poder Popular\n###### 3.3.2.6.1. Ubicación de consejos comunales costeros, UBCH, CLAP, jefes de calle, pescadores organizados y otros enlaces comunitarios con capacidad de apoyo logístico y de rescate.\n###### 3.3.2.6.2. Plazo de entrega: 24 horas.\n##### 3.3.2.7. Mapa de Riesgos y Vulnerabilidades\n###### 3.3.2.7.1. Zonas de inundación costera por tsunami, áreas de deslizamiento en laderas, zonas de posible aislamiento por colapso de vías, rutas de evacuación costera y puntos de reunión seguros en altura.\n###### 3.3.2.7.2. Plazo de entrega: 24 horas.\n##### 3.3.2.8. Calco de Situación Inicial\n###### 3.3.2.8.1. Representación gráfica de la situación al momento de la activación, con ubicación de puestos de control de la ZODI, puntos de bloqueo, refugios temporales, hospitales de campaña, rutas de abastecimiento marítimo y terrestre priorizadas.\n###### 3.3.2.8.2. Plazo de entrega: 12 horas.\n##### 3.3.2.9. Información adicional a levantar (ODDI La Guaira)\n###### 3.3.2.9.1. Puerto: Estado de los muelles, grúas, almacenes portuarios, disponibilidad de personal técnico y operadores.\n###### 3.3.2.9.2. Aeropuerto: Estado de la pista, torre de control, sistemas de navegación, disponibilidad de personal y equipos de rescate.\n###### 3.3.2.9.3. Túnel Boquerón 1: Grado de colapso, posibilidad de despeje, rutas alternas documentadas.\n###### 3.3.2.9.4. Personal disponible: Milicianos, personal de la Armada, bomberos marítimos, personal sanitario, operadores de maquinaria pesada y personal técnico portuario.\n\n### 3.4. ZODI MIRANDA – ESTADO MIRANDA\n#### 3.4.1. Área de enfoque\n##### 3.4.1.1. Zonas industriales, depósitos de almacenamiento (incluyendo materiales peligrosos).\n##### 3.4.1.2. Vías de acceso secundarias y comunidades aisladas por deslizamientos.\n##### 3.4.1.3. Áreas de alta densidad poblacional.\n#### 3.4.2. Productos cartográficos requeridos\n##### 3.4.2.1. Mapa Base del Territorio\n###### 3.4.2.1.1. Plano del estado Miranda con división municipal, red vial principal y secundaria, hidrografía, curvas de nivel y toponimia actualizada.\n###### 3.4.2.1.2. Plazo de entrega: 12 horas.\n##### 3.4.2.2. Mapa de Infraestructura Crítica\n###### 3.4.2.2.1. Georreferenciación de zonas industriales, depósitos de almacenamiento de materiales peligrosos, plantas eléctricas, subestaciones, acueductos, hospitales centinelas, sedes gubernamentales y depósitos de alimentos y combustibles.\n###### 3.4.2.2.2. Plazo de entrega: 24 horas.\n##### 3.4.2.3. Mapa de Afectaciones por Sismo\n###### 3.4.2.3.1. Identificación de daños en zonas industriales, fractura de vías de acceso secundarias, deslizamientos de tierra, áreas con riesgo de manejo inadecuado de materiales peligrosos, y comunidades aisladas.\n###### 3.4.2.3.2. Plazo de entrega: 24 horas.\n##### 3.4.2.4. Mapa de Recursos Logísticos (SALTE)\n###### 3.4.2.4.1. Localización de depósitos de alimentos, almacenes de medicamentos, talleres mecánicos, estaciones de servicio, vehículos disponibles (camiones, maquinaria pesada), equipos de comunicación y bodegas comunales. Incluir contacto de responsables.\n###### 3.4.2.4.2. Plazo de entrega: 24 horas.\n##### 3.4.2.5. Mapa de Organización del Poder Popular\n###### 3.4.2.5.1. Ubicación de consejos comunales, UBCH, CLAP, jefes de calle, y otros enlaces comunitarios con capacidad de apoyo logístico y de distribución de suministros.\n###### 3.4.2.5.2. Plazo de entrega: 24 horas.\n##### 3.4.2.6. Mapa de Riesgos y Vulnerabilidades\n###### 3.4.2.6.1. Zonas de inundación, deslizamientos, fallas geológicas, áreas de posible aislamiento, rutas de evacuación y puntos de reunión seguros.\n###### 3.4.2.6.2. Identificar depósitos de materiales peligrosos y su nivel de riesgo.\n###### 3.4.2.6.3. Plazo de entrega: 24 horas.\n##### 3.4.2.7. Calco de Situación Inicial\n###### 3.4.2.7.1. Representación gráfica de la situación al momento de la activación, con ubicación de puestos de control de la ZODI, puntos de bloqueo, refugios temporales, hospitales de campaña, y rutas de abastecimiento priorizadas.\n###### 3.4.2.7.2. Plazo de entrega: 12 horas.\n##### 3.4.2.8. Información adicional a levantar (ODDI Miranda)\n###### 3.4.2.8.1. Materiales peligrosos: Inventario georreferenciado de depósitos con sustancias químicas, combustibles, explosivos o materiales tóxicos; estado de sus medidas de seguridad; contacto de responsables técnicos.\n###### 3.4.2.8.2. Vías de acceso: Estado de vías secundarias, puntos de fractura, rutas alternas para eludir bloqueos; priorización de vías para reparación.\n###### 3.4.2.8.3. Comunidades aisladas: Identificación de comunidades incomunicadas por deslizamientos o fractura de vías; censo de población y necesidades básicas (agua, alimentos, medicinas).\n###### 3.4.2.8.4. Personal disponible: Milicianos, personal de seguridad ciudadana, bomberos industriales, brigadas de emergencia, personal sanitario y técnico especializado.\n\n## 4. CRONOGRAMA DE ENTREGA Y ACTUALIZACIÓN DE LA INFORMACIÓN\n### 4.1. Plazos establecidos\n#### 4.1.1. Productos con plazo de 12 horas: Mapa Base del Territorio y Calco de Situación Inicial (para todas las ZODI).\n#### 4.1.2. Productos con plazo de 24 horas: Mapas de Infraestructura Crítica, Afectaciones, Recursos Logísticos (SALTE), Organización del Poder Popular, Riesgos y Vulnerabilidades, y Rutas Alternas (cuando aplique).\n### 4.2. Dinamismo de la cartografía\n#### 4.2.1. La información es dinámica. Los ODDI deben mantener actualizada la información durante toda la operación.\n#### 4.2.2. Deben reportar al Estado Mayor de la ZODI cualquier cambio significativo en el terreno: nuevos derrumbes, despeje de vías, apertura de refugios, etc.\n\n## 5. CONSIDERACIONES FINALES Y RESPONSABILIDADES\n### 5.1. Naturaleza coordinadora y no ejecutora\n#### 5.1.1. Los ODDI son coordinadores, no ejecutores. Su función es recopilar, consolidar y poner a disposición del Comando la información cartográfica y los enlaces con los recursos del territorio.\n#### 5.1.2. No ejecutan directamente las tareas de levantamiento de mapas, sino que coordinan con las instituciones, empresas y organizaciones sociales correspondientes para obtener la información requerida.\n### 5.2. Formato y georreferenciación de la información\n#### 5.2.1. La información debe ser georreferenciada (coordenadas UTM o grados decimales).\n#### 5.2.2. Debe entregarse en formato digital para su integración en el Sistema de Información Geográfica de la ZODI/REDI: archivos shapefile, capas para Google Earth, o mapas impresos a escala.\n### 5.3. Seguridad de la información\n#### 5.3.1. La seguridad de la información será responsabilidad de cada ODDI.\n#### 5.3.2. La cartografía y los datos sensibles deben manejarse con la clasificación correspondiente y bajo cadena de custodia.\n### 5.4. Aprobación y cierre\n#### 5.4.1. La presente requisición y los productos derivados están aprobados por el P1 – Jefe del Estado Mayor.\n#### 5.4.2. La información recopilada constituye la base para la toma de decisiones operativas en el marco del Estado de Alarma.\n\n**Fin del documento estructurado**";
    function parsear(texto){
        const lineas=texto.split(/\r?\n/);
        const nodos=[]; let pila=[]; let id=1;
        for(let linea of lineas){
            linea=linea.trim(); if(!linea)continue;
            let nivel=-1, etiqueta=linea;
            if(linea.startsWith("# ")){nivel=0; etiqueta=linea.slice(2).trim();}
            else if(linea.startsWith("## ")){nivel=1; etiqueta=linea.slice(3).trim();}
            else if(linea.startsWith("### ")){nivel=2; etiqueta=linea.slice(4).trim();}
            else if(linea.startsWith("#### ")){nivel=3; etiqueta=linea.slice(5).trim();}
            else if(linea.startsWith("##### ")){nivel=4; etiqueta=linea.slice(6).trim();}
            else if(linea.startsWith("- ")||linea.startsWith("* ")){nivel=pila.length?pila[pila.length-1].nivel+1:1; etiqueta=linea.slice(2).trim();}
            else{nivel=pila.length?pila[pila.length-1].nivel+1:1; etiqueta=linea;}
            while(pila.length&&pila[pila.length-1].nivel>=nivel) pila.pop();
            const padreId=pila.length?pila[pila.length-1].id:null;
            const nuevoId=id++;
            nodos.push({id:nuevoId, etiqueta, nivel, padreId});
            pila.push({id:nuevoId, nivel});
        }
        const hijosMap=new Map(); nodos.forEach(n=>hijosMap.set(n.id,[]));
        nodos.forEach(n=>{if(n.padreId) hijosMap.get(n.padreId).push(n.id);});
        const raices=nodos.filter(n=>n.padreId===null);
        return {nodos, hijosMap, raices};
    }
    function renderizar(raices, nodosMap, hijosMap){
        const contenedor=document.getElementById('mapa');
        if(!raices.length){contenedor.innerHTML='<div style="padding:20px;">No se encontró jerarquía</div>'; return;}
        const build=(idNodo)=>{
            const nodo=nodosMap.get(idNodo); if(!nodo) return null;
            const hijos=hijosMap.get(idNodo)||[];
            const card=document.createElement('div');
            card.className='card level-'+Math.min(nodo.nivel,7);
            const tituloDiv=document.createElement('div');
            tituloDiv.className='title';
            const span=document.createElement('span');
            span.textContent=nodo.etiqueta;
            tituloDiv.appendChild(span);
            let icono=null;
            if(hijos.length){
                icono=document.createElement('span');
                icono.className='icon';
                icono.textContent='▶';
                tituloDiv.appendChild(icono);
            }
            card.appendChild(tituloDiv);
            let childDiv=null;
            if(hijos.length){
                childDiv=document.createElement('div');
                childDiv.className='children collapsed';
                for(let h of hijos){
                    const sub=build(h);
                    if(sub) childDiv.appendChild(sub);
                }
                card.appendChild(childDiv);
                card.addEventListener('click',(e)=>{
                    e.stopPropagation();
                    if(childDiv.classList.contains('collapsed')){
                        childDiv.classList.remove('collapsed');
                        if(icono) icono.textContent='▼';
                    }else{
                        childDiv.classList.add('collapsed');
                        if(icono) icono.textContent='▶';
                    }
                });
            }
            return card;
        };
        const rootDiv=document.createElement('div');
        for(let r of raices){
            const rc=build(r.id);
            if(rc) rootDiv.appendChild(rc);
        }
        contenedor.innerHTML=''; contenedor.appendChild(rootDiv);
    }
    const {nodos, hijosMap, raices}=parsear(textoOriginal);
    const nodosMap=new Map(); nodos.forEach(n=>nodosMap.set(n.id,n));
    renderizar(raices, nodosMap, hijosMap);
    document.getElementById('expandirTodo').addEventListener('click',()=>{
        document.querySelectorAll('.children').forEach(c=>c.classList.remove('collapsed'));
        document.querySelectorAll('.icon').forEach(i=>i.textContent='▼');
    });
    document.getElementById('colapsarTodo').addEventListener('click',()=>{
        document.querySelectorAll('.children').forEach(c=>c.classList.add('collapsed'));
        document.querySelectorAll('.icon').forEach(i=>i.textContent='▶');
    });
</script>
</body>
</html>
